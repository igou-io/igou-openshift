apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: multus-ovnk-sbr-nginx
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
      annotations:
        k8s.v1.cni.cncf.io/networks: vlan45-trunk
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: quay.io/hummingbird/nginx:1.28.2@sha256:67bef246c4f920ce4246596ae4ce9f8390906847e787db815a5ae1f723c2c16d
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
