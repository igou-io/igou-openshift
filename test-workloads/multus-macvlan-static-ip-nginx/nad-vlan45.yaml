apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan45-macvlan
  namespace: multus-macvlan-static-ip-nginx
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "vlan45-macvlan",
      "type": "macvlan",
      "master": "enp2s0f1.45",
      "linkInContainer": false,
      "mode": "bridge",
      "ipam": {
        "type": "static",
        "routes": [
          {
            "dst": "0.0.0.0/0",
            "gw": "10.10.45.1"
          }
        ]
      }
    }
