apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ipvlan-l2
  namespace: multus-ipvlan-l2
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "ipvlan-l2",
      "type": "ipvlan",
      "master": "enp2s0f1.45",
      "linkInContainer": false,
      "mode": "l2",
      "ipam": {
        "type": "host-local",
        "subnet": "10.10.45.0/24",
        "rangeStart": "10.10.45.230",
        "rangeEnd": "10.10.45.239",
        "routes": [
          {
            "dst": "0.0.0.0/0",
            "gw": "10.10.45.1"
          }
        ]
      }
    }
