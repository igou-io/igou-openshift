---
apiVersion: v1
kind: Pod
metadata:
  name: trunk-test
  namespace: multus-trunk-casval
  annotations:
    k8s.v1.cni.cncf.io/networks: |-
      [
        {
          "name": "vlan45-trunk",
          "ips": ["10.10.45.226/24"],
          "interface": "vlan45"
        }
      ]
spec:
  nodeSelector:
    kubernetes.io/hostname: casval
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  restartPolicy: Never
  containers:
    - name: net
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest@sha256:463cae32c6f6f5594b11a5c22de275016bd8545ce58a6373388e8b24f13fc15c
      command: ["sleep", "infinity"]
      securityContext:
        capabilities:
          add: ["NET_ADMIN", "NET_RAW"]
