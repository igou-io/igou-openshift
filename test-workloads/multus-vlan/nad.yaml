apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan80
  namespace: multus-vlan
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "vlan80",
      "type": "vlan",
      "master": "enp2s0f1",
      "vlanId": 80,
      "linkInContainer": false,
      "ipam": {
        "type": "host-local",
        "subnet": "10.10.80.0/24",
        "routes": [
          {
            "dst": "0.0.0.0/0",
            "gw": "10.10.80.1"
          }
        ]
      }
    }
