apiVersion: v1
kind: Pod
metadata:
  name: multus-ovnk-ovn-ipam-test
  namespace: multus-ovnk-ovn-ipam
  annotations:
    k8s.v1.cni.cncf.io/networks: vlan45-trunk
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: tools
      image: registry.redhat.io/openshift4/ose-tools-rhel9:latest
      command: ["sleep", "infinity"]
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
