---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cluster-edit-token-push
  namespace: service-accounts
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: onepassword-sdk-claude
      kind: ClusterSecretStore
  selector:
    secret:
      name: cluster-edit-token
  data:
    - conversionStrategy: None
      match:
        secretKey: token
        remoteRef:
          remoteKey: hub-cluster-edit
          property: token
