apiVersion: tuned.openshift.io/v1
kind: Tuned
metadata:
  name: openshift-control-plane-epp
  namespace: openshift-cluster-node-tuning-operator
spec:
  profile:
    - name: openshift-control-plane-epp
      data: |
        [main]
        summary=openshift-control-plane with balanced EPP to reduce idle clocks/heat
        include=openshift-control-plane

        [cpu]
        governor=powersave
        energy_performance_preference=balance_performance
        # Cap intel_pstate to 75% of max turbo (~3.9GHz on the i9-13900H).
        # The steady ~2.3-core control-plane load was boosting to 4.6-4.9GHz
        # for no measurable latency benefit (apiserver/etcd p99s identical at
        # 3.5GHz vs 4.9GHz) while holding the package at ~34W/87C. 50 = base
        # clocks (full turbo-off equivalent) if 75 proves insufficient.
        #
        # min_perf_pct MUST be overridden here: the inherited
        # throughput-performance profile (via openshift) sets min_perf_pct=100,
        # and the kernel clamps max_perf_pct writes to >= min_perf_pct — with
        # the inherited value, the max_perf_pct=75 write is silently clamped
        # back to 100. 8% ~= the 400MHz hardware floor on this SKU.
        min_perf_pct=8
        max_perf_pct=75
  recommend:
    # Priority MUST be numerically lower than the default openshift-control-plane
    # recommend (priority 30) so this profile wins on master nodes. The
    # include= above keeps every other control-plane tuning intact; only the
    # [cpu] block (governor + HWP energy-performance preference) is overridden.
    - match:
        - label: node-role.kubernetes.io/master
      priority: 20
      profile: openshift-control-plane-epp
