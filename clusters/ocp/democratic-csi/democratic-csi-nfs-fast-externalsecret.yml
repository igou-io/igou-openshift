apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: democratic-csi-nfs-fast-config
  namespace: democratic-csi
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-lab-openshift
  target:
    name: democratic-csi-nfs-fast-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        driver-config-file.yaml: |-
          driver: freenas-api-nfs
          instance_id:
          httpConnection:
            protocol: https
            host: {{ .truenas_host }}
            port: 443
            apiKey: {{ .truenas_csi_api_key_ocp }}
            allowInsecure: false
            apiVersion: 2
          zfs:
            datasetParentName: fast/k8s/vols
            detachedSnapshotsDatasetParentName: fast/k8sbak/vols
            datasetEnableQuotas: true
            datasetEnableReservation: false
            datasetPermissionsMode: "0777"
            datasetPermissionsUser: 0
            datasetPermissionsGroup: 0
          nfs:
            shareHost: truenas.igou.systems
            shareAlldirs: false
            shareAllowedHosts: []
            shareAllowedNetworks: []
            shareMaprootUser: root
            shareMaprootGroup: wheel
            shareMapallUser: ""
            shareMapallGroup: ""
  dataFrom:
  - extract:
      key: truenas
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      nullBytePolicy: Ignore
