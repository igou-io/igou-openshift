apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: democratic-csi-nvmeof-cold-config
  namespace: democratic-csi
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-lab-openshift
  target:
    name: democratic-csi-nvmeof-cold-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        driver-config-file.yaml: |-
          driver: freenas-api-nvmeof
          instance_id:
          node:
            mount:
              # predominantly used to facilitate testing
              # mount_flags should generally be defined in storage classes, etc
              mount_flags: ""
              # should fsck be executed before mounting the fs
              checkFilesystem:
                xfs:
                  enabled: true
                  customOptions: []
                ext4:
                  enabled: true
                  customOptions: []
                  customFilesystemOptions: []
                btrfs:
                  enabled: true
                  customOptions: []
                  customFilesystemOptions: []
          httpConnection:
            protocol: https
            host: {{ .truenas_host }}
            port: 443
            apiKey: {{ .truenas_csi_api_key_ocp }}
            allowInsecure: false
            apiVersion: 2
          zfs:
            datasetParentName: cold/k8s/vols
            detachedSnapshotsDatasetParentName: cold/k8sbak/vols
            zvolCompression:
            zvolDedup:
            zvolEnableReservation: true
            zvolBlocksize:
          nvmeof:
            # ctrl-loss-tmo=-1 keeps the NVMe-oF controller alive indefinitely when the
            # transport drops (e.g. a network outage) instead of tearing it down after the
            # 600s default. This preserves the /dev/nvmeXn1 device identity so it reconnects
            # cleanly, avoiding the failure mode where a renumbered device makes kubelet's
            # NodeUnstageVolume fail and leaves RWO volumes permanently Multi-Attach stuck.
            transports:
              - "tcp://{{ .truenas_host }}:4420?ctrl-loss-tmo=-1&reconnect-delay=10"
            namePrefix: "csi-"
            nameSuffix: "-ocp"
            ports:
              - 1

            # http://<ip>/api/docs/current/api_methods_nvmet.subsys.create.html
            subsystemTemplate:
              pi_enable: true
              qid_max:
              ieee_oui:
              ana:

            # http://<ip>/api/docs/current/api_methods_nvmet.namespace.create.html
            # currently none of the fields can be tweaked so leave empty for now
            namespaceTemplate:
  dataFrom:
  - extract:
      key: truenas
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      nullBytePolicy: Ignore
