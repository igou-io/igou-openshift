---
# PaC tenants for the OCP cluster.
# Schema and defaults: see .helm/charts/pac-tenant/values.yaml
#
# Tenants are added/removed via the /scaffold-pac-tenant skill.
tenants:
  - name: igou-ansible
    url: https://forgejo.apps.ocp.igou.systems/igou-io/igou-ansible
    imageStreams:
      - name: ee-minimal-rhel9
        from: registry.redhat.io/ansible-automation-platform-26/ee-minimal-rhel9:latest
    secrets:
      serviceAccountSecrets:
        - name: quay-push-config
          onepasswordItem: ci-quay-shared
          asImagePullSecret: true
      # Red Hat Automation Hub offline token (from console.redhat.com/openshift/token).
      # 1Password item must contain a field `token` with the SSO offline token.
      workspaceSecrets:
        - name: rh-automationhub-credentials
          onepasswordItem: rh-automationhub-credentials
    # Galaxy servers exposed to ansible-builder PipelineRuns. Repository params
    # are interpolated into PipelineRun YAML at trigger time (PaC {{ name }}
    # syntax); the pipeline turns them into ANSIBLE_GALAXY_SERVER_<NAME>_*
    # env vars consumed by ansible-builder. Server names use underscores
    # because shell env vars can't have hyphens.
    params:
      - name: ansible_galaxy_server_list
        value: "rh_certified,validated,community"
      # rh-certified collections from RH Automation Hub.
      - name: ansible_galaxy_server_rh_certified_url
        value: "https://console.redhat.com/api/automation-hub/content/published/"
      - name: ansible_galaxy_server_rh_certified_auth_url
        value: "https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token"
      - name: ansible_galaxy_server_rh_certified_token
        secret_ref:
          name: rh-automationhub-credentials
          key: token
      # RH-validated content.
      - name: ansible_galaxy_server_validated_url
        value: "https://console.redhat.com/api/automation-hub/content/validated/"
      - name: ansible_galaxy_server_validated_auth_url
        value: "https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token"
      - name: ansible_galaxy_server_validated_token
        secret_ref:
          name: rh-automationhub-credentials
          key: token
      # Public community Galaxy — no auth.
      - name: ansible_galaxy_server_community_url
        value: "https://galaxy.ansible.com/api/"
    # Quay push + Forgejo clone both traverse the cluster apps router
    # (10.10.9.10:443). The router runs hostNetwork, so a namespaceSelector
    # for openshift-ingress won't match — has to be by IP. Default
    # allow-external-egress excepts 10.0.0.0/8, so without this rule the
    # tenant can't reach the cluster's own apps. Naming them separately
    # documents intent even though they share the same CIDR + port.
    extraEgress:
      - name: allow-quay-push
        cidr: 10.10.9.10/32
        ports:
          - port: 443
            protocol: TCP
      - name: allow-forgejo-clone
        cidr: 10.10.9.10/32
        ports:
          - port: 443
            protocol: TCP
