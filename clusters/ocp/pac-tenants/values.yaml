---
# PaC tenants for the OCP cluster.
# Schema and defaults: see .helm/charts/pac-tenant/values.yaml
#
# Tenants are added/removed via the /scaffold-pac-tenant skill.
tenants:
  - name: igou-ansible
    url: https://forgejo.apps.ocp.igou.systems/igou-io/igou-ansible
    imageStreams:
      - name: ee-minimal-rhel9
        from: registry.redhat.io/ansible-automation-platform-26/ee-minimal-rhel9:latest
    secrets:
      serviceAccountSecrets:
        - name: quay-push-config
          onepasswordItem: ci-quay-shared
          asImagePullSecret: true
    # Default allow-external-egress blocks 10.0.0.0/8 (LAN). The cluster's
    # own apps router lives at 10.10.9.10 — Tekton needs to reach it to push
    # to internal Quay and clone from internal Forgejo.
    extraEgress:
      - name: allow-cluster-apps-router
        cidr: 10.10.9.10/32
        ports:
          - port: 443
            protocol: TCP
