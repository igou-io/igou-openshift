apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: iot
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    argocd.argoproj.io/sync-wave: '0'
spec:
  addresses:
    # Low /25 — ocp's half of the iot tier. rk8s (igou-kubernetes) owns
    # 10.10.151.128/25. rb5009's metallb-in filter enforces the split.
    - 10.10.151.1-10.10.151.127
  autoAssign: false
  avoidBuggyIPs: true
