---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: trusted-lan
  # Hard constraint of the OpenShift implementation: Gateways are only
  # reconciled in openshift-ingress.
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  gatewayClassName: openshift-default
  infrastructure:
    # Copied by the gateway controller onto the generated LoadBalancer
    # Service. The VIP is a contract with rb5009 (igou-inventory): the
    # pinned-VIP registry and per-service static DNS records target
    # 10.10.150.3 — do not change it without updating both repos. rk8s owns
    # the high half of the tier and serves *.lan.igou.systems from
    # 10.10.150.129; per-hostname DNS decides which cluster serves a name.
    annotations:
      metallb.universe.tf/address-pool: trusted-lan
      metallb.universe.tf/loadBalancerIPs: 10.10.150.3
  listeners:
    - name: https
      hostname: '*.lan.igou.systems'
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          # kind/group are API-server defaults, stated explicitly so ArgoCD's
          # server-side-apply diff doesn't report the Gateway as forever
          # OutOfSync.
          - name: gateway-trusted-lan-tls
            kind: Secret
            group: ""
      # Apps opt in by labelling their namespace and creating an HTTPRoute
      # with parentRefs to this Gateway. Exposure tier semantics: anything
      # routed here is reachable by every VLAN the rb5009 admits to the
      # trusted-lan tier (VLAN 9/10/99).
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access/trusted-lan: 'true'
