apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: onepassword-connect-nonroot-v2
  namespace: onepassword-connect
# The connect chart runs the pod as the namespace `default` ServiceAccount
# (it renders no dedicated SA) with hardcoded runAsUser/fsGroup 999, which
# restricted-v2 rejects. nonroot-v2 permits any non-root UID + any fsGroup,
# so UID 999 runs and /home/opuser/.op stays owned by 999 (avoids #282).
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:nonroot-v2
subjects:
  - kind: ServiceAccount
    name: default
    namespace: onepassword-connect
