apiVersion: v1
kind: ServiceAccount
metadata:
  name: capi-csr-approver
  namespace: openshift-cluster-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: capi-csr-approver
  namespace: openshift-cluster-api
rules:
- apiGroups: ["cluster.x-k8s.io"]
  resources: ["machines"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: capi-csr-approver
  namespace: openshift-cluster-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: capi-csr-approver
subjects:
- kind: ServiceAccount
  name: capi-csr-approver
  namespace: openshift-cluster-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capi-csr-approver
rules:
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests"]
  verbs: ["get", "list"]
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests/approval"]
  verbs: ["update"]
# Scoped to only the two signers the machine-approver can't handle for
# CAPI-provisioned nodes (chicken-and-egg: Machine has no InternalDNS
# until the Node registers, but the Node can't register without CSR
# approval).
- apiGroups: ["certificates.k8s.io"]
  resources: ["signers"]
  resourceNames:
  - kubernetes.io/kube-apiserver-client-kubelet
  - kubernetes.io/kubelet-serving
  verbs: ["approve"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capi-csr-approver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capi-csr-approver
subjects:
- kind: ServiceAccount
  name: capi-csr-approver
  namespace: openshift-cluster-api
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-csr-approver
  namespace: openshift-cluster-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: capi-csr-approver
  egress:
  - {}
  policyTypes:
  - Egress
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: capi-csr-approver
  namespace: openshift-cluster-api
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: capi-csr-approver
        spec:
          serviceAccountName: capi-csr-approver
          restartPolicy: Never
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          tolerations:
          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          containers:
          - name: approver
            image: registry.redhat.io/openshift4/ose-cli:latest
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
            command: ["/bin/bash", "-euo", "pipefail", "-c"]
            args:
            - |
              NS=openshift-cluster-api

              machine_count=$(oc get machine.cluster.x-k8s.io -n "$NS" \
                -o name 2>/dev/null | wc -l)
              if [ "${machine_count:-0}" -eq 0 ]; then
                echo "No CAPI Machines in $NS."
                exit 0
              fi

              pending=$(oc get csr --no-headers 2>&1 \
                | awk '$NF == "Pending" {print $1, $3, $4}')
              if [ -z "$pending" ]; then
                echo "No pending CSRs."
                exit 0
              fi

              echo "$pending" | while read -r name signer requestor; do
                [ -z "$name" ] && continue

                case "$signer" in
                  kubernetes.io/kube-apiserver-client-kubelet)
                    # Bootstrap CSR — only the node-bootstrapper SA (which
                    # requires the ignition bootstrap token) can create these.
                    if [ "$requestor" != "system:serviceaccount:openshift-machine-config-operator:node-bootstrapper" ]; then
                      echo "Skipping $name: unexpected requestor for bootstrap signer"
                      continue
                    fi
                    echo "Approving bootstrap CSR $name"
                    oc adm certificate approve "$name" 2>&1 || true
                    ;;
                  kubernetes.io/kubelet-serving)
                    # Serving CSR — the kubelet already holds a valid client
                    # cert (approved above or by machine-approver), so the
                    # node identity is authenticated.
                    if [[ "$requestor" != system:node:* ]]; then
                      echo "Skipping $name: unexpected requestor for serving signer"
                      continue
                    fi
                    echo "Approving serving CSR $name (${requestor#system:node:})"
                    oc adm certificate approve "$name" 2>&1 || true
                    ;;
                  *)
                    ;;
                esac
              done

              echo "Done"
