---
# Applies the burst node-role label and burst NoSchedule taint to every Node
# backing a Machine in the casval-worker MachineSet. Idempotent; runs every
# minute (matching capi-csr-approver / capi-node-cleanup cadence).
#
# Race window with Node registration is benign: workloads opt in via both
# nodeSelector (matches only once the label exists) AND toleration (the
# taint blocks anything else). DaemonSets are unaffected — they bypass
# nodeSelector/taint by design.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: casval-node-taint
  namespace: openshift-cluster-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: casval-node-taint
  namespace: openshift-cluster-api
rules:
  - apiGroups: ["cluster.x-k8s.io"]
    resources: ["machines"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: casval-node-taint
  namespace: openshift-cluster-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: casval-node-taint
subjects:
  - kind: ServiceAccount
    name: casval-node-taint
    namespace: openshift-cluster-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: casval-node-taint
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: casval-node-taint
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: casval-node-taint
subjects:
  - kind: ServiceAccount
    name: casval-node-taint
    namespace: openshift-cluster-api
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-casval-node-taint
  namespace: openshift-cluster-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: casval-node-taint
  egress:
    - {}
  policyTypes:
    - Egress
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: casval-node-taint
  namespace: openshift-cluster-api
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: casval-node-taint
        spec:
          serviceAccountName: casval-node-taint
          restartPolicy: Never
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          tolerations:
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          containers:
            - name: taint
              image: registry.redhat.io/openshift4/ose-cli:latest
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              command: ["/bin/bash", "-euo", "pipefail", "-c"]
              args:
                - |
                  NS=openshift-cluster-api
                  SET=casval-worker
                  LABEL_KEY=node-role.kubernetes.io/burst
                  TAINT_KEY=workload
                  TAINT_VAL=burst
                  TAINT_EFFECT=NoSchedule

                  nodes=$(oc get machine.cluster.x-k8s.io -n "$NS" \
                    -l "cluster.x-k8s.io/set-name=$SET" \
                    -o go-template='{{range .items}}{{if .status.nodeRef}}{{.status.nodeRef.name}}{{"\n"}}{{end}}{{end}}' 2>&1) || {
                    echo "Failed to list machines: $nodes"
                    exit 0
                  }

                  [ -z "$nodes" ] && echo "No nodes backing MachineSet/$SET." && exit 0

                  echo "$nodes" | while read -r node; do
                    [ -z "$node" ] && continue
                    echo "--- Node/$node ---"

                    cur_label=$(oc get node "$node" -o jsonpath="{.metadata.labels.${LABEL_KEY//./\\.}}" 2>/dev/null || true)
                    if [ -z "$cur_label" ]; then
                      echo "  Adding label $LABEL_KEY="
                      oc label node "$node" "${LABEL_KEY}=" --overwrite 2>&1 || true
                    fi

                    has_taint=$(oc get node "$node" \
                      -o go-template='{{range .spec.taints}}{{if and (eq .key "'"$TAINT_KEY"'") (eq .effect "'"$TAINT_EFFECT"'")}}1{{end}}{{end}}' 2>/dev/null)
                    if [ -z "$has_taint" ]; then
                      echo "  Adding taint ${TAINT_KEY}=${TAINT_VAL}:${TAINT_EFFECT}"
                      oc adm taint node "$node" "${TAINT_KEY}=${TAINT_VAL}:${TAINT_EFFECT}" --overwrite 2>&1 || true
                    fi
                  done

                  echo "Done"
