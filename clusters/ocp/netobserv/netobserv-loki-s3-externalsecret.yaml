---
# S3 object-storage secret for the netobserv-loki LokiStack (flow logs).
# PREREQUISITE: 1Password item `netobserv-user-rustfs-cold` in the
# `lab_s3` vault (fields username/password), matching the `netobserv` IAM
# user on the COLD RustFS instance — igou-inventory
# host_vars/rustfs-cold.yml, applied via AAP rustfs_state_converge.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netobserv-loki-s3
  namespace: netobserv
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-lab-s3
  target:
    name: netobserv-loki-s3
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace # API-defaulted; declared so ArgoCD (SSA) stays Synced
      data:
        bucketnames: netobserv
        endpoint: https://truenas.igou.systems:20292
        region: us-east-1
        forcepathstyle: "true"
        access_key_id: "{{ .username }}"
        access_key_secret: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: netobserv-user-rustfs-cold
        property: username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        key: netobserv-user-rustfs-cold
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
