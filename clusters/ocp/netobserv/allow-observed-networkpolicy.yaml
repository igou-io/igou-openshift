---
# Observed-flow allow policy for netobserv (NetObserv eBPF, 1:50 sampling).
# Derived from captured inter-namespace flows; see PR body for methodology + caveats.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observed
  namespace: netobserv
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # intra-namespace (pod-to-pod within this namespace)
    - from:
        - podSelector: {}
      ports:
        - port: 3100
          protocol: TCP
        - port: 7946
          protocol: TCP
        - port: 8080
          protocol: TCP
        # LokiStack microservice gRPC (grpclb): write path distributor->ingester
        # and read path querier<->ingester/query-frontend/index-gateway. Rides
        # long-lived connections under-represented by 1:50 sampling.
        - port: 9095
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-monitoring
      ports:
        - port: 3100
          protocol: TCP
        - port: 8081
          protocol: TCP
        - port: 8083
          protocol: TCP
        - port: 9002
          protocol: TCP
        - port: 9401
          protocol: TCP
    # host-network sources: kubelet health probes and/or UWM/monitoring
    # scrapes that netobserv could not attribute to a namespace. Scoped to
    # the node/lab network. Observed metrics/health ports.
    - from:
        - ipBlock:
            cidr: 10.10.9.0/24
      ports:
        - port: 2055
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
        - port: 8083
          protocol: TCP
  egress:
    # cluster DNS (always required)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    # intra-namespace (pod-to-pod within this namespace)
    - to:
        - podSelector: {}
      ports:
        - port: 3100
          protocol: TCP
        - port: 7946
          protocol: TCP
        - port: 8080
          protocol: TCP
        # LokiStack microservice gRPC (grpclb): write path distributor->ingester
        # and read path querier<->ingester/query-frontend/index-gateway. Rides
        # long-lived connections under-represented by 1:50 sampling.
        - port: 9095
          protocol: TCP
    # kube-apiserver (observed egress to the kubernetes.default endpoint)
    - to:
        - ipBlock:
            cidr: 10.10.9.10/32
      ports:
        - port: 6443
          protocol: TCP
    # netobserv-loki ships flow blocks to the rustfs-cold S3 backend on TrueNAS (lab network); the write path was not sampled in the window but is required for flow persistence.
    # external / off-cluster egress (internet + lab devices). Cluster pod
    # and service CIDRs are excluded to block lateral movement; the node/lab
    # network (10.10.0.0/16) stays reachable for lab-device targets.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.128.0.0/14
              - 172.30.0.0/16
