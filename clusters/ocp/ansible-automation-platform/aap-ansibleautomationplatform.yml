apiVersion: aap.ansible.com/v1alpha1
kind: AnsibleAutomationPlatform
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: aap
  namespace: ansible-automation-platform
spec:
  route_tls_termination_mechanism: Edge
  admin_password_secret: aap-admin-password
  service_type: ClusterIP
  ingress_type: Route
  no_log: false
  redis_mode: standalone
  image_pull_policy: Always
  hostname: automation.apps.ocp.igou.systems
  api:
    log_level: INFO
    replicas: 1
  database:
    postgres_data_volume_init: false
    postgres_storage_class: freenas-nvmeof-ssd-csi
  route_host: automation.apps.ocp.igou.systems
  controller:
    # Liveness MUST stay disabled (period 0): the AAP 2.7 automation-controller
    # operator templates the web liveness exec against /etc/supervisord_task.conf,
    # which does not exist in the web container ("unix:///var/run/supervisor/
    # supervisor.task.sock no such file" -> always exit 1). Enabling it kills the
    # web pod every initial_delay + failure_threshold*period seconds ->
    # CrashLoopBackOff -> gateway "no healthy upstream". Upstream awx-operator
    # uses supervisord_web.conf; re-enable only after the downstream operator
    # ships that fix. Readiness (HTTP /api/v2/ping/) is correct and stays: dead
    # uwsgi workers now unroute the pod instead of serving 500s, but auto-restart
    # (the original goal of #466) is deferred.
    web_liveness_period: 0
    web_readiness_period: 10
    web_readiness_initial_delay: 20
    web_readiness_timeout: 5
    web_readiness_failure_threshold: 3
  hub:
    disabled: true
    # file_storage_storage_class: freenas-nvmeof-ssd-csi
    # file_storage_access_mode: ReadWriteOnce
    # storage_type: file
    # redis_storage_class: freenas-nvmeof-ssd-csi
    # api:
    #   replicas: 1
    # content:
    #   replicas: 1
    # redis:
    #   replicas: 1
    # resource_manager:
    #   replicas: 1
    # web:
    #   replicas: 1
    # worker:
    #   replicas: 1
  eda:
    disabled: false
