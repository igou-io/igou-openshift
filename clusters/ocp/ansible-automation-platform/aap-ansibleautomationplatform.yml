apiVersion: aap.ansible.com/v1alpha1
kind: AnsibleAutomationPlatform
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: aap
  namespace: ansible-automation-platform
spec:
  route_tls_termination_mechanism: Edge
  admin_password_secret: aap-admin-password
  service_type: ClusterIP
  ingress_type: Route
  no_log: false
  redis_mode: standalone
  image_pull_policy: Always
  hostname: automation.apps.ocp.igou.systems
  api:
    log_level: INFO
    replicas: 1
  database:
    postgres_data_volume_init: false
    postgres_storage_class: freenas-nvmeof-ssd-csi
  route_host: automation.apps.ocp.igou.systems
  controller:
    # Probes are disabled (period 0) by operator default. Without them, uwsgi
    # workers that die (e.g. postgres outage) leave the web pod Running while
    # /api/v2/ping/ flaps 500, and nothing restarts it.
    web_liveness_period: 15
    web_liveness_initial_delay: 60
    web_liveness_timeout: 5
    web_liveness_failure_threshold: 3
    web_readiness_period: 10
    web_readiness_initial_delay: 20
    web_readiness_timeout: 5
    web_readiness_failure_threshold: 3
  hub:
    disabled: true
    # file_storage_storage_class: freenas-nvmeof-ssd-csi
    # file_storage_access_mode: ReadWriteOnce
    # storage_type: file
    # redis_storage_class: freenas-nvmeof-ssd-csi
    # api:
    #   replicas: 1
    # content:
    #   replicas: 1
    # redis:
    #   replicas: 1
    # resource_manager:
    #   replicas: 1
    # web:
    #   replicas: 1
    # worker:
    #   replicas: 1
  eda:
    disabled: false
