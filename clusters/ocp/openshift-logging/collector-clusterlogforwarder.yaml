---
# Cluster log collection (issue #382): Vector DaemonSet forwarding the
# application/infrastructure/audit inputs to the LokiStack. Audit is an
# explicit input scoped to kubeAPI+openshiftAPI — the built-in `audit`
# inputRef would also collect auditd and ovn (noisiest streams). External
# (non-cluster) logs do NOT come through here — CLF receivers are scoped
# to on-cluster sources; they enter via the log-gateway Alloy aggregator
# instead.
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: collector
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: '2'
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  serviceAccount:
    name: collector
  inputs:
    # The built-in `audit` inputRef collects all four sources (kubeAPI,
    # openshiftAPI, auditd, ovn); this file always intended API audit only.
    - name: audit-api
      type: audit
      audit:
        sources:
          - kubeAPI
          - openshiftAPI
  # The operator default (limits 2Gi) OOM-kills Vector during the initial
  # catch-up read of /var/log/pods on the long-lived master — the first
  # deploy tails months of accumulated logs before the checkpoint exists.
  collector:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        # cpu limit restored: setting resources REPLACES the operator
        # default (6 cpu / 2Gi) wholesale — without it, backlog catch-up
        # after a node rejoin ran Vector at 15 cores and congested the
        # node (observed on p330/hpg5 2026-07-16).
        cpu: 4
        # 8Gi: 4Gi OOM-killed the master collector in ~23s when the #477
        # audit input rename (audit -> audit-api) reset file checkpoints
        # and Vector re-read ~600MB of apiserver audit logs from byte 0 —
        # the parse/enrich fan-out balloons several times the raw size
        # before sink backpressure engages. Requests stay 512Mi; this is
        # burst headroom only, same failure mode as the 2Gi->4Gi bump.
        memory: 8Gi
  outputs:
    - name: default-lokistack
      type: lokiStack
      lokiStack:
        target:
          name: logging-loki
          namespace: openshift-logging
        authentication:
          token:
            from: serviceAccount
      tls:
        ca:
          key: service-ca.crt
          configMapName: openshift-service-ca.crt
  filters:
    - name: multiline
      type: detectMultilineException
    # kube-apiserver audit at the Default profile is ~17GB/day, dominated
    # by read-only requests (#382 sizing assumed ~15GB/day TOTAL). Keep
    # every mutation auditable; drop reads. The audit input meta transform
    # merges the parsed event into ._internal before pipeline filters run,
    # so .verb is addressable here.
    - name: drop-audit-read-verbs
      type: drop
      drop:
        - test:
            - field: .verb
              matches: '^(get|list|watch)$'
    # democratic-csi structural noise the winston logLevel=warn (#484)
    # can't reach: bare "executing ... command:" stdout writes and
    # csi-proxy's unconditional per-request/response dumps — all driven
    # by kubelet's ~1/min/volume NodeGetVolumeStats polling. Errors and
    # warnings don't match these anchors and still flow.
    - name: drop-csi-exec-noise
      type: drop
      drop:
        - test:
            - field: .kubernetes.namespace_name
              matches: '^democratic-csi$'
            - field: .message
              matches: '^(executing (mount|filesystem|ssh) command:|\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2} (request|response))'
    # OLM catalog registry pods log every gRPC round-trip ("finished
    # call") at info — health probes + resolver polling make this ~2GB/day
    # of chronic no-signal chatter, spiking ~4x during catalog refreshes.
    # Errors/warnings from the same pods don't match and still flow.
    - name: drop-olm-catalog-noise
      type: drop
      drop:
        - test:
            - field: .kubernetes.namespace_name
              matches: '^openshift-marketplace$'
            - field: .message
              matches: 'msg="finished call"'
  pipelines:
    - name: application
      inputRefs:
        - application
      filterRefs:
        - multiline
        - drop-csi-exec-noise
      outputRefs:
        - default-lokistack
    - name: infrastructure
      inputRefs:
        - infrastructure
      filterRefs:
        - drop-olm-catalog-noise
      outputRefs:
        - default-lokistack
    - name: audit
      inputRefs:
        - audit-api
      filterRefs:
        - drop-audit-read-verbs
      outputRefs:
        - default-lokistack
