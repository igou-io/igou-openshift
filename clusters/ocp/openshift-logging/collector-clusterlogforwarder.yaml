---
# Cluster log collection (issue #382): Vector DaemonSet forwarding the
# application/infrastructure/audit inputs to the LokiStack. Audit input
# defaults to kubeAPI+openshiftAPI; ovn/auditd deliberately left out
# (noisiest streams). External (non-cluster) logs do NOT come through
# here — CLF receivers are scoped to on-cluster sources; they enter via
# the log-gateway Alloy aggregator instead.
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: collector
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: '2'
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  serviceAccount:
    name: collector
  # The operator default (limits 2Gi) OOM-kills Vector during the initial
  # catch-up read of /var/log/pods on the long-lived master — the first
  # deploy tails months of accumulated logs before the checkpoint exists.
  collector:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        # cpu limit restored: setting resources REPLACES the operator
        # default (6 cpu / 2Gi) wholesale — without it, backlog catch-up
        # after a node rejoin ran Vector at 15 cores and congested the
        # node (observed on p330/hpg5 2026-07-16).
        cpu: 4
        memory: 4Gi
  outputs:
    - name: default-lokistack
      type: lokiStack
      lokiStack:
        target:
          name: logging-loki
          namespace: openshift-logging
        authentication:
          token:
            from: serviceAccount
      tls:
        ca:
          key: service-ca.crt
          configMapName: openshift-service-ca.crt
  filters:
    - name: multiline
      type: detectMultilineException
    # TEMPORARY — remove after 2026-07-22. Entries older than the
    # LokiStack schema effectiveDate (2026-07-15) but younger than
    # reject_old_samples_max_age (7d) get a 500 "no schema config found"
    # from the ingester; Vector retries 500s forever, and the poisoned
    # batches head-of-line block the sink (live ingestion stalled for
    # ~90min on the master during backlog replay). The webhook forbids
    # backdating the schema, so drop pre-schema records at the collector.
    # Filters run before the viaq transform: journald events carry a
    # parsed .timestamp, container events are still the raw CRI line in
    # .message (which starts with the ISO timestamp) — hence two tests.
    - name: drop-pre-schema-backlog
      type: drop
      drop:
        - test:
            - field: .timestamp
              matches: '^(20(1\d|2[0-5])-|2026-0[1-6]-|2026-07-0|2026-07-1[0-4])'
        - test:
            - field: .message
              matches: '^(20(1\d|2[0-5])-|2026-0[1-6]-|2026-07-0|2026-07-1[0-4])'
  pipelines:
    - name: application
      inputRefs:
        - application
      filterRefs:
        - multiline
        - drop-pre-schema-backlog
      outputRefs:
        - default-lokistack
    - name: infrastructure
      inputRefs:
        - infrastructure
      filterRefs:
        - drop-pre-schema-backlog
      outputRefs:
        - default-lokistack
    - name: audit
      inputRefs:
        - audit
      outputRefs:
        - default-lokistack
