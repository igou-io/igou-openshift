---
# ClusterRoleBindings for the CLF collector SA to the operator-shipped
# ClusterRoles: the three collect-*-logs roles authorize *reading* each
# log source, logging-collector-logs-writer authorizes *writing* through
# the LokiStack gateway (distinct authz layers in Logging 6.x).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collector-collect-application-logs
  annotations:
    argocd.argoproj.io/sync-wave: '1'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-application-logs
subjects:
  - kind: ServiceAccount
    name: collector
    namespace: openshift-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collector-collect-infrastructure-logs
  annotations:
    argocd.argoproj.io/sync-wave: '1'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-infrastructure-logs
subjects:
  - kind: ServiceAccount
    name: collector
    namespace: openshift-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collector-collect-audit-logs
  annotations:
    argocd.argoproj.io/sync-wave: '1'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-audit-logs
subjects:
  - kind: ServiceAccount
    name: collector
    namespace: openshift-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collector-logging-collector-logs-writer
  annotations:
    argocd.argoproj.io/sync-wave: '1'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: logging-collector-logs-writer
subjects:
  - kind: ServiceAccount
    name: collector
    namespace: openshift-logging
