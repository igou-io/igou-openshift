---
# S3 object-storage secret for the logging-loki LokiStack (issue #382).
# PREREQUISITE: 1Password item `loki-user-rustfs` in the `lab_s3` vault
# (fields username/password), matching the `loki` IAM user on the hot
# (ssd) RustFS instance — igou-inventory host_vars/rustfs.yml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: logging-loki-s3
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-lab-s3
  target:
    name: logging-loki-s3
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace # API-defaulted; declared so ArgoCD (SSA) stays Synced
      data:
        bucketnames: loki
        endpoint: https://truenas.igou.systems:30292
        region: us-east-1
        forcepathstyle: "true"
        access_key_id: "{{ .username }}"
        access_key_secret: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: loki-user-rustfs
        property: username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        key: loki-user-rustfs
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
