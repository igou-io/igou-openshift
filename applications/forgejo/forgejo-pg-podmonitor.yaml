---
# Hand-managed replacement for the PodMonitor that CNPG used to generate via
# spec.monitoring.enablePodMonitor (deprecated in 1.29). Distinct name from the
# operator's `forgejo-pg` so the two can coexist briefly during the cutover.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: forgejo-pg-metrics
  namespace: forgejo
  labels:
    cnpg.io/cluster: forgejo-pg
spec:
  namespaceSelector: {}
  podMetricsEndpoints:
    - port: metrics
  selector:
    matchLabels:
      cnpg.io/cluster: forgejo-pg
      cnpg.io/podRole: instance
