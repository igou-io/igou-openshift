apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo
resources:
  - default-deny-networkpolicy.yaml
  - allow-observed-networkpolicy.yaml
  - forgejo-namespace.yaml
  - forgejo-pg-cluster.yaml
  - forgejo-pg-objectstore.yaml
  - forgejo-pg-scheduledbackup.yaml
  - cnpg-s3-credentials-externalsecret.yaml
  - forgejo-pg-podmonitor.yaml
  - forgejo-secrets-externalsecret.yaml
  - use-scc-nonroot-v2-role.yaml
  - forgejo-nonroot-v2-rolebinding.yaml
helmCharts:
  - name: forgejo
    namespace: forgejo
    version: 17.0.1
    releaseName: forgejo
    repo: oci://code.forgejo.org/forgejo-helm
    valuesInline:
      service:
        http:
          type: ClusterIP
          port: 3000
        ssh:
          type: ClusterIP
          port: 22

      ingress:
        enabled: false

      route:
        enabled: true
        host: forgejo.apps.ocp.igou.systems
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect

      persistence:
        enabled: true
        create: true
        storageClass: freenas-nvmeof-ssd-csi
        size: 100Gi
        claimName: forgejo-shared-storage

      replicaCount: 1

      # forgejo's process footprint is ~300Mi; the rest of what shows up as
      # "memory" is reclaimable git page cache. A limit makes the kernel reclaim
      # that cache instead of letting it grow unbounded (it reached 21Gi with no
      # limit) and protects the node from a genuine spike. Safe because git's
      # own heap is capped via gitea.config.[git.config] pack.* below, so gc /
      # repack / upload-pack of the large repos can't exceed the limit.
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi

      serviceAccount:
        create: true
        name: forgejo

      gitea:
        admin:
          existingSecret: forgejo-secrets
          passwordMode: initialOnlyRequireReset
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
        config:
          database:
            DB_TYPE: postgres
            SCHEMA: public
          server:
            ROOT_URL: https://forgejo.apps.ocp.igou.systems/
            SSH_DOMAIN: forgejo.apps.ocp.igou.systems
          webhook:
            ALLOWED_HOST_LIST: private
          # Cap git's own memory so gc/repack/upload-pack of the large mirror
          # repos (k8s-at-home-search is ~13Gi) stay well under the cgroup
          # memory limit above. Bounds total git heap to ~threads*windowMemory
          # + deltaCacheSize (~0.4Gi worst case) regardless of repo size.
          "git.config":
            pack.windowMemory: 128m
            pack.deltaCacheSize: 128m
            pack.threads: 2
        additionalConfigFromEnvs:
          - name: GITEA__database__HOST
            valueFrom:
              secretKeyRef:
                name: forgejo-pg-app
                key: host
          - name: GITEA__database__NAME
            valueFrom:
              secretKeyRef:
                name: forgejo-pg-app
                key: dbname
          - name: GITEA__database__USER
            valueFrom:
              secretKeyRef:
                name: forgejo-pg-app
                key: username
          - name: GITEA__database__PASSWD
            valueFrom:
              secretKeyRef:
                name: forgejo-pg-app
                key: password

      test:
        enabled: false
