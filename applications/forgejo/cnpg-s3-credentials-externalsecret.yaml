---
# S3 credentials for the CNPG Barman Cloud Plugin backups of forgejo-pg.
# The ObjectStore (forgejo-pg-objectstore.yaml) references the two keys below
# via s3Credentials.accessKeyId / .secretAccessKey.
#
# PREREQUISITE: a 1Password item `cnpg-s3-backup` must exist in the `ocp-pull`
# vault with fields `access_key_id` and `secret_access_key` (a dedicated S3
# user/key on the TrueNAS S3 endpoint with read/write to the cnpg-backups bucket).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-s3-credentials
  namespace: forgejo
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-sdk-ocp-pull
  target:
    name: cnpg-s3-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        ACCESS_KEY_ID: "{{ .access_key_id }}"
        ACCESS_SECRET_KEY: "{{ .secret_access_key }}"
  dataFrom:
    - extract:
        key: cnpg-s3-backup
