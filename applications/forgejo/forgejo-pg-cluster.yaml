---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: forgejo-pg
  namespace: forgejo
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  instances: 1
  enablePDB: false
  imagePullPolicy: IfNotPresent
  # Pin to the always-present control-plane host so a rolling restart never
  # migrates the RWO NVMe-oF PVC to an (ephemeral CAPI) worker node and trips the
  # democratic-csi Multi-Attach bug. See docs/runbooks/nvmeof-stuck-multiattach.md.
  affinity:
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
    podAntiAffinityType: preferred # CNPG default; declared to avoid ArgoCD drift
  # 2026-07-03: the forgejo database was disaster-recovered from Barman
  # (bootstrap.recovery + a temporary externalClusters). Now restored and
  # verified, this is reverted to steady-state initdb so a future Cluster
  # recreate re-inits fresh rather than silently rolling back to the pre-disaster
  # snapshot. The live cluster keeps its recovery-baked bootstrap (immutable) —
  # the app ignoreDifferences on /spec/bootstrap + /spec/externalClusters
  # suppresses that drift.
  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo
  storage:
    size: 10Gi
    storageClass: freenas-nvmeof-ssd-csi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  # Barman Cloud Plugin: enables continuous WAL archiving + backups to the
  # forgejo-pg-backup ObjectStore. serverName defaults to the cluster name
  # (forgejo-pg) and is the key used by restore (bootstrap.recovery).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true # operator-defaulted; declared so ArgoCD (SSA) stays Synced
      isWALArchiver: true
      parameters:
        barmanObjectName: forgejo-pg-backup
        # Archive WAL to a NEW serverName so the post-recovery timeline does not
        # collide with the pre-disaster archive we recovered from (CNPG refuses
        # to archive into a non-empty destination for a different server).
        serverName: forgejo-pg-r20260704
