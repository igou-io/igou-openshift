---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: forgejo-pg
  namespace: forgejo
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  instances: 1
  enablePDB: false
  imagePullPolicy: IfNotPresent
  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo
  storage:
    size: 10Gi
    storageClass: freenas-nvmeof-ssd-csi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  # Barman Cloud Plugin: enables continuous WAL archiving + backups to the
  # forgejo-pg-backup ObjectStore. serverName defaults to the cluster name
  # (forgejo-pg) and is the key used by restore (bootstrap.recovery).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true # operator-defaulted; declared so ArgoCD (SSA) stays Synced
      isWALArchiver: true
      parameters:
        barmanObjectName: forgejo-pg-backup
