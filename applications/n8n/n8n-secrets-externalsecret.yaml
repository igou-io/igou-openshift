apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-secrets
  namespace: n8n
spec:
  refreshInterval: 24h
  dataFrom:
  - extract:
      conversionStrategy: Default
      decodingStrategy: None
      key: n8n-secrets
      metadataPolicy: None
      nullBytePolicy: Ignore
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-sdk-ocp-pull
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
