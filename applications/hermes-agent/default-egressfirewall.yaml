apiVersion: k8s.ovn.org/v1
kind: EgressFirewall
metadata:
  # OVN-K requires this object to be named "default"
  name: default
  namespace: hermes
spec:
  egress:
    # === DEBUG WINDOW (open, operator-held until go-live) — allow-all egress for
    # ongoing convergence/debug work. Re-lock (remove this rule) at go-live. ===
    # - type: Allow
    #   to:
    #     cidrSelector: 0.0.0.0/0
    # === Phase-2b install window (MANUAL operator toggle — no Ansible touches this file) ===
    # Hermes's installer + dnf need broad internet. To run the convergence's
    # install phase, PREPEND an allow-all rule here (OVN evaluates in order,
    # first match wins), commit, let Argo sync, run the workflow's install
    # nodes, then REVERT it to re-lock:
    #   - type: Allow
    #     to:
    #       cidrSelector: 0.0.0.0/0
    # The committed default below stays LOCKED.
    # OpenAI API
    # OpenAI direct API
    - type: Allow
      to:
        dnsName: api.openai.com
      ports:
        - protocol: TCP
          port: 443

    # Opencode
    - type: Allow
      to:
        dnsName: opencode.ai
      ports:
        - protocol: TCP
          port: 443

    # OpenAI OAuth / Codex-style provider, only needed if enabled
    - type: Allow
      to:
        dnsName: auth.openai.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: chatgpt.com
      ports:
        - protocol: TCP
          port: 443

    # Slack API + Socket Mode
    - type: Allow
      to:
        dnsName: slack.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.slack.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: wss-primary.slack.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: wss-backup.slack.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: wss-mobile.slack.com
      ports:
        - protocol: TCP
          port: 443

    # Hermes / Nous model catalog and provider metadata
    - type: Allow
      to:
        dnsName: hermes-agent.nousresearch.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: portal.nousresearch.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: inference-api.nousresearch.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: models.dev
      ports:
        - protocol: TCP
          port: 443

    # Cursor Agent / CLI (https://cursor.com/docs/enterprise/network-configuration)
    - type: Allow
      to:
        dnsName: api.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api2.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api2direct.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api3.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api5.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: cursor.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.cursor.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: agent.api5.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: agentn.api5.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: agent.us.api5.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: agentn.us.api5.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: agent.global.api5.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: agentn.global.api5.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: authenticate.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: authenticator.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: authentication.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: prod.authentication.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: repo42.cursor.sh
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: downloads.cursor.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: cursor-cdn.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: marketplace.cursorapi.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: anysphere-binaries.s3.us-east-1.amazonaws.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: cloud-agent-artifacts.s3.us-east-1.amazonaws.com
      ports:
        - protocol: TCP
          port: 443

    # GitHub / skills / source installs. Keep DNS rules for readability, but
    # also allow GitHub's published web/git IPv4 ranges: OVN DNS-name egress
    # can admit only one resolved A record while git receives another valid
    # GitHub address. Source: https://docs.github.com/en/authentication/
    # keeping-your-account-and-data-secure/about-githubs-ip-addresses
    # (the docs refer to the Meta API's `web`/`git` CIDR ranges).
    - type: Allow
      to:
        cidrSelector: 192.30.252.0/22
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        cidrSelector: 185.199.108.0/22
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        cidrSelector: 140.82.112.0/20
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        cidrSelector: 143.55.64.0/20
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: github.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.github.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: raw.githubusercontent.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: objects.githubusercontent.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: codeload.github.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: agentskills.io
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: modelcontextprotocol.io
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: quay.io
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: ghcr.io
      ports:
        - protocol: TCP
          port: 443

    # Python package downloads used by `uv pip install -e .[all]`.
    # pypi.org and files.pythonhosted.org currently resolve through these
    # Fastly edges from the cluster DNS path.
    - type: Allow
      to:
        cidrSelector: 151.101.0.0/24
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        cidrSelector: 151.101.64.0/24
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        cidrSelector: 151.101.128.0/24
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        cidrSelector: 151.101.192.0/24
      ports:
        - protocol: TCP
          port: 443

    # npm package registry (npx / npm installs)
    - type: Allow
      to:
        dnsName: registry.npmjs.org
      ports:
        - protocol: TCP
          port: 443

    # CentOS Stream dnf mirrors (package installs/updates during Hermes VM convergence)
    - type: Allow
      to:
        dnsName: mirror.stream.centos.org
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

    # Optional providers: keep only the ones you actually use.
    - type: Allow
      to:
        dnsName: openrouter.ai
      ports:
        - protocol: TCP
          port: 443
    # Claude Code CLI (https://code.claude.com/docs/en/network-config)
    # Anthropic publishes stable IP ranges for DNS-resolution robustness, same
    # rationale as the GitHub CIDR rules above (OVN DNS-name egress may admit
    # only one resolved A record). Source:
    # https://platform.claude.com/docs/en/api/ip-addresses
    - type: Allow
      to:
        cidrSelector: 160.79.104.0/23
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        cidrSelector: 160.79.104.0/21
      ports:
        - protocol: TCP
          port: 443
    # Claude Code account auth + Console auth
    - type: Allow
      to:
        dnsName: claude.ai
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: platform.claude.com
      ports:
        - protocol: TCP
          port: 443
    # Plugin executable / native installer / auto-updater downloads
    - type: Allow
      to:
        dnsName: downloads.claude.ai
      ports:
        - protocol: TCP
          port: 443
    # Auto-updater on versions prior to 2.1.116
    - type: Allow
      to:
        dnsName: storage.googleapis.com
      ports:
        - protocol: TCP
          port: 443
    # Claude in Chrome extension WebSocket bridge
    - type: Allow
      to:
        dnsName: bridge.claudeusercontent.com
      ports:
        - protocol: TCP
          port: 443
    # Anthropic API (direct model provider)
    - type: Allow
      to:
        dnsName: api.anthropic.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: generativelanguage.googleapis.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.groq.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.deepseek.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.fireworks.ai
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.together.xyz
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.cerebras.ai
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.mistral.ai
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: integrate.api.nvidia.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: router.huggingface.co
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.x.ai
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.minimax.io
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.xiaomimimo.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.novita.ai
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.elevenlabs.io
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: browserbase.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.exa.ai
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: api.firecrawl.dev
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: flyers-ng.flippback.com
      ports:
        - protocol: TCP
          port: 443

    # Google Sheets API — storescrape cron appends meat prices via
    # scripts/sheets_append.py (zero-role service account, single shared
    # spreadsheet). oauth2 is the service-account token exchange.
    - type: Allow
      to:
        dnsName: sheets.googleapis.com
      ports:
        - protocol: TCP
          port: 443
    - type: Allow
      to:
        dnsName: oauth2.googleapis.com
      ports:
        - protocol: TCP
          port: 443

    # igou.io homelab sites
    # (sandsoftime.igou.io removed: Hermes consumes the in-cluster service
    # directly — see hermes-egress-networkpolicy.yaml — not the public route.)
    - type: Allow
      to:
        dnsName: igou.io
      ports:
        - protocol: TCP
          port: 443

    # Central log shipping (igou-openshift#382 phase 4): Alloy on the VM
    # pushes the journal to the log-gateway Loki push listener on the
    # trusted-lan VIP.
    - type: Allow
      to:
        cidrSelector: 10.10.150.16/32
      ports:
        - protocol: TCP
          port: 3500

    # Default deny all other IPv4 egress.
    - type: Deny
      to:
        cidrSelector: 0.0.0.0/0
