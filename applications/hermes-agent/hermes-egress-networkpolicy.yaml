apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-egress
  namespace: hermes
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # cluster DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - protocol: UDP
          port: 5353
        - protocol: TCP
          port: 5353
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # in-cluster LLM inference (east-west). Allowlist the specific model pods by
    # label: qwen3-35b-a3b (primary), qwen35-2b + gemma-4-e2b (fallback chain
    # configured in the Hermes playbook's `hermes_config.fallback_model`).
    # Least-privilege: only these named models are reachable on 8080.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llmkube-system
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - qwen3-35b-a3b
                  - qwen35-2b
                  - gemma-4-e2b
      ports:
        - protocol: TCP
          port: 8080
    # in-cluster web search backend (east-west). Hermes reaches SearXNG over
    # cluster DNS; SearXNG owns internet-facing search engine egress.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: searxng
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: searxng
              app.kubernetes.io/name: searxng
      ports:
        - protocol: TCP
          port: 8080
    # in-cluster Quay registry (image pull)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quay-enterprise
    # external (EgressFirewall decides which hosts); except cluster CIDRs to block lateral movement
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.128.0.0/14
              - 172.30.0.0/16
