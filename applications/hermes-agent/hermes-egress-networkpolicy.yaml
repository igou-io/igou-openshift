apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-egress
  namespace: hermes
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # cluster DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - protocol: UDP
          port: 5353
        - protocol: TCP
          port: 5353
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # qwen3 inference service (east-west default LLM)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llmkube-system
          podSelector:
            matchLabels:
              app: qwen3-35b-a3b
      ports:
        - protocol: TCP
          port: 8080
    # in-cluster Quay registry (image pull)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quay-enterprise
    # external (EgressFirewall decides which hosts); except cluster CIDRs to block lateral movement
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.128.0.0/14
              - 172.30.0.0/16
