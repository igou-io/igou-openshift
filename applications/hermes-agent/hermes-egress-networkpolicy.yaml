apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-egress
  namespace: hermes
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # cluster DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - protocol: UDP
          port: 5353
        - protocol: TCP
          port: 5353
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # in-cluster LLM inference (east-west). Allowlist the specific model pods by
    # label: qwen3-35b-a3b (primary), qwen35-2b + gemma-4-e2b (fallback chain
    # configured in the Hermes playbook's `hermes_config.fallback_model`).
    # Least-privilege: only these named models are reachable on 8080.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llmkube-system
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - qwen3-35b-a3b
                  - qwen35-2b
                  - gemma-4-e2b
      ports:
        - protocol: TCP
          port: 8080
    # in-cluster web search backend (east-west). Hermes reaches SearXNG over
    # cluster DNS; SearXNG owns internet-facing search engine egress.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: searxng
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: searxng
              app.kubernetes.io/name: searxng
      ports:
        - protocol: TCP
          port: 8080
    # in-cluster Firecrawl API (east-west). Hermes reaches the API for website
    # extraction only; Redis, RabbitMQ, Postgres, Playwright, and worker pods
    # remain unreachable (no egress rule and controller=api podSelector).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: firecrawl
          podSelector:
            matchLabels:
              app.kubernetes.io/controller: api
              app.kubernetes.io/instance: firecrawl
              app.kubernetes.io/name: firecrawl
      ports:
        - protocol: TCP
          port: 3002
    # in-cluster sands-of-time API (east-west). Hermes reads the HTTP API via
    # the ClusterIP service (port 80 -> pod 8000); NetworkPolicy matches the
    # post-DNAT pod port. Read-only consumer — the app's admin surface is
    # bearer-token gated, this rule only grants network reach.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sands-of-time
          podSelector:
            matchLabels:
              app.kubernetes.io/name: sands-of-time
      ports:
        - protocol: TCP
          port: 8000
    # Central log shipping (igou-openshift#382): the VM's Alloy pushes
    # to the log-gateway via the VIP, but OVN load-balancer DNAT runs
    # BEFORE egress policy, so the flow must be allowed as east-west to
    # the post-DNAT gateway pod — the 0.0.0.0/0 rule's cluster-CIDR
    # except would otherwise eat it.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: log-gateway
      ports:
        - protocol: TCP
          port: 3500
    # in-cluster Quay registry (image pull)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quay-enterprise
    # external (EgressFirewall decides which hosts); except cluster CIDRs to block lateral movement
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.128.0.0/14
              - 172.30.0.0/16
