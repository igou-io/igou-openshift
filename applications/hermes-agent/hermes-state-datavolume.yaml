apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: hermes-state
  namespace: hermes
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  source:
    blank: {}
  storage:
    accessModes:
      - ReadWriteOnce
    storageClassName: freenas-nvmeof-ssd-csi
    resources:
      requests:
        storage: 30Gi
