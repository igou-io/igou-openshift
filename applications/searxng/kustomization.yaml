---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: searxng
resources:
  - searxng-namespace.yaml
  - searxng-networkpolicy.yaml
  - searxng-secrets-externalsecret.yaml
configMapGenerator:
  - name: searxng-config
    files:
      - settings.yml
generatorOptions:
  disableNameSuffixHash: true
helmCharts:
  - name: app-template
    namespace: searxng
    version: 4.6.2
    releaseName: searxng
    repo: oci://ghcr.io/bjw-s-labs/helm
    valuesFile: values-dummy.yaml
    valuesInline:
      defaultPodOptions:
        automountServiceAccountToken: false
      controllers:
        searxng:
          type: deployment
          replicas: 1
          strategy: RollingUpdate
          pod:
            securityContext:
              seccompProfile:
                type: RuntimeDefault
          containers:
            app:
              image:
                repository: docker.io/searxng/searxng
                tag: "2026.6.24-e3126b89e@sha256:77b6ec55d5176fc47cfe91df5e182393133305358741d0c80ebbeec75ac39f99"
                pullPolicy: IfNotPresent
              env:
                SEARXNG_SECRET:
                  valueFrom:
                    secretKeyRef:
                      name: searxng-secrets
                      key: secret_key
              probes:
                liveness:
                  enabled: true
                  type: HTTP
                  path: /healthz
                  port: 8080
                readiness:
                  enabled: true
                  type: HTTP
                  path: /healthz
                  port: 8080
                startup:
                  enabled: true
                  type: HTTP
                  path: /healthz
                  port: 8080
                  spec:
                    failureThreshold: 30
                    periodSeconds: 10
              resources: {}
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
      persistence:
        config:
          type: configMap
          name: searxng-config
          globalMounts:
            - path: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
      service:
        app:
          controller: searxng
          ports:
            http:
              port: 8080
              targetPort: 8080
      serviceAccount:
        searxng:
          enabled: true
