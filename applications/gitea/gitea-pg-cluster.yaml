---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-pg
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 1
  imagePullPolicy: IfNotPresent
  bootstrap:
    initdb:
      database: gitea
      owner: gitea
  storage:
    size: 10Gi
    storageClass: freenas-nvmeof-ssd-csi
  monitoring:
    enablePodMonitor: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
