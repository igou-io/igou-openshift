apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: squid-proxy
resources:
  - squid-proxy-namespace.yaml
configMapGenerator:
  - name: squid-proxy-config
    files:
      - squid.conf
generatorOptions:
  disableNameSuffixHash: true
helmCharts:
- name: app-template
  namespace: squid-proxy
  version: 4.6.2
  releaseName: squid-proxy
  repo: oci://ghcr.io/bjw-s-labs/helm
  valuesFile: values-dummy.yaml
  valuesInline:
    controllers:
      squid-proxy:
        type: deployment
        replicas: 1
        strategy: RollingUpdate
        pod:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ubuntu/squid
              tag: "6.9-24.04_beta"
              pullPolicy: IfNotPresent
            # Run squid directly (foreground, no init script) so OpenShift's
            # arbitrary non-root UID doesn't hit root-only setup steps.
            command: ["/usr/sbin/squid"]
            args: ["-N", "-f", "/etc/squid/squid.conf"]
            env: {}
            probes:
              liveness:
                enabled: true
                type: TCP
                spec:
                  initialDelaySeconds: 10
                  periodSeconds: 15
              readiness:
                enabled: true
                type: TCP
                spec:
                  initialDelaySeconds: 10
                  periodSeconds: 15
              startup:
                enabled: true
                type: TCP
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              capabilities:
                drop:
                  - ALL
    persistence:
      squid-config:
        type: configMap
        name: squid-proxy-config
        globalMounts:
          - path: /etc/squid/squid.conf
            subPath: squid.conf
            readOnly: true
      spool:
        type: emptyDir
        globalMounts:
          - path: /var/spool/squid
    service:
      app:
        controller: squid-proxy
        ports:
          proxy:
            port: 3128
            targetPort: 3128
            protocol: TCP
    serviceAccount:
      squid-proxy:
        enabled: true
