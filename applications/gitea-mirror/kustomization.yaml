apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gitea-mirror
resources:
  - gitea-mirror-namespace.yaml
  - gitea-mirror-config-pvc.yaml
  - gitea-mirror-secrets-externalsecret.yaml
  - gitea-mirror-probe.yaml
helmCharts:
- name: app-template
  namespace: gitea-mirror
  version: 4.6.2
  releaseName: gitea-mirror
  repo: oci://ghcr.io/bjw-s-labs/helm
  valuesFile: values-dummy.yaml
  valuesInline:
    controllers:
      gitea-mirror:
        type: deployment
        replicas: 1
        strategy: RollingUpdate
        pod:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ghcr.io/raylabshq/gitea-mirror
              tag: v3.15.6@sha256:ad2d7f59d2616edd7e0907c8feb07e6e08199b4818c711ee9c7b06df9600b442
              pullPolicy: IfNotPresent
            env:
              NODE_ENV: production
              HOST: 0.0.0.0
              PORT: "4321"
              DATABASE_URL: file:/app/data/gitea-mirror.db
              BETTER_AUTH_URL: https://gitea-mirror.apps.ocp.igou.systems
              PUBLIC_BETTER_AUTH_URL: https://gitea-mirror.apps.ocp.igou.systems
              BETTER_AUTH_TRUSTED_ORIGINS: https://gitea-mirror.apps.ocp.igou.systems
              AUTO_IMPORT_REPOS: "true"
              SCHEDULE_ENABLED: "true"
              SCHEDULE_INTERVAL: "0 4 * * *"
              CLEANUP_DELETE_IF_NOT_IN_GITHUB: "true"
              CLEANUP_ORPHANED_REPO_ACTION: archive
              CLEANUP_DRY_RUN: "false"
            envFrom:
              - secretRef:
                  name: gitea-mirror-secrets
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/health
                port: http
              readiness:
                enabled: true
                type: HTTP
                path: /api/health
                port: http
              startup:
                enabled: true
                type: HTTP
                path: /api/health
                port: http
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: gitea-mirror-config
        advancedMounts:
          gitea-mirror:
            app:
              - path: /app/data
    service:
      app:
        controller: gitea-mirror
        ports:
          http:
            port: 4321
            targetPort: 4321
    ingress:
      app:
        className: openshift-default
        annotations:
          route.openshift.io/termination: edge
        hosts:
          - host: gitea-mirror.apps.ocp.igou.systems
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
    serviceAccount:
      gitea-mirror:
        enabled: true
