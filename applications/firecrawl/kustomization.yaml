---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: firecrawl
resources:
  - default-deny-networkpolicy.yaml
  - allow-observed-networkpolicy.yaml
  - firecrawl-namespace.yaml
  - firecrawl-nuq-postgres-pvc.yaml
  - firecrawl-secrets-password.yaml
  - firecrawl-secrets-externalsecret.yaml
helmCharts:
  - name: app-template
    namespace: firecrawl
    version: 4.6.2
    releaseName: firecrawl
    repo: oci://ghcr.io/bjw-s-labs/helm
    valuesFile: values-dummy.yaml
    valuesInline:
      global:
        fullnameOverride: firecrawl

      defaultPodOptions:
        automountServiceAccountToken: false
        securityContext:
          seccompProfile:
            type: RuntimeDefault

      configMaps:
        config:
          enabled: true
          data:
            NUM_WORKERS_PER_QUEUE: "2"
            PORT: "3002"
            HOST: "0.0.0.0"
            WORKER_PORT: "3005"
            EXTRACT_WORKER_PORT: "3004"
            NUQ_WORKER_PORT: "3006"
            NUQ_PREFETCH_WORKER_PORT: "3011"
            NUQ_WORKER_COUNT: "1"
            USE_DB_AUTHENTICATION: "false"
            IS_KUBERNETES: "true"
            ENV: production
            LOGGING_LEVEL: INFO
            FIRECRAWL_APP_SCHEME: http
            FIRECRAWL_APP_HOST: firecrawl-api
            FIRECRAWL_APP_PORT: "3002"
            PLAYWRIGHT_MICROSERVICE_URL: http://firecrawl-playwright:3000/scrape
            OPENAI_BASE_URL: ""
            MODEL_NAME: ""
            MODEL_EMBEDDING_NAME: ""
            OLLAMA_BASE_URL: ""
            PROXY_SERVER: ""
            PROXY_USERNAME: ""
            SEARXNG_ENDPOINT: http://searxng.searxng.svc.cluster.local:8080
            SEARXNG_ENGINES: ""
            SEARXNG_CATEGORIES: ""
            SELF_HOSTED_WEBHOOK_URL: ""
        playwright-config:
          enabled: true
          data:
            PORT: "3000"
            ALLOW_LOCAL_WEBHOOKS: ""
            BLOCK_MEDIA: "true"
            MAX_CONCURRENT_PAGES: "2"

      controllers:
        api:
          type: deployment
          replicas: 1
          strategy: RollingUpdate
          pod:
            terminationGracePeriodSeconds: 180
          containers:
            app:
              nameOverride: api
              command: ["node"]
              args: ["--max-old-space-size=2048", "dist/src/index.js"]
              image: &firecrawlImage
                repository: docker.io/winkkgmbh/firecrawl
                digest: sha256:8b26e0967fa83e7f92d2e506e0957c10fe52f082b829e56a72ade0f7a627ed50
                pullPolicy: IfNotPresent
              envFrom: &firecrawlEnvFrom
                - configMapRef:
                    name: firecrawl-config
                - secretRef:
                    name: firecrawl-secret
              env: &firecrawlRuntimeEnv
                - name: FLY_PROCESS_GROUP
                  value: app
                - name: NUQ_POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: REDIS_PASSWORD
                - name: NUQ_POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: NUQ_POSTGRES_PASSWORD
                - name: RABBITMQ_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: RABBITMQ_PASSWORD
                - name: REDIS_URL
                  value: redis://:$(REDIS_PASSWORD)@firecrawl-redis:6379
                - name: REDIS_RATE_LIMIT_URL
                  value: redis://:$(REDIS_PASSWORD)@firecrawl-redis:6379
                - name: NUQ_DATABASE_URL
                  value: postgresql://postgres:$(NUQ_POSTGRES_PASSWORD)@firecrawl-nuq-postgres:5432/postgres
                - name: NUQ_DATABASE_URL_LISTEN
                  value: postgresql://postgres:$(NUQ_POSTGRES_PASSWORD)@firecrawl-nuq-postgres:5432/postgres
                - name: NUQ_RABBITMQ_URL
                  value: amqp://firecrawl:$(RABBITMQ_PASSWORD)@firecrawl-rabbitmq:5672
              probes:
                liveness:
                  enabled: true
                  type: HTTP
                  path: /v0/health/liveness
                  port: 3002
                  spec:
                    initialDelaySeconds: 30
                    periodSeconds: 30
                    timeoutSeconds: 5
                    failureThreshold: 3
                readiness:
                  enabled: true
                  type: HTTP
                  path: /v0/health/readiness
                  port: 3002
                  spec:
                    initialDelaySeconds: 30
                    periodSeconds: 30
                    timeoutSeconds: 5
                    failureThreshold: 3
              resources:
                requests:
                  cpu: 300m
                  memory: 1Gi
                limits:
                  cpu: "1"
                  memory: 2Gi
              securityContext: &containerSecurityContext
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL

        worker:
          type: deployment
          replicas: 1
          strategy: RollingUpdate
          pod:
            terminationGracePeriodSeconds: 60
          containers:
            app:
              nameOverride: worker
              command: ["node"]
              args: ["--max-old-space-size=1536", "dist/src/services/queue-worker.js"]
              image: *firecrawlImage
              envFrom: *firecrawlEnvFrom
              env:
                - name: FLY_PROCESS_GROUP
                  value: worker
                - name: WORKER_PORT
                  value: "3005"
                - name: NUQ_POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: REDIS_PASSWORD
                - name: NUQ_POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: NUQ_POSTGRES_PASSWORD
                - name: RABBITMQ_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: RABBITMQ_PASSWORD
                - name: REDIS_URL
                  value: redis://:$(REDIS_PASSWORD)@firecrawl-redis:6379
                - name: REDIS_RATE_LIMIT_URL
                  value: redis://:$(REDIS_PASSWORD)@firecrawl-redis:6379
                - name: NUQ_DATABASE_URL
                  value: postgresql://postgres:$(NUQ_POSTGRES_PASSWORD)@firecrawl-nuq-postgres:5432/postgres
                - name: NUQ_DATABASE_URL_LISTEN
                  value: postgresql://postgres:$(NUQ_POSTGRES_PASSWORD)@firecrawl-nuq-postgres:5432/postgres
                - name: NUQ_RABBITMQ_URL
                  value: amqp://firecrawl:$(RABBITMQ_PASSWORD)@firecrawl-rabbitmq:5672
              probes:
                liveness:
                  enabled: true
                  type: HTTP
                  path: /liveness
                  port: 3005
                  spec:
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
              resources:
                requests:
                  cpu: 250m
                  memory: 768Mi
                limits:
                  cpu: 750m
                  memory: 1536Mi
              securityContext: *containerSecurityContext

        extract-worker:
          type: deployment
          replicas: 1
          strategy: RollingUpdate
          pod:
            terminationGracePeriodSeconds: 60
          containers:
            app:
              nameOverride: extract-worker
              command: ["node"]
              args: ["--max-old-space-size=1536", "dist/src/services/extract-worker.js"]
              image: *firecrawlImage
              envFrom: *firecrawlEnvFrom
              env:
                - name: FLY_PROCESS_GROUP
                  value: extract-worker
                - name: EXTRACT_WORKER_PORT
                  value: "3004"
                - name: NUQ_POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: REDIS_PASSWORD
                - name: NUQ_POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: NUQ_POSTGRES_PASSWORD
                - name: RABBITMQ_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: RABBITMQ_PASSWORD
                - name: REDIS_URL
                  value: redis://:$(REDIS_PASSWORD)@firecrawl-redis:6379
                - name: REDIS_RATE_LIMIT_URL
                  value: redis://:$(REDIS_PASSWORD)@firecrawl-redis:6379
                - name: NUQ_DATABASE_URL
                  value: postgresql://postgres:$(NUQ_POSTGRES_PASSWORD)@firecrawl-nuq-postgres:5432/postgres
                - name: NUQ_DATABASE_URL_LISTEN
                  value: postgresql://postgres:$(NUQ_POSTGRES_PASSWORD)@firecrawl-nuq-postgres:5432/postgres
                - name: NUQ_RABBITMQ_URL
                  value: amqp://firecrawl:$(RABBITMQ_PASSWORD)@firecrawl-rabbitmq:5672
              probes:
                liveness:
                  enabled: true
                  type: HTTP
                  path: /liveness
                  port: 3004
                  spec:
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                readiness:
                  enabled: true
                  type: HTTP
                  path: /health
                  port: 3004
                  spec:
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
              resources:
                requests:
                  cpu: 250m
                  memory: 768Mi
                limits:
                  cpu: 750m
                  memory: 1536Mi
              securityContext: *containerSecurityContext

        nuq-worker:
          type: deployment
          replicas: 1
          strategy: RollingUpdate
          pod:
            terminationGracePeriodSeconds: 60
          containers:
            app:
              nameOverride: nuq-worker
              command: ["node"]
              args: ["--max-old-space-size=1536", "dist/src/services/worker/nuq-worker.js"]
              image: *firecrawlImage
              envFrom: *firecrawlEnvFrom
              env:
                - name: FLY_PROCESS_GROUP
                  value: nuq-worker
                - name: NUQ_WORKER_PORT
                  value: "3006"
                - name: NUQ_POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: REDIS_PASSWORD
                - name: NUQ_POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: NUQ_POSTGRES_PASSWORD
                - name: RABBITMQ_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: RABBITMQ_PASSWORD
                - name: REDIS_URL
                  value: redis://:$(REDIS_PASSWORD)@firecrawl-redis:6379
                - name: REDIS_RATE_LIMIT_URL
                  value: redis://:$(REDIS_PASSWORD)@firecrawl-redis:6379
                - name: NUQ_DATABASE_URL
                  value: postgresql://postgres:$(NUQ_POSTGRES_PASSWORD)@firecrawl-nuq-postgres:5432/postgres
                - name: NUQ_DATABASE_URL_LISTEN
                  value: postgresql://postgres:$(NUQ_POSTGRES_PASSWORD)@firecrawl-nuq-postgres:5432/postgres
                - name: NUQ_RABBITMQ_URL
                  value: amqp://firecrawl:$(RABBITMQ_PASSWORD)@firecrawl-rabbitmq:5672
              probes:
                liveness:
                  enabled: true
                  type: HTTP
                  path: /health
                  port: 3006
                  spec:
                    initialDelaySeconds: 5
                    periodSeconds: 5
                    timeoutSeconds: 5
                    failureThreshold: 3
                readiness:
                  enabled: true
                  type: HTTP
                  path: /health
                  port: 3006
                  spec:
                    initialDelaySeconds: 5
                    periodSeconds: 5
                    timeoutSeconds: 5
                    failureThreshold: 3
              resources:
                requests:
                  cpu: 250m
                  memory: 768Mi
                limits:
                  cpu: 750m
                  memory: 1536Mi
              securityContext: *containerSecurityContext

        nuq-prefetch-worker:
          enabled: false
          type: deployment
          replicas: 1
          strategy: RollingUpdate
          pod:
            terminationGracePeriodSeconds: 60
          containers:
            app:
              nameOverride: nuq-prefetch-worker
              command: ["node"]
              args: ["--max-old-space-size=768", "dist/src/services/worker/nuq-prefetch-worker.js"]
              image: *firecrawlImage
              envFrom: *firecrawlEnvFrom
              env:
                - name: FLY_PROCESS_GROUP
                  value: nuq-prefetch-worker
                - name: NUQ_PREFETCH_WORKER_PORT
                  value: "3011"
                - name: NUQ_PREFETCH_REPLICAS
                  value: "1"
                - name: NUQ_POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: REDIS_PASSWORD
                - name: NUQ_POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: NUQ_POSTGRES_PASSWORD
                - name: RABBITMQ_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: RABBITMQ_PASSWORD
                - name: REDIS_URL
                  value: redis://:$(REDIS_PASSWORD)@firecrawl-redis:6379
                - name: REDIS_RATE_LIMIT_URL
                  value: redis://:$(REDIS_PASSWORD)@firecrawl-redis:6379
                - name: NUQ_DATABASE_URL
                  value: postgresql://postgres:$(NUQ_POSTGRES_PASSWORD)@firecrawl-nuq-postgres:5432/postgres
                - name: NUQ_DATABASE_URL_LISTEN
                  value: postgresql://postgres:$(NUQ_POSTGRES_PASSWORD)@firecrawl-nuq-postgres:5432/postgres
                - name: NUQ_RABBITMQ_URL
                  value: amqp://firecrawl:$(RABBITMQ_PASSWORD)@firecrawl-rabbitmq:5672
              probes:
                liveness:
                  enabled: true
                  type: HTTP
                  path: /health
                  port: 3011
                  spec:
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                readiness:
                  enabled: true
                  type: HTTP
                  path: /health
                  port: 3011
                  spec:
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
              resources:
                requests:
                  cpu: 100m
                  memory: 384Mi
                limits:
                  cpu: 500m
                  memory: 768Mi
              securityContext: *containerSecurityContext

        playwright:
          type: deployment
          replicas: 1
          strategy: RollingUpdate
          containers:
            app:
              nameOverride: playwright-service
              image:
                repository: docker.io/winkkgmbh/firecrawl-playwright
                digest: sha256:3542c4773c7ba5072258625cf40916d6589b2d94f7f12a5ed22e670ece126ead
                pullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: firecrawl-config
                - secretRef:
                    name: firecrawl-secret
                - configMapRef:
                    name: firecrawl-playwright-config
              probes:
                liveness:
                  enabled: true
                  type: HTTP
                  path: /health
                  port: 3000
                  spec:
                    initialDelaySeconds: 30
                    periodSeconds: 30
                    timeoutSeconds: 5
                    failureThreshold: 3
                readiness:
                  enabled: true
                  type: HTTP
                  path: /health
                  port: 3000
                  spec:
                    initialDelaySeconds: 30
                    periodSeconds: 30
                    timeoutSeconds: 5
                    failureThreshold: 3
              resources:
                requests:
                  cpu: 300m
                  memory: 1Gi
                limits:
                  cpu: "1"
                  memory: 2Gi
              securityContext: *containerSecurityContext

        redis:
          type: deployment
          replicas: 1
          strategy: RollingUpdate
          containers:
            app:
              nameOverride: redis
              command: ["/bin/sh", "-c"]
              args:
                - |
                  if [ -n "$REDIS_PASSWORD" ]; then
                    exec redis-server --bind 0.0.0.0 --requirepass "$REDIS_PASSWORD" --save "" --appendonly no --stop-writes-on-bgsave-error no
                  else
                    exec redis-server --bind 0.0.0.0 --save "" --appendonly no --stop-writes-on-bgsave-error no
                  fi
              image:
                repository: docker.io/redis
                tag: "alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005"
                pullPolicy: IfNotPresent
              env:
                REDIS_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: REDIS_PASSWORD
              probes:
                liveness:
                  enabled: true
                  type: TCP
                  port: 6379
                readiness:
                  enabled: true
                  type: TCP
                  port: 6379
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 512Mi
              securityContext: *containerSecurityContext

        rabbitmq:
          type: deployment
          replicas: 1
          strategy: RollingUpdate
          containers:
            app:
              nameOverride: rabbitmq
              image:
                repository: docker.io/rabbitmq
                tag: "3-management@sha256:e582c0bc7766f3342496d8485efb5a1df782b5ce3886ad017e2eaae442311f69"
                pullPolicy: IfNotPresent
              env:
                RABBITMQ_DEFAULT_USER: firecrawl
                RABBITMQ_DEFAULT_PASS:
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: RABBITMQ_PASSWORD
              probes:
                liveness:
                  enabled: true
                  type: TCP
                  port: 5672
                  spec:
                    initialDelaySeconds: 20
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 6
                readiness:
                  enabled: true
                  type: TCP
                  port: 5672
                  spec:
                    initialDelaySeconds: 10
                    periodSeconds: 5
                    timeoutSeconds: 3
                    failureThreshold: 6
              resources:
                requests:
                  cpu: 100m
                  memory: 384Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
              securityContext: *containerSecurityContext

        nuq-postgres:
          type: deployment
          replicas: 1
          # Replace: the live object carries server-defaulted
          # strategy.rollingUpdate, which a 3-way-merge apply can't remove and
          # the API forbids alongside type: Recreate.
          annotations:
            argocd.argoproj.io/sync-options: Replace=true
          # Single-replica postgres on an RWO PVC: RollingUpdate deadlocks (new
          # pod can't take the PGDATA lock while the old one holds it).
          strategy: Recreate
          containers:
            app:
              nameOverride: nuq-postgres
              image:
                repository: docker.io/winkkgmbh/nuq-postgres
                digest: sha256:b0f14f9c8c9b5929d25a5d6f1f7f6ef99c51475d45767908eed4f086f7159e02
                pullPolicy: IfNotPresent
              env:
                POSTGRES_USER: postgres
                POSTGRES_DB: postgres
                PGDATA: /var/lib/postgresql/data/pgdata
                POSTGRES_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: firecrawl-secret
                      key: NUQ_POSTGRES_PASSWORD
              resources:
                requests:
                  cpu: 100m
                  memory: 384Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
              securityContext: *containerSecurityContext

      persistence:
        nuq-postgres:
          type: persistentVolumeClaim
          existingClaim: firecrawl-nuq-postgres
          advancedMounts:
            nuq-postgres:
              app:
                - path: /var/lib/postgresql/data

      service:
        api:
          controller: api
          type: ClusterIP
          ports:
            http:
              port: 3002
              targetPort: 3002
        playwright:
          controller: playwright
          type: ClusterIP
          ports:
            http:
              port: 3000
              targetPort: 3000
        redis:
          controller: redis
          type: ClusterIP
          ports:
            redis:
              port: 6379
              targetPort: 6379
        rabbitmq:
          controller: rabbitmq
          type: ClusterIP
          ports:
            amqp:
              port: 5672
              targetPort: 5672
            management:
              port: 15672
              targetPort: 15672
        nuq-postgres:
          controller: nuq-postgres
          type: ClusterIP
          ports:
            postgres:
              port: 5432
              targetPort: 5432

      serviceAccount:
        firecrawl:
          enabled: true
