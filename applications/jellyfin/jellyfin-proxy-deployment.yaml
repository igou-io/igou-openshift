---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin-proxy
  namespace: jellyfin
  labels:
    app.kubernetes.io/name: jellyfin-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin-proxy
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: quay.io/hummingbird/nginx:1.30.3@sha256:d4fe4078bbaac0e9bd18fe53ec0e4cb8d80895ed19994fca2134eed3ecc09287
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: https
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: https
              scheme: HTTPS
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
            # Writable paths required with readOnlyRootFilesystem: the image
            # keeps its PID file in /tmp and proxy/client temp files under
            # /var/lib/nginx/tmp.
            - name: tmp
              mountPath: /tmp
            - name: nginx-tmp
              mountPath: /var/lib/nginx/tmp
      volumes:
        - name: nginx-conf
          configMap:
            name: jellyfin-proxy-nginx
        - name: tls
          secret:
            secretName: jellyfin-tls
        - name: tmp
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
