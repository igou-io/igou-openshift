---
# Observed-flow allow policy for jellyfin (NetObserv eBPF, 1:50 sampling).
# Derived from captured inter-namespace flows; see PR body for methodology + caveats.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observed
  namespace: jellyfin
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8096
          protocol: TCP
    # host-network sources (router Routes, kubelet probes, host-network
    # scrapes/webhooks). Under OVN-Kubernetes these SNAT to the node's host
    # network, which ipBlock 10.10.9.0/24 does NOT match (proven by the
    # gitea-mirror :4321 route outage). The synthetic openshift-host-network
    # namespace label matches them.
    - from:
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/host-network: ""
      ports:
        - port: 8096
          protocol: TCP
    # jellyfin LoadBalancer VIP (10.10.152.1) is externalTrafficPolicy: Local,
    # which preserves the real client source IP. Off-subnet VLAN clients
    # (lan/iot/dmz phones/Shield) hit the VIP directly; admit the lab supernet
    # on :8096 so the documented direct-HTTP endpoint is not dropped.
    - from:
        - ipBlock:
            cidr: 10.10.0.0/16
      ports:
        - port: 8096
          protocol: TCP
  egress:
    # cluster DNS (always required)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    # external metadata/artwork providers; not sampled in the window (idle) but required for library refresh.
    # external / off-cluster egress (internet + lab devices). Cluster pod
    # and service CIDRs are excluded to block lateral movement; the node/lab
    # network (10.10.0.0/16) stays reachable for lab-device targets.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.128.0.0/14
              - 172.30.0.0/16
