---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: jellyfin-biscuit
  labels:
    app.kubernetes.io/name: blackbox-exporter
spec:
  interval: 60s
  module: http_2xx
  prober:
    url: blackbox-exporter.blackbox-exporter.svc:9115
  targets:
    staticConfig:
      static:
        - https://jellyfintest.biscuit.igou.systems
      labels:
        tier: critical
        category: jellyfin
        owner: media
