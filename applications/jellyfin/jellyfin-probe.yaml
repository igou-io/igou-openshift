---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: jellyfin
  labels:
    app.kubernetes.io/name: blackbox-exporter
spec:
  interval: 60s
  module: http_2xx
  prober:
    url: blackbox-exporter.blackbox-exporter.svc:9115
  targets:
    staticConfig:
      static:
        # Through the TLS proxy VIP — exercises the same path LAN clients use.
        - https://jellyfin.igou.systems/health
      labels:
        tier: critical
        category: jellyfin
        owner: media
