apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jellyfin
resources:
  - default-deny-networkpolicy.yaml
  - allow-observed-networkpolicy.yaml
  - jellyfin-namespace.yaml
  - jellyfin-media-nfs-pv.yaml
  - jellyfin-media-nfs-pvc.yaml
  - jellyfin-config-pvc.yaml
  - jellyfin-probe.yaml
  - jellyfin-httproute.yaml
helmCharts:
- name: jellyfin
  namespace: jellyfin
  version: 3.2.0
  releaseName: jellyfin
  repo: https://jellyfin.github.io/jellyfin-helm/
  valuesInline:
    replicaCount: 1
    image:
      repository: docker.io/jellyfin/jellyfin
      tag: 10.11.11@sha256:aefb67e6a7ff1debdd154a78a7bbb780fd0c873d8639210a7f6a2016ad2b35db
      pullPolicy: IfNotPresent
    serviceAccount:
      create: true
      automount: true
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
      supplementalGroups:
        - 797
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
    resources:
      limits:
        gpu.intel.com/i915: "1"
    # Pin to ocp (the Minisforum MS-01): jellyfin uses its Intel iGPU (i915)
    # for hardware-accelerated transcoding. More than one node now advertises
    # gpu.intel.com/i915, so this nodeSelector — not the GPU request — is what
    # keeps the workload on the MS-01.
    nodeSelector:
      kubernetes.io/hostname: ocp.igou.systems
    deploymentStrategy:
      type: Recreate
    service:
      type: LoadBalancer
      port: 8096
      # Local preserves the client source IP and, because this workload is
      # pinned to a single node (ocp, for the iGPU), causes MetalLB to
      # advertise the VIP from only that node — eliminating the multi-node
      # BGP ECMP spray that otherwise stalls flows with ~6.5s TCP retransmits.
      externalTrafficPolicy: Local
      annotations:
        metallb.universe.tf/address-pool: guest-dmz
        # Pinned so the VIP survives Service recreation; LAN clients reach
        # jellyfin over TLS via the shared guest-dmz Gateway
        # (https://jellyfin.dmz.igou.systems -> 10.10.152.3), this direct
        # HTTP endpoint stays for the admin VLANs.
        metallb.universe.tf/loadBalancerIPs: 10.10.152.1
    ingress:
      enabled: false
    persistence:
      config:
        enabled: true
        existingClaim: jellyfin-config
      media:
        enabled: false
    volumes:
      - name: media-nfs
        persistentVolumeClaim:
          claimName: jellyfin-media
          readOnly: true
    volumeMounts:
      - name: media-nfs
        mountPath: /media
        readOnly: true
    jellyfin:
      enableDLNA: false
patches:
  - target:
      labelSelector: app.kubernetes.io/instance=jellyfin
    patch: |
      - op: add
        path: /metadata/namespace
        value: jellyfin
  - target:
      kind: Deployment
      name: jellyfin
    patch: |
      - op: test
        path: /spec/template/spec/volumes/1/name
        value: media
      - op: remove
        path: /spec/template/spec/volumes/1
      - op: test
        path: /spec/template/spec/containers/0/volumeMounts/1/name
        value: media
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/1
