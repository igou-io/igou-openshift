apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jellyfin
resources:
  - jellyfin-namespace.yaml
  - jellyfin-media-nfs-pv.yaml
  - jellyfin-media-nfs-pvc.yaml
  - jellyfin-config-pvc.yaml
  - jellyfin-probe.yaml
helmCharts:
- name: jellyfin
  namespace: jellyfin
  version: 3.2.0
  releaseName: jellyfin
  repo: https://jellyfin.github.io/jellyfin-helm/
  valuesInline:
    replicaCount: 1
    image:
      repository: docker.io/jellyfin/jellyfin
      tag: 10.11.9@sha256:bc9fa8e1462fffe3d8d4255fc62af478602641f4c0e5f4875fea8563d1189837
      pullPolicy: IfNotPresent
    serviceAccount:
      create: true
      automount: true
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
      supplementalGroups:
        - 797
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
    resources:
      limits:
        gpu.intel.com/i915: "1"
    # Pin to the hub node: only this node has the Intel iGPU (i915) that
    # jellyfin uses for hardware-accelerated transcoding.
    nodeSelector:
      kubernetes.io/hostname: ocp.igou.systems
    deploymentStrategy:
      type: Recreate
    service:
      type: LoadBalancer
      port: 8096
      annotations:
        metallb.universe.tf/address-pool: guest-dmz
    ingress:
      enabled: false
    persistence:
      config:
        enabled: true
        existingClaim: jellyfin-config
      media:
        enabled: false
    volumes:
      - name: media-nfs
        persistentVolumeClaim:
          claimName: jellyfin-media
          readOnly: true
    volumeMounts:
      - name: media-nfs
        mountPath: /media
        readOnly: true
    jellyfin:
      enableDLNA: false
patches:
  - target:
      labelSelector: app.kubernetes.io/instance=jellyfin
    patch: |
      - op: add
        path: /metadata/namespace
        value: jellyfin
  - target:
      kind: Deployment
      name: jellyfin
    patch: |
      - op: test
        path: /spec/template/spec/volumes/1/name
        value: media
      - op: remove
        path: /spec/template/spec/volumes/1
      - op: test
        path: /spec/template/spec/containers/0/volumeMounts/1/name
        value: media
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/1
