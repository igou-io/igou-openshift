---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  # group/kind/weight below are API-server defaults, stated explicitly so
  # ArgoCD's server-side-apply diff doesn't report the route as forever
  # OutOfSync (same wart as the Gateway certificateRefs, #369).
  parentRefs:
    - name: guest-dmz
      namespace: openshift-ingress
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - jellyfin.dmz.igou.systems
  rules:
    - backendRefs:
        - name: jellyfin
          port: 8096
      timeouts:
        # Long-lived HLS/streaming sessions — never time the request out.
        request: 0s
