---
# S3 credentials for the CNPG Barman Cloud Plugin backups of temporalio-pg.
# Wave -2 so the secret exists before the Cluster (wave -1) restarts with the
# barman sidecar that needs it to archive WAL.
# PREREQUISITE: 1Password item `cnpg-s3-backup` in the `ocp-pull` vault.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-s3-credentials
  namespace: temporalio
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-sdk-ocp-pull
  target:
    name: cnpg-s3-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace # API-defaulted; declared so ArgoCD (SSA) stays Synced
      data:
        ACCESS_KEY_ID: "{{ .access_key_id }}"
        ACCESS_SECRET_KEY: "{{ .secret_access_key }}"
  dataFrom:
    - extract:
        key: cnpg-s3-backup
        # API-defaulted fields, declared so ArgoCD (SSA) stays Synced
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
