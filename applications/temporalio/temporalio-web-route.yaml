---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: temporalio-web
  namespace: temporalio
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
spec:
  host: temporalio.apps.ocp.igou.systems
  to:
    kind: Service
    name: temporalio-web
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
