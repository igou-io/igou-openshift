apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gotify
resources:
  - gotify-namespace.yaml
  - gotify-data-pvc.yaml
  - gotify-admin-externalsecret.yaml
  - gotify-bridge-token-externalsecret.yaml
  # Uncomment once the probe is populated via /add-probe https://gotify.apps.ocp.igou.systems
  # - gotify-probe.yaml
helmCharts:
  - name: app-template
    namespace: gotify
    version: 4.6.2
    releaseName: gotify
    repo: oci://ghcr.io/bjw-s-labs/helm
    valuesFile: values-dummy.yaml
    valuesInline:
      controllers:
        gotify:
          type: deployment
          replicas: 1
          strategy: Recreate
          pod:
            securityContext:
              seccompProfile:
                type: RuntimeDefault
          containers:
            app:
              image:
                repository: docker.io/gotify/server
                tag: "2.9.1@sha256:a3af47067ce6aad76aadf5ba32d6ddfecd1ae576a961359f039fd1831e8b7652"
                pullPolicy: IfNotPresent
              env:
                GOTIFY_SERVER_PORT: "8080"
                GOTIFY_PASSSTRENGTH: "10"
                GOTIFY_DEFAULTUSER_NAME: admin
                GOTIFY_DEFAULTUSER_PASS:
                  valueFrom:
                    secretKeyRef:
                      name: gotify-admin
                      key: password
              probes:
                liveness:
                  enabled: true
                  type: HTTP
                  spec:
                    httpGet:
                      path: /health
                      port: 8080
                readiness:
                  enabled: true
                  type: HTTP
                  spec:
                    httpGet:
                      path: /health
                      port: 8080
                startup:
                  enabled: true
                  type: TCP
              resources: {}
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
      persistence:
        data:
          type: persistentVolumeClaim
          existingClaim: gotify-data
          advancedMounts:
            gotify:
              app:
                - path: /app/data
      service:
        app:
          controller: gotify
          ports:
            http:
              port: 80
              targetPort: 8080
      ingress:
        app:
          className: openshift-default
          annotations:
            route.openshift.io/termination: edge
          hosts:
            - host: gotify.apps.ocp.igou.systems
              paths:
                - path: /
                  pathType: Prefix
                  service:
                    identifier: app
                    port: http
      serviceAccount:
        gotify:
          enabled: true

  - name: app-template
    namespace: gotify
    version: 4.6.2
    releaseName: alertmanager-gotify-bridge
    repo: oci://ghcr.io/bjw-s-labs/helm
    valuesFile: values-dummy.yaml
    valuesInline:
      controllers:
        alertmanager-gotify-bridge:
          type: deployment
          replicas: 1
          strategy: RollingUpdate
          pod:
            securityContext:
              seccompProfile:
                type: RuntimeDefault
          containers:
            app:
              image:
                repository: ghcr.io/druggeri/alertmanager_gotify_bridge
                tag: "2.3.2@sha256:242441023c6a7956fc7bcdd30350a8fed38f791e703d670aa286fc0465f88b41"
                pullPolicy: IfNotPresent
              env:
                GOTIFY_ENDPOINT: http://gotify.gotify.svc:80/message
                BIND_ADDRESS: 0.0.0.0
                PORT: "8080"
                # Read the Gotify message body from the `summary` annotation
                # rather than the default `description`. Many platform alerts
                # (OutdatedVirtualMachineInstanceWorkloads, KubeJobFailed,
                # ClusterNotUpgradeable, CDIStorageProfiles*, …) ship summary
                # only; the bridge returns HTTP 400 when its message
                # annotation is absent, regardless of DISPATCH_ERRORS, which
                # causes AlertmanagerFailedToSendAlerts to fire.
                MESSAGE_ANNOTATION: summary
                # Still attempt to dispatch a debug message on any other
                # missing/templating issue (priority annotation, etc.) — the
                # bridge will also return 400, but Gotify still gets the
                # error notification for visibility.
                DISPATCH_ERRORS: "true"
                # Render notifications in Markdown with FIR/RES status,
                # start time, and (when present) a generator URL.
                EXTENDED_DETAILS: "true"
                GOTIFY_TOKEN:
                  valueFrom:
                    secretKeyRef:
                      name: gotify-bridge-token
                      key: token
              probes:
                liveness:
                  enabled: true
                  type: TCP
                readiness:
                  enabled: true
                  type: TCP
                startup:
                  enabled: true
                  type: TCP
              resources: {}
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
      service:
        app:
          controller: alertmanager-gotify-bridge
          ports:
            http:
              port: 8080
              targetPort: 8080
      serviceAccount:
        alertmanager-gotify-bridge:
          enabled: true
