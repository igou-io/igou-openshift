apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: llmkube-system
resources:
  - llmkube-system-namespace.yaml
  - qwen3-35b-a3b-model.yaml
  - qwen3-35b-a3b-inferenceservice.yaml
  - qwen3-35b-a3b-route.yaml
  - qwen35-2b-model.yaml
  - qwen35-2b-inferenceservice.yaml
  - qwen35-2b-route.yaml
  - gemma-4-e2b-model.yaml
  - gemma-4-e2b-inferenceservice.yaml
  - gemma-4-e2b-route.yaml
helmCharts:
- name: llmkube
  namespace: llmkube-system
  version: 0.8.1
  releaseName: llmkube
  repo: https://defilantech.github.io/LLMKube
  valuesInline:
    namespace: llmkube-system

    controllerManager:
      image:
        registry: ""
        repository: ghcr.io/defilantech/llmkube-controller
        pullPolicy: IfNotPresent
        # Pinned to a digest compatible with chart 0.8.1's manager args.
        # Renovate bumps to newer controller builds (e.g. 79969f6) that drop the
        # --default-fsgroup flag the chart still passes, causing CrashLoopBackOff
        # (exit 2: "flag provided but not defined: -default-fsgroup"). Do not bump
        # the image digest without also moving to a matching chart version.
        tag: "@sha256:d7abfb6cfd11358db2416cf8f17af6d10001f9d88c3c64553ea93c2be3494080"
        digest: "sha256:d7abfb6cfd11358db2416cf8f17af6d10001f9d88c3c64553ea93c2be3494080"
      replicaCount: 1
      leaderElection:
        enabled: true
      resources:
        limits:
          cpu: 500m
          memory: 2Gi
        requests:
          cpu: 10m
          memory: 512Mi
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - "ALL"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8081
        initialDelaySeconds: 15
        periodSeconds: 20
      readinessProbe:
        httpGet:
          path: /readyz
          port: 8081
        initialDelaySeconds: 5
        periodSeconds: 10
      nodeSelector: {}
      tolerations: []
      affinity: {}
      initContainer:
        registry: ""
        repository: docker.io/curlimages/curl
        tag: "8.18.0"
      env: []

    serviceAccount:
      create: true
      annotations: {}
      name: ""

    rbac:
      create: true

    metrics:
      enabled: true
      secure: true
      service:
        type: ClusterIP
        port: 8443
        nodePort: ""
        annotations: {}

    prometheus:
      serviceMonitor:
        enabled: false
        additionalLabels:
          prometheus: kube-prometheus-stack-prometheus
        interval: 30s
        namespace: ""
      inferencePodMonitor:
        enabled: false
        additionalLabels:
          prometheus: kube-prometheus-stack-prometheus
        interval: 30s
      prometheusRule:
        enabled: false
        additionalLabels:
          prometheus: kube-prometheus-stack-prometheus
          role: alert-rules
        namespace: monitoring
        rules:
          gpu:
            enabled: true
            highUtilizationThreshold: 90
            highTemperatureThreshold: 85
            memoryPressureThreshold: 90
            powerLimitThreshold: 250
          inference:
            enabled: true

    crds:
      install: true
      keep: true

    # Shared model cache for ALL InferenceServices (the llmkube controller mounts
    # one fixed-name `llmkube-model-cache` PVC into every model pod). It MUST be
    # ReadWriteMany: qwen35-2b is pinned to p330 and qwen3-35b-a3b to the casval
    # burst node, so an RWO cache can only attach to one node and the second model
    # deadlocks on a Multi-Attach error. RWX requires an NFS class (the iscsi/nvmeof
    # block classes are RWO-only); nfs-ssd only slows one-time pod startup (weights
    # load into VRAM), not inference. Enabling this makes the chart own the PVC
    # (RWX) instead of the controller's RWO fallback.
    modelCache:
      enabled: true
      accessMode: ReadWriteMany
      storageClass: freenas-nfs-ssd-csi
      size: 100Gi

    priorityClasses:
      enabled: true

    imagePullSecrets: []
    nameOverride: ""
    fullnameOverride: ""
    podAnnotations: {}
    podLabels: {}

    networkPolicies:
      enabled: false
      additionalEgressCIDRs: []
