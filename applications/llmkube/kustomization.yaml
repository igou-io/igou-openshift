apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: llmkube-system
resources:
  - llmkube-system-namespace.yaml
  - qwen3-35b-a3b-model.yaml
  - qwen3-35b-a3b-inferenceservice.yaml
helmCharts:
- name: llmkube
  namespace: llmkube-system
  version: 0.7.5
  releaseName: llmkube
  repo: https://defilantech.github.io/LLMKube
  valuesInline:
    namespace: llmkube-system

    controllerManager:
      image:
        registry: ""
        repository: ghcr.io/defilantech/llmkube-controller
        pullPolicy: IfNotPresent
        tag: ""
        digest: ""
      replicaCount: 1
      leaderElection:
        enabled: true
      resources:
        limits:
          cpu: 500m
          memory: 2Gi
        requests:
          cpu: 10m
          memory: 512Mi
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - "ALL"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8081
        initialDelaySeconds: 15
        periodSeconds: 20
      readinessProbe:
        httpGet:
          path: /readyz
          port: 8081
        initialDelaySeconds: 5
        periodSeconds: 10
      nodeSelector: {}
      tolerations: []
      affinity: {}
      initContainer:
        registry: ""
        repository: docker.io/curlimages/curl
        tag: "8.18.0"
      env: []

    serviceAccount:
      create: true
      annotations: {}
      name: ""

    rbac:
      create: true

    metrics:
      enabled: true
      secure: true
      service:
        type: ClusterIP
        port: 8443
        nodePort: ""
        annotations: {}

    prometheus:
      serviceMonitor:
        enabled: false
        additionalLabels:
          prometheus: kube-prometheus-stack-prometheus
        interval: 30s
        namespace: ""
      inferencePodMonitor:
        enabled: false
        additionalLabels:
          prometheus: kube-prometheus-stack-prometheus
        interval: 30s
      prometheusRule:
        enabled: false
        additionalLabels:
          prometheus: kube-prometheus-stack-prometheus
          role: alert-rules
        namespace: monitoring
        rules:
          gpu:
            enabled: true
            highUtilizationThreshold: 90
            highTemperatureThreshold: 85
            memoryPressureThreshold: 90
            powerLimitThreshold: 250
          inference:
            enabled: true

    crds:
      install: true
      keep: true

    modelCache:
      enabled: true
      size: 100Gi
      storageClass: ""
      accessMode: ReadWriteOnce
      mountPath: /models
      annotations: {}

    priorityClasses:
      enabled: true

    imagePullSecrets: []
    nameOverride: ""
    fullnameOverride: ""
    podAnnotations: {}
    podLabels: {}

    networkPolicies:
      enabled: false
      additionalEgressCIDRs: []
