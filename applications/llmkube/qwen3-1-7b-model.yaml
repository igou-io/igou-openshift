---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-1-7b
  namespace: llmkube-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    argocd.argoproj.io/sync-wave: '5'
spec:
  # Pascal Quadro P620 (2 GB) on p330: Qwen3-1.7B at Q4_K_S (~1.06 GB) is fully
  # GPU-resident with KV-cache headroom. Benchmarked ~28 tok/s on the P620.
  source: https://huggingface.co/unsloth/Qwen3-1.7B-GGUF/resolve/main/Qwen3-1.7B-Q4_K_S.gguf
  format: gguf
  quantization: Q4_K_S
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      count: 1
      layers: -1
      memory: "2Gi"
      vendor: nvidia
  resources:
    cpu: "2"
    memory: "6Gi"
