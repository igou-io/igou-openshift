---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-35b-a3b
  namespace: llmkube-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    # Apply after the Model CR (which is itself applied after the chart).
    argocd.argoproj.io/sync-wave: '6'
spec:
  modelRef: qwen3-35b-a3b
  runtime: llamacpp
  # Default llamacpp image (ghcr.io/ggml-org/llama.cpp:server) is CPU-only and
  # ignores --n-gpu-layers. Override with the CUDA build so the 2x RTX 4060 Ti
  # on casval are actually used for inference.
  image: ghcr.io/ggml-org/llama.cpp:server-cuda13@sha256:4cdb8aa17091f9942fcf89896d63ed244e48828e1b15f28f59e7ab49d84b8527
  # At rest this model is OFF (replicas: 0) so the casval burst baremetal node
  # stays scaled to zero — the pod pins to casval (nodeSelector burst below), and
  # a running replica is what holds the cluster-autoscaler's casval MachineSet at 1.
  # To bring the big model up, scale to 1 (live patch or here); a Pending burst pod
  # triggers the autoscaler to provision casval 0->1 (~12 min cold). ArgoCD ignores
  # /spec/replicas (clusters/ocp/values.yaml ignoreDifferences) so a live scale-up
  # is not reverted, but the checked-in value is the bootstrap/resting default.
  replicas: 0
  # Tuning targets: Qwen3.6-35B-A3B UD-Q5_K_XL (~25 GiB) on 2x RTX 4060 Ti 16 GiB.
  # Hybrid linear-attn MoE: only 10/40 layers hold a KV cache (2 KV heads), so KV is
  # tiny — ~1.25 GiB at 64k, ~3.8 GiB at 200k (f16). Native ctx is 256k (n_ctx_train
  # 262144). At 200k, weights + KV still fit in VRAM with ~1 GiB/GPU headroom (measured
  # ~2-2.6 GiB free per card at 64k; +~1.3 GiB/GPU KV), so KV stays GPU-resident (no
  # noKvOffload) and decode stays fast; FA on keeps the prefill compute buffer bounded.
  # If a large-ctx prefill ever OOMs at the margin, set noKvOffload: true (casval has
  # 378 GiB RAM; the small hybrid KV makes the PCIe penalty modest).
  flashAttention: true
  jinja: true                # Qwen3.6 chat template is jinja-only (thinking tags)
  # No fsGroup here: the restricted-v2 SCC injects one from the namespace's
  # allocated range, and that range changes whenever the namespace is recreated
  # (a pinned value broke pod admission after the 2026-07 cluster reinstall).
  # llmkube's fsGroup default of 102 only applies when podSecurityContext is
  # entirely unset, so keeping seccompProfile here is enough to suppress it.
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  cacheTypeK: f16
  cacheTypeV: f16            # f16 KV is cheap here (small hybrid KV) and avoids the
                             # quantized-KV gibberish edge case unsloth flags for 3.6
  batchSize: 2048
  uBatchSize: 512
  parallelSlots: 1           # single coding-assistant user; >1 splits ctx across slots
  extraArgs:
    - "--alias"
    - "qwen3.6-35b-a3b"
    - "--reasoning-format"
    - "deepseek"             # parses <think> into OpenAI `reasoning_content` field
    # Qwen-recommended "thinking, precise coding/agentic" sampling preset (the model
    # runs thinking-by-default). presence-penalty 0 avoids the language-mixing the
    # high-penalty general preset can cause; clients may still override per-request.
    - "--temp"
    - "0.6"
    - "--top-p"
    - "0.95"
    - "--top-k"
    - "20"
    - "--min-p"
    - "0.0"
    - "--presence-penalty"
    - "0.0"
  resources:
    gpu: 2
    cpu: "8"
    memory: "32Gi"
    gpuMemory: "16Gi"
  contextSize: 200000
  endpoint:
    port: 8080
    type: ClusterIP
  priority: normal
  # Schedule exclusively on the casval burst baremetal node
  nodeSelector:
    node-role.kubernetes.io/burst: ""
  tolerations:
    - key: workload
      operator: Equal
      value: burst
      effect: NoSchedule
