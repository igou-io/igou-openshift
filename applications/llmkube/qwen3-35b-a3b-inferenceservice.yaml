---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-35b-a3b
  namespace: llmkube-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    # Apply after the Model CR (which is itself applied after the chart).
    argocd.argoproj.io/sync-wave: '6'
spec:
  modelRef: qwen3-35b-a3b
  runtime: llamacpp
  # Default llamacpp image (ghcr.io/ggml-org/llama.cpp:server) is CPU-only and
  # ignores --n-gpu-layers. Override with the CUDA build so the 2x RTX 4060 Ti
  # on casval are actually used for inference.
  image: ghcr.io/ggml-org/llama.cpp:server-cuda13@sha256:525eb47c5d3403b4ae2087186771ecaa4a7e1059b413930eea8aa7c2db4b1195
  replicas: 0
  # Tuning targets: Qwen3.6-35B-A3B Q4_K_M (~20 GiB) on 2x RTX 4060 Ti 16 GiB.
  # Weights fit fully in VRAM with room for a 64k Q8 KV cache; no MoE offload.
  flashAttention: true
  jinja: true                # Qwen3.6 chat template is jinja-only (thinking tags)
  cacheTypeK: q8_0
  cacheTypeV: q8_0           # q8/q8 KV is ~lossless and roughly halves KV VRAM
  batchSize: 2048
  uBatchSize: 512
  parallelSlots: 1           # single coding-assistant user; >1 splits ctx across slots
  extraArgs:
    - "--alias"
    - "qwen3.6-35b-a3b"
    - "--reasoning-format"
    - "deepseek"             # parses <think> into OpenAI `reasoning_content` field
    - "--temp"
    - "0.7"
    - "--top-p"
    - "0.8"
    - "--top-k"
    - "20"
    - "--min-p"
    - "0.0"
    - "--presence-penalty"
    - "1.5"
  resources:
    gpu: 2
    cpu: "8"
    memory: "32Gi"
    gpuMemory: "16Gi"
  contextSize: 65536
  endpoint:
    port: 8080
    type: ClusterIP
  priority: normal
  # Schedule exclusively on the casval burst baremetal node
  nodeSelector:
    node-role.kubernetes.io/burst: ""
  tolerations:
    - key: workload
      operator: Equal
      value: burst
      effect: NoSchedule
