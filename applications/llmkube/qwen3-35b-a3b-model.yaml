---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-35b-a3b
  namespace: llmkube-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    # Apply after the Helm-rendered chart (CRDs + controller) is in place.
    argocd.argoproj.io/sync-wave: '5'
spec:
  # unsloth UD ("dynamic") quant keeps router/attention/down_proj tensors at higher
  # precision and only aggressively quantizes the bulk routed-expert FFNs — best
  # quality-per-byte for this MoE. UD-Q5_K_XL (~25 GiB) fits fully in 32 GiB VRAM.
  source: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q5_K_XL.gguf
  format: gguf
  quantization: Q5_K_XL
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      count: 2
      layers: -1
      memory: "16Gi"
      vendor: nvidia
  resources:
    cpu: "8"
    memory: "32Gi"
