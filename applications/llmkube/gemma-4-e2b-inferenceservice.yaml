---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: gemma-4-e2b
  namespace: llmkube-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    argocd.argoproj.io/sync-wave: '6'
spec:
  modelRef: gemma-4-e2b
  runtime: llamacpp
  # CPU-only llama.cpp server (NOT server-cuda — this model doesn't fit the 2 GB
  # P620, so no GPU is requested and llama.cpp runs everything on CPU). Pinned by
  # digest. This digest is build b9664, the same mainline build verified to load
  # the gemma4 architecture. Renovate may bump it; keep it on the CPU `server`
  # image (no `-cuda` suffix).
  image: ghcr.io/ggml-org/llama.cpp:server@sha256:e8149c5fd828637b03573fe11803d7b3573a9d5305d899d80b335dbebdd843ef
  replicas: 1
  # Full 128K trained window. No GPU, so the KV cache lives in host RAM natively
  # (noKvOffload is a GPU->RAM flag and is irrelevant here). MQA + sliding-window
  # attention keep KV ~0.9 GB even at 131072 — sized into resources.memory below.
  # The cost of 128K is prefill latency on CPU (~286 tok/s), not memory.
  contextSize: 131072
  flashAttention: false
  jinja: true                 # apply the Gemma chat template
  parallelSlots: 1
  podSecurityContext:
    fsGroup: 1001030000       # OpenShift restricted-v2 SCC range (llmkube default 102 is rejected)
    seccompProfile:
      type: RuntimeDefault
  extraArgs:
    - "--alias"
    - "gemma-4-e2b"
    # Gemma 4 E2B is NOT a <think>-tag reasoner. llama.cpp's default
    # --reasoning-format=auto misclassifies its plain output as reasoning and
    # routes it to OpenAI `reasoning_content`, leaving `content` EMPTY (verified:
    # raw /completions returns a clean "Hello there, how are you?" but the chat
    # endpoint returned content=''). `none` disables the parser so the answer
    # lands in `content` where OpenAI clients expect it.
    - "--reasoning-format"
    - "none"
  resources:
    # No gpu / gpuMemory keys -> CPU-only pod, no nvidia.com/gpu request.
    # 12Gi covers weights (~2.88 GB) + 128K KV (~0.9 GB) + compute buffers.
    cpu: "4"
    memory: "12Gi"
  endpoint:
    port: 8080
    type: ClusterIP
  # Placement: target hpg5, a GPU-less worker, to keep this CPU model OFF the
  # control-plane node (ocp) and away from p330's qwen/GPU + hermes VM.
  # CAVEAT: this llmkube controller build STRIPS nodeSelector for CPU-accelerator
  # models (only GPU models honor it), so this field is currently DECLARATIVE ONLY.
  # Actual placement is enforced operationally (cordon-nudge) and is NOT durable
  # across pod reschedules until the controller honors it. The shared model-cache
  # PVC is RWX (freenas-nfs-ssd-csi), so any node is correct — this is only about
  # which CPU bears the load.
  nodeSelector:
    kubernetes.io/hostname: hpg5.igou.systems
  priority: normal
