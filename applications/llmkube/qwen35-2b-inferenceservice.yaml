---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen35-2b
  namespace: llmkube-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    argocd.argoproj.io/sync-wave: '6'
spec:
  modelRef: qwen35-2b
  runtime: llamacpp
  # CUDA-12.8 build (CMAKE arch list includes 610 = Pascal sm_61). NOT
  # server-cuda13 (CUDA 13 drops Pascal -> CPU fallback). Pinned by digest.
  # The new Qwen3.5 Gated-DeltaNet+MoE hybrid arch loads and runs on the P620
  # with this mainline build.
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:c9a2287423b13a13f69c980a45e6c62994f26dffe393cfce7c20bd8feba226c9
  replicas: 1
  # Context cost on the 2 GB P620 (measured, n_ctx-verified): Qwen3.5's
  # Gated-DeltaNet linear-attention layers carry a fixed-size recurrent state (no
  # growing KV), so context is much cheaper than a dense model — but NOT free: the
  # few full-attention layers' KV grows ~13 MiB per 1K tokens. ctx 4K ~1.37 GB,
  # ctx 32K ~1.74 GB (fits, ~0.3 GB margin), ctx 64K OOMs. Practical ceiling
  # ~48-56K. 32K is the best-fit for the Hermes agent: generous agentic working
  # memory, safely below the OOM edge, within a 2B model's coherent-context range
  # (it runs untrusted code, so output quality matters). Do NOT raise past ~48K
  # without re-measuring.
  contextSize: 32768
  flashAttention: false
  jinja: true                 # apply the Qwen3.5 chat template (tool-calling + reasoning)
  parallelSlots: 1
  podSecurityContext:
    fsGroup: 1001030000       # OpenShift restricted-v2 SCC range (llmkube default 102 is rejected)
    seccompProfile:
      type: RuntimeDefault
  extraArgs:
    - "--alias"
    - "qwen3.5-2b"
    # Qwen3.5 is a heavy reasoner (ignores /no_think); parse <think> into the
    # OpenAI reasoning_content field. Sampling left at model/server defaults.
    - "--reasoning-format"
    - "deepseek"
  resources:
    gpu: 1
    cpu: "4"
    memory: "8Gi"
    gpuMemory: "2Gi"
  endpoint:
    port: 8080
    type: ClusterIP
  # Pin to the P620 host (the only Pascal GPU). No toleration — p330 is untainted.
  nodeSelector:
    kubernetes.io/hostname: p330.igou.systems
  priority: normal
