---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen35-2b
  namespace: llmkube-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    argocd.argoproj.io/sync-wave: '6'
spec:
  modelRef: qwen35-2b
  runtime: llamacpp
  # CUDA-12.8 build (CMAKE arch list includes 610 = Pascal sm_61). NOT
  # server-cuda13 (CUDA 13 drops Pascal -> CPU fallback). Pinned by digest.
  # The new Qwen3.5 Gated-DeltaNet+MoE hybrid arch loads and runs on the P620
  # with this mainline build.
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:c9a2287423b13a13f69c980a45e6c62994f26dffe393cfce7c20bd8feba226c9
  replicas: 1
  # Qwen3.5's Gated-DeltaNet linear-attention layers carry a fixed-size recurrent
  # state instead of a growing KV cache, so context is essentially FREE in VRAM on
  # the 2 GB P620: ~1.38 GB used at 4K AND at 128K (both measured). The card is NOT
  # the context limiter (model native max is 256K). 32K is the best-fit for the
  # Hermes agent (server-driven context): generous agentic working memory while
  # staying within a 2B model's coherent-context range (Hermes runs untrusted code,
  # so output quality matters) and keeping Pascal prompt-eval bounded. Raising
  # toward 128K is free VRAM-wise if Hermes' loops need it.
  contextSize: 32768
  flashAttention: false
  jinja: true                 # apply the Qwen3.5 chat template (tool-calling + reasoning)
  parallelSlots: 1
  podSecurityContext:
    fsGroup: 1001030000       # OpenShift restricted-v2 SCC range (llmkube default 102 is rejected)
    seccompProfile:
      type: RuntimeDefault
  extraArgs:
    - "--alias"
    - "qwen3.5-2b"
    # Qwen3.5 is a heavy reasoner (ignores /no_think); parse <think> into the
    # OpenAI reasoning_content field. Sampling left at model/server defaults.
    - "--reasoning-format"
    - "deepseek"
  resources:
    gpu: 1
    cpu: "4"
    memory: "8Gi"
    gpuMemory: "2Gi"
  endpoint:
    port: 8080
    type: ClusterIP
  # Pin to the P620 host (the only Pascal GPU). No toleration — p330 is untainted.
  nodeSelector:
    kubernetes.io/hostname: p330.igou.systems
  priority: normal
