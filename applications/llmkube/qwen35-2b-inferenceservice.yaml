---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen35-2b
  namespace: llmkube-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    argocd.argoproj.io/sync-wave: '6'
spec:
  modelRef: qwen35-2b
  runtime: llamacpp
  # CUDA-12.8 build (CMAKE arch list includes 610 = Pascal sm_61). NOT
  # server-cuda13 (CUDA 13 drops Pascal -> CPU fallback). Pinned by digest.
  # The new Qwen3.5 Gated-DeltaNet+MoE hybrid arch loads and runs on the P620
  # with this mainline build.
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:c9a2287423b13a13f69c980a45e6c62994f26dffe393cfce7c20bd8feba226c9
  replicas: 1
  # 64K context via KV-cache offload to system RAM (noKvOffload). On the 2 GB
  # P620 64K will NOT fit fully GPU-resident: f16 KV OOMs at load, q8_0-K-without-FA
  # OOMs on the compute buffer, and FA + q8_0 KV fits at idle (~1.84 GB) but the
  # server CRASHES during prefill of a large context (no margin left for the
  # compute buffer). noKvOffload parks the KV in host RAM (VRAM stays ~1.43 GB) —
  # the only stable path to 64K — at a speed cost, since attention then reads the
  # KV over PCIe. Measured (Qwen3.5's hybrid KV is small, so it's tolerable):
  # prefill ~218 tok/s, decode ~7.6 tok/s at ~34K occupancy (vs ~21 tok/s
  # fully-resident at 32K). For the faster but smaller config, set contextSize
  # 32768 + noKvOffload false (~1.74 GB VRAM, ~21 tok/s).
  contextSize: 65536
  noKvOffload: true            # KV cache -> system RAM; the only stable 64K on a 2 GB card
  flashAttention: false
  jinja: true                 # apply the Qwen3.5 chat template (tool-calling + reasoning)
  parallelSlots: 1
  podSecurityContext:
    fsGroup: 1001030000       # OpenShift restricted-v2 SCC range (llmkube default 102 is rejected)
    seccompProfile:
      type: RuntimeDefault
  extraArgs:
    - "--alias"
    - "qwen3.5-2b"
    # Qwen3.5 is a heavy reasoner (ignores /no_think); parse <think> into the
    # OpenAI reasoning_content field. Sampling left at model/server defaults.
    - "--reasoning-format"
    - "deepseek"
  resources:
    gpu: 1
    cpu: "4"
    memory: "12Gi"
    hostMemory: "12Gi"         # headroom for the RAM-resident KV cache at 64K
    gpuMemory: "2Gi"
  endpoint:
    port: 8080
    type: ClusterIP
  # Pin to the P620 host (the only Pascal GPU). No toleration — p330 is untainted.
  nodeSelector:
    kubernetes.io/hostname: p330.igou.systems
  priority: normal
