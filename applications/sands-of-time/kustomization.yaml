---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sands-of-time

# The bootstrap Job is intentionally not listed; apply it once by hand
# (see README.md). No CronJob either: the serve process keeps itself current.
resources:
  - sands-of-time-namespace.yaml
  - sands-of-time-egress-networkpolicy.yaml
  - default-deny-networkpolicy.yaml
  - allow-observed-networkpolicy.yaml
  - sands-of-time-data-pvc.yaml
  - sands-of-time-deployment.yaml
  - sands-of-time-service.yaml
  - sands-of-time-route.yaml

labels:
  - pairs:
      app.kubernetes.io/name: sands-of-time
    includeSelectors: true
