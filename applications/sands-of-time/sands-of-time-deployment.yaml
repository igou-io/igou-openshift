---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sands-of-time
  namespace: sands-of-time
spec:
  replicas: 1
  # SQLite on a RWO volume: replace, never overlap.
  strategy:
    type: Recreate
  selector: {}
  template:
    metadata: {}
    spec:
      # GHCR package is private; secret is created out-of-band (see README.md).
      imagePullSecrets:
        - name: ghcr-pull
      # No runAsUser/fsGroup: restricted-v2 assigns them from the namespace
      # range. The app only writes to /data (PVC, fsGroup-owned by the SCC).
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: serve
          image: ghcr.io/david-igou/sands-of-time:latest@sha256:1d59381495432e6978b2e8fd0ed2c00b12086a000970a9e6c68a8f0d62f296b4
          args: ["serve"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
          # DB path comes from the image's env defaults.
          env:
            # Admin API bearer token. Optional: while the Secret is absent the
            # /api/admin surface stays disabled (503).
            - name: SOT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sands-of-time-admin
                  key: token
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/summary
              port: http
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /api/summary
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sands-of-time-data
