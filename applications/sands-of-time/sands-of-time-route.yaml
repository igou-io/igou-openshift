---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: sands-of-time
  namespace: sands-of-time
spec:
  host: sands-of-time.apps.ocp.igou.systems
  to:
    kind: Service
    name: sands-of-time
    weight: 100
  port:
    targetPort: http
  # Edge termination: the router terminates TLS (default wildcard cert for
  # *.apps.ocp.igou.systems) and forwards plaintext HTTP to the app on :8000.
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
