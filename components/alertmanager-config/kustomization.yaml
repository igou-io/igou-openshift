---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openshift-monitoring
resources:
  - alertmanager-eda-event-stream-externalsecret.yaml
  - alertmanager-slack-bot-token-externalsecret.yaml
  - drop-unsupported-hco-modification-alertrelabelconfig.yaml
secretGenerator:
  - name: alertmanager-main
    namespace: openshift-monitoring
    files:
      - alertmanager.yaml
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    # alertmanager-main is co-created by the cluster-monitoring-operator. SSA
    # silently loses field-ownership conflicts with the operator's stale
    # managedFields entries, so we use Replace=true: ArgoCD applies via
    # `kubectl replace`, which clears all managedFields and writes the full
    # Secret. The operator does not actively reconcile this Secret once it
    # has user content (verified empirically, hash stable across reconciles).
    argocd.argoproj.io/sync-options: Replace=true
