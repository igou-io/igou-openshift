---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openshift-monitoring
resources:
  - alertmanager-slack-externalsecret.yaml
secretGenerator:
  - name: alertmanager-main
    namespace: openshift-monitoring
    files:
      - alertmanager.yaml
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    # ServerSideApply=true is required because alertmanager-main is co-owned by
    # the cluster-monitoring-operator. Force=true tells ArgoCD's SSA to use
    # --force-conflicts so we win field ownership of data.alertmanager.yaml
    # instead of silently merging with stale CMO defaults.
    argocd.argoproj.io/sync-options: ServerSideApply=true,Force=true
