global:
  resolve_timeout: 5m
inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity =~ "warning|info"
    equal: [namespace, alertname]
  - source_matchers:
      - severity = warning
    target_matchers:
      - severity = info
    equal: [namespace, alertname]
route:
  group_by: [alertname, namespace]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: gotify
  routes:
    - matchers:
        - alertname = Watchdog
      receiver: 'null'
    - matchers:
        - alertname = AlertmanagerReceiversNotConfigured
      receiver: 'null'
    # Suppress self-referential delivery-failure alerts when the failing
    # integration is the gotify-bridge webhook. Bridge v2.3.2 has a bug:
    # with --dispatch_errors it does send a debug notification to Gotify
    # but still returns HTTP 400 for alerts missing the `description`
    # annotation, which Alertmanager treats as a permanent client error.
    # Several upstream OpenShift alerts (CDIDataImportCronOutdated,
    # CDIDefaultStorageClassDegraded, KubeJobFailed, ...) ship without a
    # description annotation and trigger this. Remove this matcher once
    # the bridge is patched or replaced.
    - matchers:
        - alertname =~ "Alertmanager(Cluster)?FailedToSendAlerts"
        - integration = webhook
      receiver: 'null'
    # eda-github-issue route temporarily removed — EDA event-stream pipeline
    # is not currently set up. Restore the route and receiver together.
    - matchers:
        - severity = critical
      receiver: gotify-and-slack-critical
    - matchers:
        - severity = warning
      receiver: gotify-and-slack-warning
    - matchers:
        - severity = info
      receiver: 'null'
receivers:
  - name: 'null'
  - name: gotify
    webhook_configs:
      - url: http://alertmanager-gotify-bridge.gotify.svc:8080/gotify_webhook
        send_resolved: true
  # Severity receivers fan out to both Gotify (push) and Slack. Bridge
  # v2.3.2 still returns HTTP 400 on alerts missing the `description`
  # annotation, but the `Alertmanager(Cluster)?FailedToSendAlerts
  # integration=webhook` route above null-routes the resulting flap, and
  # --dispatch_errors makes the bridge push a debug notification anyway.
  - name: gotify-and-slack-critical
    webhook_configs:
      - url: http://alertmanager-gotify-bridge.gotify.svc:8080/gotify_webhook
        send_resolved: true
    slack_configs:
      - api_url: https://slack.com/api/chat.postMessage
        channel: '#igoucloud-alerts-critical'
        http_config:
          authorization:
            credentials_file: /etc/alertmanager/secrets/alertmanager-slack-bot-token/password
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
  - name: gotify-and-slack-warning
    webhook_configs:
      - url: http://alertmanager-gotify-bridge.gotify.svc:8080/gotify_webhook
        send_resolved: true
    slack_configs:
      - api_url: https://slack.com/api/chat.postMessage
        channel: '#igoucloud-alerts-warning'
        http_config:
          authorization:
            credentials_file: /etc/alertmanager/secrets/alertmanager-slack-bot-token/password
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
