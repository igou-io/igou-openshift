global:
  resolve_timeout: 5m
inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity =~ "warning|info"
    equal: [namespace, alertname]
  - source_matchers:
      - severity = warning
    target_matchers:
      - severity = info
    equal: [namespace, alertname]
route:
  group_by: [alertname, namespace]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: gotify
  routes:
    - matchers:
        - alertname = Watchdog
      receiver: 'null'
    - matchers:
        - alertname = AlertmanagerReceiversNotConfigured
      receiver: 'null'
    # Suppress self-referential delivery-failure alerts when the failing
    # integration is the gotify-bridge webhook. Bridge v2.3.2 has a bug:
    # with --dispatch_errors it does send a debug notification to Gotify
    # but still returns HTTP 400 for alerts missing the `description`
    # annotation, which Alertmanager treats as a permanent client error.
    # Several upstream OpenShift alerts (CDIDataImportCronOutdated,
    # CDIDefaultStorageClassDegraded, KubeJobFailed, ...) ship without a
    # description annotation and trigger this. Remove this matcher once
    # the bridge is patched or replaced.
    - matchers:
        - alertname =~ "Alertmanager(Cluster)?FailedToSendAlerts"
        - integration = webhook
      receiver: 'null'
    - matchers:
        - severity = critical
      receiver: gotify-and-slack-critical
    - matchers:
        - severity = warning
      receiver: gotify-and-slack-warning
    - matchers:
        - severity = info
      receiver: 'null'
receivers:
  - name: 'null'
  - name: gotify
    webhook_configs:
      - url: http://alertmanager-gotify-bridge.gotify.svc:8080/gotify_webhook
        send_resolved: true
  # NOTE: gotify-bridge webhook intentionally omitted from severity
  # receivers. Bridge v2.3.2 returns HTTP 400 on alerts missing the
  # `description` annotation (CDIDataImportCronOutdated et al.) even
  # with --dispatch_errors enabled, which trips
  # AlertmanagerFailedToSendAlerts. Slack covers severity-routed alerts;
  # Gotify push only fires via the catch-all `gotify` default receiver.
  # Restore the webhook here once the bridge is patched or replaced.
  - name: gotify-and-slack-critical
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-critical/password
        channel: '#igoucloud-alerts-critical'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
  - name: gotify-and-slack-warning
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-warning/password
        channel: '#igoucloud-alerts-warning'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
