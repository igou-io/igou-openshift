global:
  resolve_timeout: 5m
inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity =~ "warning|info"
    equal: [namespace, alertname]
  - source_matchers:
      - severity = warning
    target_matchers:
      - severity = info
    equal: [namespace, alertname]
route:
  group_by: [alertname, namespace]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: gotify
  routes:
    - matchers:
        - alertname = Watchdog
      receiver: 'null'
    - matchers:
        - alertname = AlertmanagerReceiversNotConfigured
      receiver: 'null'
    - matchers:
        - severity = critical
      receiver: gotify-and-slack
    - matchers:
        - severity = info
      receiver: 'null'
receivers:
  - name: 'null'
  - name: gotify
    webhook_configs:
      - url: http://alertmanager-gotify-bridge.gotify.svc:8080/gotify_webhook
        send_resolved: true
  - name: gotify-and-slack
    webhook_configs:
      - url: http://alertmanager-gotify-bridge.gotify.svc:8080/gotify_webhook
        send_resolved: true
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook_url
        channel: '#igoucloud-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
