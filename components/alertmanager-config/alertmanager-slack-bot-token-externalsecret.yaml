---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-slack-bot-token
  namespace: openshift-monitoring
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-lab-external-api-keys
  target:
    name: alertmanager-slack-bot-token
    creationPolicy: Owner
    deletionPolicy: Retain
  # Pull ONLY the password field. The Connect provider's dataFrom.extract
  # also surfaces the item's empty `notesPlain` field as an empty secret key,
  # which the cluster-monitoring-operator rejects ("notesPlain key has empty
  # value"). The SDK provider omitted empty fields; Connect does not.
  data:
    - secretKey: password
      remoteRef:
        key: slack_notification_password
        property: password
        # declared to match ESO CRD defaults → keeps ArgoCD Synced
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
