apiVersion: deviceplugin.intel.com/v1
kind: GpuDevicePlugin
metadata:
  name: gpudeviceplugin
  namespace: intel-device-plugins
  annotations:
    argocd.argoproj.io/sync-wave: '2'
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  sharedDevNum: 10
  enableMonitoring: true
  # 4 dumps the full device map on every kubelet probe cycle (~2GB/day
  # of logs across 3 nodes — igou-openshift#382 volume review); 1 keeps
  # registration events and errors.
  logLevel: 1
