---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - grafana-namespace.yaml
  - grafana-operatorgroup.yaml
  - grafana-subscription.yaml
  - grafana-serviceaccount.yaml
  - grafana-rbac.yaml
  - grafana-sa-token-secret.yaml
  - grafana-oauth-cookie-password.yaml
  - grafana-oauth-cookie-externalsecret.yaml
  - grafana-grafana.yaml
  - grafana-thanos-datasource.yaml
  - grafana-dashboard-7587.yaml
  - grafana-dashboard-20340.yaml
  - grafana-dashboard-12239.yaml
  - grafana-dashboard-14584.yaml
  - grafana-dashboard-20417.yaml
  - grafana-dashboard-13679.yaml
  - grafana-dashboard-1860.yaml
  - grafana-dashboard-kubevirt-control-plane.yaml
  - grafana-dashboard-kubevirt-top-consumers.yaml
  - grafana-dashboard-external-secrets.yaml
  - grafana-dashboard-nut-exporter.yaml
# Vendored dashboard JSON (see grafana-dashboard-nut-exporter.yaml for why
# it cannot come from spec.grafanaCom). Stable name: the GrafanaDashboard
# CR references the ConfigMap by name.
configMapGenerator:
  - name: grafana-dashboard-nut-exporter-json
    namespace: grafana
    files:
      - dashboards/prometheus-nut-exporter-druggeri.json
generatorOptions:
  disableNameSuffixHash: true
commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
