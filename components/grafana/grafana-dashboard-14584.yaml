---
# Vendored locally (2026-07-24 dashboard audit): the upstream board was
# broken live — ArgoCD (OpenShift GitOps) needed patched selectors (see the audit PR).
# Re-vendor by refreshing dashboards/argocd.json and re-applying the
# documented patches.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-14584
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: '12'
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 24h
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: thanos-querier
  configMapRef:
    name: grafana-dashboard-14584-json
    key: argocd.json
