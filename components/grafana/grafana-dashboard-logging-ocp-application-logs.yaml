---
# Purpose-built board over the central logging streams (issue #382):
# variable-driven so per-host/group LogQL never has to be hand-written.
# JSON lives in dashboards/logging/ocp-application-logs.json via the configMapGenerator.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-logging-ocp-application-logs
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: '12'
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: logging
  resyncPeriod: 24h
  datasources:
    - inputName: DS_LOKI_APPLICATION
      datasourceName: loki-application
  configMapRef:
    name: grafana-dashboard-logging-ocp-application-logs-json
    key: ocp-application-logs.json
