---
# Purpose-built board over the central logging streams (issue #382):
# virt-launcher (host-side) logs from the application tenant plus guest
# journals from the infrastructure tenant where the guest ships them.
# JSON lives in dashboards/logging/kubevirt-vms.json.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-logging-kubevirt-vms
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: '12'
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: logging
  resyncPeriod: 24h
  datasources:
    - inputName: DS_LOKI_APPLICATION
      datasourceName: loki-application
    - inputName: DS_LOKI_INFRASTRUCTURE
      datasourceName: loki-infrastructure
  configMapRef:
    name: grafana-dashboard-logging-kubevirt-vms-json
    key: kubevirt-vms.json
