---
# Read access for the grafana SA to the LokiStack tenants through the
# gateway (issue #382): reads are authorized as `get` on the
# loki.grafana.com tenant resources, resourceName `logs`. Audit tenant
# deliberately excluded — admin/CLI only. The `network` tenant is the
# netobserv-loki flow store (clusters/ocp/netobserv).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grafana-loki-tenant-read
  annotations:
    argocd.argoproj.io/sync-wave: '10'
rules:
  - apiGroups:
      - loki.grafana.com
    resources:
      - application
      - infrastructure
      - network
    resourceNames:
      - logs
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-loki-tenant-read
  annotations:
    argocd.argoproj.io/sync-wave: '10'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grafana-loki-tenant-read
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: grafana
---
# The netobserv-loki gateway post-filters network-tenant reads by the
# caller's namespace visibility (a reader with no `view` gets success +
# zero streams). Cluster-wide `view` (no Secret access) lets grafana see
# flows for all namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-view
  annotations:
    argocd.argoproj.io/sync-wave: '10'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: grafana
