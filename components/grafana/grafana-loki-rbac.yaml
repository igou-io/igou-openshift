---
# Read access for the grafana SA to the LokiStack tenants through the
# gateway (issue #382): reads are authorized as `get` on the
# loki.grafana.com tenant resources, resourceName `logs`. Audit tenant
# deliberately excluded — admin/CLI only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grafana-loki-tenant-read
  annotations:
    argocd.argoproj.io/sync-wave: '10'
rules:
  - apiGroups:
      - loki.grafana.com
    resources:
      - application
      - infrastructure
    resourceNames:
      - logs
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-loki-tenant-read
  annotations:
    argocd.argoproj.io/sync-wave: '10'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grafana-loki-tenant-read
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: grafana
