---
# TrueNAS metrics dashboard for the netdata, smartctl, and IPMI exporters.
# Vendored under dashboards/ + configMapGenerator so the datasource uid refs
# can be mapped to thanos-querier below.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-truenas
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: '12'
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 24h
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: thanos-querier
  configMapRef:
    name: grafana-dashboard-truenas-json
    key: truenas.json
