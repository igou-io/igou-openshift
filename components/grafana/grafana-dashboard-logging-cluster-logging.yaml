---
# Vendored copy of the operator-shipped console dashboard (ConfigMap
# grafana-dashboard-cluster-logging in openshift-config-managed) so the LokiStack /
# collector health is visible in the lab Grafana, not just the OCP
# console. The ${datasource} template var resolves to the instance
# default (thanos-querier). Re-vendor when the logging operators bump.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-logging-cluster-logging
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: '12'
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: logging
  resyncPeriod: 24h
  configMapRef:
    name: grafana-dashboard-logging-cluster-logging-json
    key: cluster-logging.json
