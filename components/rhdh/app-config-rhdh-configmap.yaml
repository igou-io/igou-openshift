---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: '10'
data:
  app-config.yaml: |
    app:
      title: Red Hat Developer Hub
      baseUrl: https://rhdh.apps.ocp.igou.systems
    # RHDH's frontend SignInPage hardcodes `github` as the default
    # provider when `signInPage` isn't set, and only honors `guest` in
    # dev mode. `oauth2Proxy` is the supported "proxied provider" that
    # tells the frontend to trust upstream proxy headers — exactly
    # what our oauth-proxy sidecar publishes via --pass-user-headers
    # (X-Forwarded-User, X-Forwarded-Email).
    signInPage: oauth2Proxy
    auth:
      environment: production
      providers:
        oauth2Proxy:
          signIn:
            resolvers:
              # Map oauth-proxy's X-Forwarded-User header to a Backstage
              # User entity by name. With no catalog seed yet, allow
              # sign-in without a matching entity (synthetic identity).
              - resolver: forwardedUserMatchingUserEntityName
                dangerouslyAllowSignInWithoutUserInCatalog: true
    backend:
      baseUrl: https://rhdh.apps.ocp.igou.systems
      cors:
        origin: https://rhdh.apps.ocp.igou.systems
      auth:
        externalAccess:
          - type: legacy
            options:
              subject: legacy-default-config
              secret: "${BACKEND_SECRET}"
      database:
        client: pg
        # Backstage's default `database` plugin-division mode runs
        # CREATE DATABASE per plugin, which requires CREATEDB on the
        # role. CNPG's bootstrap-created role doesn't have it. Switch
        # to `schema` so each plugin gets its own schema inside the
        # already-owned `backstage` database — no extra privileges
        # needed.
        pluginDivisionMode: schema
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
