---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: '10'
data:
  app-config.yaml: |
    app:
      title: Red Hat Developer Hub
      baseUrl: https://rhdh.apps.ocp.igou.systems
    auth:
      environment: production
      providers:
        # The OpenShift oauth-proxy sidecar enforces the actual auth
        # perimeter (redirect to OpenShift OAuth, validate via
        # TokenReview). Backstage itself runs in guest mode for the
        # single-user case. `dangerouslyAllowOutsideDevelopment: true`
        # is required because the guest provider is dev-only by default.
        guest:
          dangerouslyAllowOutsideDevelopment: true
    backend:
      baseUrl: https://rhdh.apps.ocp.igou.systems
      cors:
        origin: https://rhdh.apps.ocp.igou.systems
      auth:
        externalAccess:
          - type: legacy
            options:
              subject: legacy-default-config
              secret: "${BACKEND_SECRET}"
      database:
        client: pg
        # Backstage's default `database` plugin-division mode runs
        # CREATE DATABASE per plugin, which requires CREATEDB on the
        # role. CNPG's bootstrap-created role doesn't have it. Switch
        # to `schema` so each plugin gets its own schema inside the
        # already-owned `backstage` database — no extra privileges
        # needed.
        pluginDivisionMode: schema
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
