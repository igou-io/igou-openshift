---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rhdh-postgres-credentials
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: '9'
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-sdk-ocp-pull
  target:
    name: rhdh-postgres-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # CNPG bootstrap.initdb.secret reads these two keys.
        username: "{{ .username }}"
        password: "{{ .password }}"
        # rhdh-operator extraEnvs.secrets projects every key as a pod env
        # var of the same name. POSTGRES_HOST/PORT are deterministic from
        # the CNPG -rw service so they're hard-coded constants here.
        POSTGRES_USER: "{{ .username }}"
        POSTGRES_PASSWORD: "{{ .password }}"
        POSTGRES_HOST: rhdh-pg-rw.rhdh.svc.cluster.local
        POSTGRES_PORT: "5432"
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: rhdh-postgres-credentials
        metadataPolicy: None
        nullBytePolicy: Ignore
