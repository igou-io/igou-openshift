---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rhdh-catalog-users
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: '10'
data:
  users.yaml: |
    ---
    apiVersion: backstage.io/v1alpha1
    kind: User
    metadata:
      name: igou
      annotations:
        backstage.io/managed-by-location: file:/opt/catalog-entities/users.yaml
        backstage.io/managed-by-origin-location: file:/opt/catalog-entities/users.yaml
    spec:
      profile:
        displayName: igou
        email: igou@igou.systems
      memberOf: []
