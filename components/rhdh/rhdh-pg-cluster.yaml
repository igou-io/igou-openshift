---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: rhdh-pg
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: '10'
spec:
  instances: 1
  # Single-instance Postgres on SNO has no HA value to preserve and CNPG's
  # auto-PDB fires PodDisruptionBudgetAtLimit. Disable it. Re-enable only
  # if you raise instances to >= 2.
  enablePDB: false
  imagePullPolicy: IfNotPresent
  # Pin to the always-present control-plane host so a rolling restart never
  # migrates the RWO NVMe-oF PVC to an (ephemeral CAPI) worker node and trips the
  # democratic-csi Multi-Attach bug. See docs/runbooks/nvmeof-stuck-multiattach.md.
  affinity:
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
    podAntiAffinityType: preferred # CNPG default; declared to avoid ArgoCD drift
  # 2026-07-03 disaster recovery: restore the backstage database from the Barman
  # Cloud backup on RustFS (latest base 2026-07-02) instead of initdb. Revert to
  # the initdb block below once recovered and verified.
  #   bootstrap:
  #     initdb:
  #       database: backstage
  #       owner: backstage
  #       secret:
  #         name: rhdh-postgres-credentials
  bootstrap:
    recovery:
      source: rhdh-pg
  externalClusters:
    - name: rhdh-pg
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: rhdh-pg-backup
          serverName: rhdh-pg
  storage:
    size: 10Gi
    storageClass: freenas-nvmeof-ssd-csi
  monitoring:
    enablePodMonitor: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  # Barman Cloud Plugin: continuous WAL archiving + backups to the rhdh-pg-backup
  # ObjectStore. serverName defaults to the cluster name (rhdh-pg).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true # operator-defaulted; declared so ArgoCD (SSA) stays Synced
      isWALArchiver: true
      parameters:
        barmanObjectName: rhdh-pg-backup
