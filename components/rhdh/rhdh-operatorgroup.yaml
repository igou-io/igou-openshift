---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhdh
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: '9'
spec:
  # rhdh-operator advertises AllNamespaces only — it rejected the
  # OwnNamespace install mode. Empty spec (no targetNamespaces, no
  # selector) puts this OperatorGroup in cluster-wide / AllNamespaces mode.
  upgradeStrategy: Default
