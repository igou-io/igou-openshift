apiVersion: metallb.io/v1beta1
kind: MetalLB
metadata:
  name: metallb
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    argocd.argoproj.io/sync-wave: '2'
spec:
  logLevel: info
  bgpBackend: frr
  # Tolerate casval's burst taint so the speaker DaemonSet covers all
  # nodes — required for externalTrafficPolicy: Local services.
  speakerTolerations:
    - key: workload
      value: burst
      effect: NoSchedule
