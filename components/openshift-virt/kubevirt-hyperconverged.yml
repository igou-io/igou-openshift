apiVersion: hco.kubevirt.io/v1beta1
kind: HyperConverged
metadata:
  name: kubevirt-hyperconverged
  namespace: openshift-cnv
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    # HCO copies spec.workloads.nodePlacement verbatim onto every workload
    # component it manages, including the CDI CR. That made transient CDI pods
    # (importer-prime / cdi-upload-prime) tolerate casval's workload=burst
    # taint, so the CAPI cluster-autoscaler treated the casval-worker node
    # group as a valid home for them and booted the burst node during plain
    # DataVolume imports/clones (3x on 2026-07-09, each node came up empty and
    # was scaled back down ~40min later). Strip the tolerations from the CDI CR
    # only: virt-handler keeps them (it must run on casval for opt-in VMs to
    # schedule there, and DaemonSet pods never trigger autoscaler scale-up),
    # while CDI worker pods stay on the always-on workers. Note: HCO reports
    # jsonpatch annotations as an unsupported modification
    # (kubevirt_hco_unsafe_modification_count metric) — accepted trade-off.
    containerizeddataimporter.kubevirt.io/jsonpatch: |-
      [
        {
          "op": "remove",
          "path": "/spec/workload/tolerations"
        }
      ]
spec:
  # Backend storage for persistent vTPM + persistent EFI (NVRAM) state PVCs.
  # Every Windows VM here carries persistent vTPM + EFI (baked into the
  # windows.* ClusterPreferences), and KubeVirt stores that state in a small
  # per-VM PVC. Resolution order is this field -> SC annotated
  # storageclass.kubevirt.io/is-default-virt-class -> cluster default. Both of
  # the latter are unset, so it would silently fall to freenas-nvmeof-ssd-csi
  # (Block, RWO) — but TPM/EFI state needs Filesystem mode. Pin it explicitly to
  # an NFS (Filesystem-native, RWX) class. Performance is irrelevant for a
  # boot-time-read state volume. This must be set BEFORE the first VM with
  # persistent TPM/EFI state is created (changing it later orphans state PVCs).
  # See igou-io/igou-openshift#380 (Phase 0).
  vmStateStorageClass: freenas-nfs-ssd-csi
  # This cluster does NOT support live migration by design: we run RWO block
  # storage only (no RWX block), so VM disks can't be shared across nodes and
  # VMs are never migratable. A short outage to power-cycle a VM during node
  # maintenance is acceptable here. Default every VM's eviction strategy to
  # None so a node drain cleanly shuts the VM down instead of attempting a
  # migration that can't succeed — which is what raises the (noise)
  # VMCannotBeEvicted alert under the KubeVirt default of LiveMigrate.
  # See igou-io/igou-openshift#405.
  evictionStrategy: None
  featureGates:
    deployTektonTaskResources: true
    enableCommonBootImageImport: true
  #   nonRoot: true
  #   withHostPassthroughCPU: true
  # Allow virt-handler (and virt-launcher pods it spawns) onto the casval burst
  # worker, which carries workload=burst:NoSchedule from the CAPI MachineSet.
  # HCO propagates this to the virt-handler DaemonSet so VMs that opt in via
  # matching nodeSelector + toleration can run there. CDI is deliberately
  # excluded via the containerizeddataimporter.kubevirt.io/jsonpatch
  # annotation above — see the comment there.
  workloads:
    nodePlacement:
      # Keep virt-handler (and therefore VM scheduling) OFF truenas-w1:
      # that worker is itself a KVM guest on the TrueNAS host — nested
      # virtualization there is unsupported/unwanted, and its disk and
      # the cluster's CSI storage share one failure domain.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - truenas-w1
      tolerations:
        - key: workload
          operator: Equal
          value: burst
          effect: NoSchedule
