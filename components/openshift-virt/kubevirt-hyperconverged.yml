apiVersion: hco.kubevirt.io/v1beta1
kind: HyperConverged
metadata:
  name: kubevirt-hyperconverged
  namespace: openshift-cnv
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  featureGates:
    deployTektonTaskResources: true
    enableCommonBootImageImport: true
  #   nonRoot: true
  #   withHostPassthroughCPU: true
  # Allow virt-handler (and virt-launcher pods it spawns) onto the casval burst
  # worker, which carries workload=burst:NoSchedule from the CAPI MachineSet.
  # HCO propagates this to the virt-handler DaemonSet so VMs that opt in via
  # matching nodeSelector + toleration can run there.
  workloads:
    nodePlacement:
      # Keep virt-handler (and therefore VM scheduling) OFF truenas-w1:
      # that worker is itself a KVM guest on the TrueNAS host — nested
      # virtualization there is unsupported/unwanted, and its disk and
      # the cluster's CSI storage share one failure domain.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - truenas-w1.igou.systems
      tolerations:
        - key: workload
          operator: Equal
          value: burst
          effect: NoSchedule
