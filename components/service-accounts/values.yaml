namespace:
  create: true
  name: service-accounts

defaults:
  createServiceAccount: true
  automountServiceAccountToken: false
  longLivedToken:
    enabled: true
    nameSuffix: "-token"

clusterRoles:
  - name: molecule-kubernetes
    rules:
      - apiGroups:
          - kubevirt.io
        resources:
          - virtualmachines
        verbs:
          - get
          - list
          - watch
          - create
          - delete
          - patch
          - update
      - apiGroups:
          - ""
        resources:
          - services
        verbs:
          - get
          - list
          - watch
          - create
          - delete
          - patch
          - update
      - apiGroups:
          - ""
        resources:
          - pods
        verbs:
          - get
          - list
      # VMI reads let scenarios wait on install progress (phase, guest-agent
      # AgentConnected condition) — the VMI carries that status, not the VM.
      - apiGroups:
          - kubevirt.io
        resources:
          - virtualmachineinstances
        verbs:
          - get
          - list
          - watch
      # The Windows golden-image build (igou-ansible#343) drives the VM
      # imperatively: start/stop around sysprep, and VNC for the ISO
      # "press any key" CD-boot keypress helper.
      - apiGroups:
          - subresources.kubevirt.io
        resources:
          - virtualmachines/start
          - virtualmachines/stop
          - virtualmachines/restart
          - virtualmachineinstances/console
          - virtualmachineinstances/vnc
        verbs:
          - get
          - update
      # Sysprep/autounattend payloads mounted into the build VM. Secrets
      # included because the rendered autounattend carries the admin password.
      - apiGroups:
          - ""
        resources:
          - configmaps
          - secrets
        verbs:
          - get
          - list
          - watch
          - create
          - delete
          - patch
          - update
      # Read-only: watch DV-owned PVCs reach Bound during import/clone.
      - apiGroups:
          - ""
        resources:
          - persistentvolumeclaims
        verbs:
          - get
          - list
          - watch
      # DataVolumes let molecule scenarios boot from CDI-managed golden images
      # (dataVolumeTemplates on the VM). Paired with golden-image-cloner below
      # for the cross-namespace clone authorization. patch/update are needed
      # for re-runnability: kubernetes.core.k8s state=present PATCHes an
      # existing object, so a second run over a leftover DataVolume is
      # forbidden without them (hit live by windows-build-golden-image).
      - apiGroups:
          - cdi.kubevirt.io
        resources:
          - datavolumes
        verbs:
          - get
          - list
          - watch
          - create
          - delete
          - patch
          - update
      # Same-namespace clone authorization (capture the generalized disk and
      # boot verify VMs from it, all inside the molecule namespace).
      - apiGroups:
          - cdi.kubevirt.io
        resources:
          - datavolumes/source
        verbs:
          - create
      # Golden images built by molecule are published as DataSources in the
      # molecule namespace itself — never in openshift-virtualization-os-images.
      - apiGroups:
          - cdi.kubevirt.io
        resources:
          - datasources
        verbs:
          - get
          - list
          - watch
          - create
          - delete
          - patch
          - update

  # CDI cross-namespace clone authorization: creating a DataVolume that clones
  # from another namespace requires `datavolumes/source create` in the SOURCE
  # namespace, plus read on the source DataVolume to check it is ready. Bound
  # to ansible-molecule in openshift-virtualization-os-images (boot from the
  # DataImportCron golden images) and in windows-images (clone the installer
  # ISO DVs into the molecule namespace for the golden-image build).
  - name: golden-image-cloner
    rules:
      - apiGroups:
          - cdi.kubevirt.io
        resources:
          - datavolumes/source
        verbs:
          - create
      - apiGroups:
          - cdi.kubevirt.io
        resources:
          - datavolumes
        verbs:
          - get
          - list
          - watch

  - name: virtualmachine-reader
    rules:
      - apiGroups: ["kubevirt.io"]
        resources: ["virtualmachineinstances", "virtualmachines"]
        verbs: ["get", "watch", "list"]
      - apiGroups: [""]
        resources: ["namespaces", "services"]
        verbs: ["list"]

  - name: virtualmachine-deployer
    rules:
      - apiGroups: ["kubevirt.io"]
        resources: ["virtualmachineinstances", "virtualmachines"]
        verbs: ["*"]
      - apiGroups: ["cdi.kubevirt.io"]
        resources: ["datavolumes"]
        verbs: ["*"]
      - apiGroups: [""]
        resources: ["namespaces", "services"]
        verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
      - apiGroups: ["upload.cdi.kubevirt.io"]
        resources: ["uploadtokenrequests"]
        verbs: ["create"]
      - apiGroups: ["route.openshift.io"]
        resources: ["routes", "routes/custom-host"]
        verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  - name: virtualmachine-ops
    rules:
      - apiGroups: ["kubevirt.io"]
        resources: ["virtualmachines", "virtualmachineinstances", "virtualmachineinstancemigrations"]
        verbs: ["*"]
      - apiGroups: ["subresources.kubevirt.io"]
        resources:
          - virtualmachines/start
          - virtualmachines/stop
          - virtualmachines/restart
          - virtualmachines/migrate
          - virtualmachines/addvolume
          - virtualmachines/removevolume
          - virtualmachines/expand-spec
          - virtualmachines/portforward
          - virtualmachineinstances/console
          - virtualmachineinstances/vnc
          - virtualmachineinstances/portforward
          - virtualmachineinstances/pause
          - virtualmachineinstances/unpause
          - virtualmachineinstances/freeze
          - virtualmachineinstances/unfreeze
          - virtualmachineinstances/softreboot
          - virtualmachineinstances/addvolume
          - virtualmachineinstances/removevolume
          - virtualmachineinstances/guestosinfo
          - virtualmachineinstances/filesystemlist
          - virtualmachineinstances/userlist
        verbs: ["get", "update"]
      - apiGroups: ["cdi.kubevirt.io"]
        resources: ["datavolumes"]
        verbs: ["*"]
      - apiGroups: ["cdi.kubevirt.io"]
        resources: ["datavolumes/source"]
        verbs: ["create"]
      - apiGroups: ["upload.cdi.kubevirt.io"]
        resources: ["uploadtokenrequests"]
        verbs: ["create"]
      - apiGroups: ["cdi.kubevirt.io"]
        resources: ["datasources", "dataimportcrons"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["snapshot.kubevirt.io"]
        resources: ["virtualmachinesnapshots", "virtualmachinerestores"]
        verbs: ["*"]
      - apiGroups: ["snapshot.kubevirt.io"]
        resources: ["virtualmachinesnapshotcontents"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["clone.kubevirt.io"]
        resources: ["virtualmachineclones"]
        verbs: ["*"]
      - apiGroups: ["instancetype.kubevirt.io"]
        resources:
          - virtualmachineinstancetypes
          - virtualmachineclusterinstancetypes
          - virtualmachinepreferences
          - virtualmachineclusterpreferences
        verbs: ["get", "list", "watch"]
      - apiGroups: [""]
        resources: ["namespaces", "persistentvolumeclaims", "pods"]
        verbs: ["get", "list", "watch"]
      - apiGroups: [""]
        resources: ["services"]
        verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
      - apiGroups: [""]
        resources: ["secrets", "configmaps"]
        verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # AAP openshift_etcd_defrag job (igou-inventory#81): the
  # cluster-etcd-operator skips auto-defrag on SingleReplica topology,
  # so a scheduled AAP job execs etcdctl defrag in the etcd pods.
  # Scoped to exactly what kubernetes.core needs: pod read + exec,
  # bound only in openshift-etcd.
  - name: etcd-defrag
    rules:
      - apiGroups:
          - ""
        resources:
          - pods
        verbs:
          - get
          - list
      - apiGroups:
          - ""
        resources:
          - pods/exec
        verbs:
          - get
          - create

serviceAccounts:
  - name: cluster-read-only
    clusterRoleBindings:
      - name: cluster-read-only
        clusterRole: cluster-reader
      - name: cluster-read-only-monitoring-view
        clusterRole: cluster-monitoring-view
    pushSecrets:
      - name: cluster-read-only-token-push
        refreshInterval: "0"
        secretStoreRefs:
          - name: onepassword-claude
            kind: ClusterSecretStore
          - name: onepassword-lab-serviceaccounts
            kind: ClusterSecretStore
        data:
          - conversionStrategy: None
            match:
              secretKey: token
              remoteRef:
                remoteKey: ocp-cluster-read-only
                property: token

  - name: cluster-edit
    roleBindings:
      - namespace: default
        clusterRoles:
          - edit
    pushSecrets:
      - name: cluster-edit-token-push
        refreshInterval: "0"
        secretStoreRefs:
          - name: onepassword-claude
            kind: ClusterSecretStore
          - name: onepassword-lab-serviceaccounts
            kind: ClusterSecretStore
        data:
          - conversionStrategy: None
            match:
              secretKey: token
              remoteRef:
                remoteKey: ocp-cluster-edit
                property: token

  - name: claude-edit
    roleBindings:
      - namespace: sands-of-time
        clusterRoles:
          - edit
    pushSecrets:
      - name: claude-edit-token-push
        refreshInterval: "0"
        secretStoreRefs:
          - name: onepassword-claude
            kind: ClusterSecretStore
          - name: onepassword-lab-serviceaccounts
            kind: ClusterSecretStore
        data:
          - conversionStrategy: None
            match:
              secretKey: token
              remoteRef:
                remoteKey: ocp-claude-edit
                property: token

  - name: ansible-molecule
    roleBindings:
      - namespace: molecule
        clusterRoles:
          - molecule-kubernetes
      - namespace: openshift-virtualization-os-images
        clusterRoles:
          - golden-image-cloner
      # Source-side grant for the windows-build-golden-image scenario: clone
      # the installer ISO DataVolumes into the molecule build namespace.
      - namespace: windows-images
        clusterRoles:
          - golden-image-cloner
    clusterRoleBindings:
      - name: ansible-molecule-node-reader
        clusterRole: system:node-reader
    pushSecrets:
      - name: ansible-molecule-token-push
        refreshInterval: "0"
        secretStoreRefs:
          - name: onepassword-claude
            kind: ClusterSecretStore
          - name: onepassword-lab-serviceaccounts
            kind: ClusterSecretStore
        data:
          - conversionStrategy: None
            match:
              secretKey: token
              remoteRef:
                remoteKey: ocp-ansible-molecule
                property: token

  - name: virtualmachine-reader
    clusterRoleBindings:
      - name: virtualmachine-reader
        clusterRole: virtualmachine-reader

  - name: virtualmachine-deployer
    clusterRoleBindings:
      - name: virtualmachine-deployer
        clusterRole: virtualmachine-deployer

  - name: virtualmachine-ops
    clusterRoleBindings:
      - name: virtualmachine-ops
        clusterRole: virtualmachine-ops
    pushSecrets:
      - name: virtualmachine-ops-token
        refreshInterval: "0"
        secretStoreRefs:
          - name: onepassword-ocp-push
            kind: ClusterSecretStore
          - name: onepassword-lab-serviceaccounts
            kind: ClusterSecretStore
        data:
          - conversionStrategy: None
            match:
              secretKey: token
              remoteRef:
                remoteKey: ocp-virtualmachine-ops
                property: token

  - name: ns-agent
    pushSecrets:
      - name: ns-agent-token
        refreshInterval: "0"
        secretStoreRefs:
          - name: onepassword-ocp-push
            kind: ClusterSecretStore
          - name: onepassword-lab-serviceaccounts
            kind: ClusterSecretStore
        data:
          - conversionStrategy: None
            match:
              secretKey: token
              remoteRef:
                remoteKey: ns-agent
                property: token

  - name: etcd-defrag
    roleBindings:
      - namespace: openshift-etcd
        clusterRoles:
          - etcd-defrag
    pushSecrets:
      - name: etcd-defrag-token
        refreshInterval: "0"
        secretStoreRefs:
          - name: onepassword-ocp-push
            kind: ClusterSecretStore
          - name: onepassword-lab-serviceaccounts
            kind: ClusterSecretStore
        data:
          - conversionStrategy: None
            match:
              secretKey: token
              remoteRef:
                remoteKey: ocp-etcd-defrag
                property: token
