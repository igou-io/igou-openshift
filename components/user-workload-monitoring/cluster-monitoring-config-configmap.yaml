---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-config
  namespace: openshift-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: '5'
    argocd.argoproj.io/sync-options: ServerSideApply=true
data:
  config.yaml: |
    enableUserWorkload: true
    alertmanagerMain:
      # Receive alerts from user-workload Prometheus too (UWM AM is
      # disabled in user-workload-monitoring-config) so user-namespace
      # alerts route through the gotify/slack receivers configured here.
      enableUserAlertmanagerConfig: true
      secrets:
        - alertmanager-slack-critical
        - alertmanager-slack-warning
