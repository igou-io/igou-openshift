---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grafana-operator
  namespace: grafana
  labels:
    app.kubernetes.io/part-of: grafana-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-operator
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
