---
# Observed-flow allow policy for snmp-exporter (NetObserv eBPF, 1:50 sampling).
# Derived from captured inter-namespace flows; see PR body for methodology + caveats.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observed
  namespace: snmp-exporter
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-user-workload-monitoring
      ports:
        - port: 9116
          protocol: TCP
    # host-network sources: kubelet health probes and/or UWM/monitoring
    # scrapes that netobserv could not attribute to a namespace. Scoped to
    # the node/lab network. Observed metrics/health ports.
    - from:
        - ipBlock:
            cidr: 10.10.9.0/24
      ports:
        - port: 9116
          protocol: TCP
  egress:
    # cluster DNS (always required)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    # external / off-cluster egress (internet + lab devices). Cluster pod
    # and service CIDRs are excluded to block lateral movement; the node/lab
    # network (10.10.0.0/16) stays reachable for lab-device targets.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.128.0.0/14
              - 172.30.0.0/16
