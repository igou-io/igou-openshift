---
# TrueNAS alerts for the netdata, smartctl, and IPMI exporters on VLAN9.
# severity critical/warning routes to the EDA GitHub-issue pipeline +
# Gotify/Slack via the platform Alertmanager.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: truenas
  labels:
    app.kubernetes.io/name: truenas
    app.kubernetes.io/part-of: truenas
    openshift.io/prometheus-rule-evaluation-scope: leaf-prometheus
spec:
  groups:
    - name: truenas.disk
      rules:
        - alert: ColdDiskLatencyOutlier
          # Absolute floor (> 200 ms busy ≈ >20% util) guards against the
          # median collapsing to 0 when the pool is idle, which would turn the
          # ">3× median" test into ">0" and fire on any trivially-busy disk.
          expr: >
            netdata_Disk_Busy_Time_Milliseconds_average{disk=~"ZC16MM71|YVKX3BSK|YVKU4R7K|YHJBKNGA|YHJDPJTA|PN2234P9JSE1UW"}
              > 3 * scalar(quantile(0.5, netdata_Disk_Busy_Time_Milliseconds_average{disk=~"ZC16MM71|YVKX3BSK|YVKU4R7K|YHJBKNGA|YHJDPJTA|PN2234P9JSE1UW"}))
              and
            netdata_Disk_Busy_Time_Milliseconds_average{disk=~"ZC16MM71|YVKX3BSK|YVKU4R7K|YHJBKNGA|YHJDPJTA|PN2234P9JSE1UW"} > 200
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Cold data disk {{ $labels.disk }} busy-time > 3× pool median
            description: |
              Disk {{ $labels.disk }} busy-time on {{ $labels.instance }} has
              been more than 3× the pool median for 30m - likely a slow or
              ailing drive.
        - alert: BootDeviceOverTemp
          expr: smartctl_device_temperature{device="sdk"} > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: SATADOM boot device overheating
            description: |
              SATADOM boot device sdk on {{ $labels.instance }} is
              {{ $value | humanize }}C. It normally runs 72-73C; this alert
              fires above 85C, where boot-device failure is imminent and means
              a whole-box outage.
        - alert: DiskTempHigh
          expr: >
            smartctl_device_temperature{device!="sdk", temperature_type="current"} > 60
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Disk {{ $labels.device }} temperature critical
            description: |
              Disk {{ $labels.device }} on {{ $labels.instance }} is
              {{ $value | humanize }}C. Check the SMART serial/model labels
              for stable drive identity.
        - alert: DiskTempWarn
          expr: >
            (smartctl_device_temperature{device!="sdk", temperature_type="current"} > 50)
              and
            (smartctl_device_temperature{device!="sdk", temperature_type="current"} <= 60)
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Disk {{ $labels.device }} temperature elevated
            description: |
              Disk {{ $labels.device }} on {{ $labels.instance }} is
              {{ $value | humanize }}C (warn band 50-60C). Check the SMART
              serial/model labels for stable drive identity.
    - name: truenas.smart
      rules:
        - alert: SmartFailurePredicted
          expr: >
            (smartctl_device_smart_status * on(device) group_left(serial_number,model_name) smartctl_device) == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: SMART failure predicted for {{ $labels.device }} ({{ $labels.serial_number }})
            description: |
              SMART status for {{ $labels.device }} ({{ $labels.serial_number }},
              {{ $labels.model_name }}) on {{ $labels.instance }} reports failure
              predicted. Replace the device before it fails.
        - alert: SASGrownDefects
          expr: >
            (smartctl_scsi_grown_defect_list * on(device) group_left(serial_number,model_name) smartctl_device) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: SAS grown defect list non-zero on {{ $labels.device }} ({{ $labels.serial_number }})
            description: |
              SAS disk {{ $labels.device }} ({{ $labels.serial_number }},
              {{ $labels.model_name }}) has a non-zero grown defect list.
        - alert: SASUncorrectedErrors
          expr: >
            ((smartctl_read_total_uncorrected_errors * on(device) group_left(serial_number,model_name) smartctl_device) > 0)
              or
            ((smartctl_write_total_uncorrected_errors * on(device) group_left(serial_number,model_name) smartctl_device) > 0)
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: SAS uncorrected errors on {{ $labels.device }} ({{ $labels.serial_number }})
            description: |
              SAS disk {{ $labels.device }} ({{ $labels.serial_number }},
              {{ $labels.model_name }}) on {{ $labels.instance }} has read or
              write uncorrected errors. Inspect with smartctl before the drive
              degrades further.
        - alert: SATASectorErrors
          expr: >
            (smartctl_device_attribute{attribute_name=~"Reallocated_Sector_Ct|Current_Pending_Sector|Offline_Uncorrectable", attribute_value_type="raw"}
              * on(device) group_left(serial_number,model_name) smartctl_device) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: SATA sector errors on {{ $labels.device }} ({{ $labels.serial_number }})
            description: |
              SATA disk {{ $labels.device }} ({{ $labels.serial_number }},
              {{ $labels.model_name }}) on {{ $labels.instance }} has
              {{ $labels.attribute_name }} raw value {{ $value | humanize }}.
        - alert: NVMeWearHigh
          expr: smartctl_device_percentage_used > 80
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: NVMe wear high on {{ $labels.device }}
            description: |
              NVMe device {{ $labels.device }} on {{ $labels.instance }} has
              {{ $value | humanize }}% lifetime used.
        - alert: NVMeSpareLow
          expr: >
            smartctl_device_available_spare < smartctl_device_available_spare_threshold
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: NVMe spare below threshold on {{ $labels.device }}
            description: |
              NVMe device {{ $labels.device }} on {{ $labels.instance }} has
              available spare below the device threshold.
    - name: truenas.chassis
      rules:
        - alert: IPMISensorCritical
          expr: ipmi_sensor_state{name!~"Chassis Intru.*"} == 2
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: IPMI sensor {{ $labels.name }} critical on {{ $labels.instance }}
            description: |
              IPMI sensor {{ $labels.name }} on {{ $labels.instance }} is in
              a critical state (state=2). The stale Chassis Intru sensor is
              excluded.
        - alert: IPMIFanStopped
          expr: ipmi_fan_speed_rpm == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: IPMI fan {{ $labels.name }} stopped on {{ $labels.instance }}
            description: |
              IPMI fan {{ $labels.name }} on {{ $labels.instance }} reports
              0 RPM. Unpopulated FAN3/FAN6 emit no series, so this is safe.
        - alert: IPMINICTempHigh
          expr: ipmi_temperature_celsius{name=~"MB_NIC.*"} > 88
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Onboard NIC temperature high
            description: |
              Onboard NIC sensor {{ $labels.name }} on {{ $labels.instance }}
              is {{ $value | humanize }}C.
        - alert: IPMIPowerSupplyDegraded
          expr: ipmi_sensor_state{name=~"PS.*"} >= 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: Power supply {{ $labels.name }} degraded
            description: |
              Power supply {{ $labels.name }} on {{ $labels.instance }} is
              degraded. This is a single-PSU box with no redundancy.
    - name: truenas.scrape
      rules:
        - alert: TrueNASExporterDown
          expr: up{job=~"truenas-.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: TrueNAS exporter {{ $labels.job }} scrape failing
            description: |
              UWM Prometheus cannot scrape {{ $labels.job }} on
              {{ $labels.instance }}. This alert is per exporter target
              because netdata, smartctl, and ipmi use separate ServiceMonitors.
    # Recording rules that roll per-disk netdata series up to pool-level
    # aggregates for the ZFS & Storage Health dashboard (igou-inventory#154)
    # and future pool-saturation alerts (igou-openshift#422). netdata_* series
    # only exist in the UWM leaf Prometheus, which is why these live in THIS
    # file (see the leaf-prometheus evaluation-scope label above). The
    # serial->pool map below is the SINGLE source of truth, dated 2026-07-10
    # (post BX500 mirror-1 eviction); it is the ONLY place to edit when a disk
    # is replaced. Excluded: evicted BX500s 2515E9B3E0E1/2515E9B3E121, cold
    # spares ZC16Q4Z6/P9JTUH8W, unpooled CT500P3SSD8s, and the boot-pool
    # SATADOM (single device, no aggregation value).
    - name: truenas.recording.disk
      rules:
        - record: disk:truenas_disk_busy_ms
          expr: >
            sum by (disk, instance) (netdata_Disk_Busy_Time_Milliseconds_average{disk=~"S753NS0X206644B|S753NS0X206645D"})
          labels:
            pool: ssd
        - record: disk:truenas_disk_throughput_bytes
          expr: >
            sum by (disk, dimension, instance) ({__name__=~"netdata_Read_Write_for_disk_.*_KiB_persec_average", disk=~"S753NS0X206644B|S753NS0X206645D"}) * 1024
          labels:
            pool: ssd
        - record: disk:truenas_disk_iops
          expr: >
            sum by (disk, dimension, instance) ({__name__=~"netdata_Complete_read_write_for_disk_.*_Operation_persec_average", disk=~"S753NS0X206644B|S753NS0X206645D"})
          labels:
            pool: ssd
        - record: disk:truenas_disk_busy_ms
          expr: >
            sum by (disk, instance) (netdata_Disk_Busy_Time_Milliseconds_average{disk=~"240446940060|24044694581A|240546A2C222|240546A29A83"})
          labels:
            pool: fast
        - record: disk:truenas_disk_throughput_bytes
          expr: >
            sum by (disk, dimension, instance) ({__name__=~"netdata_Read_Write_for_disk_.*_KiB_persec_average", disk=~"240446940060|24044694581A|240546A2C222|240546A29A83"}) * 1024
          labels:
            pool: fast
        - record: disk:truenas_disk_iops
          expr: >
            sum by (disk, dimension, instance) ({__name__=~"netdata_Complete_read_write_for_disk_.*_Operation_persec_average", disk=~"240446940060|24044694581A|240546A2C222|240546A29A83"})
          labels:
            pool: fast
        - record: disk:truenas_disk_busy_ms
          expr: >
            sum by (disk, instance) (netdata_Disk_Busy_Time_Milliseconds_average{disk=~"ZC16MM71|YVKX3BSK|YVKU4R7K|YHJBKNGA|YHJDPJTA|PN2234P9JSE1UW"})
          labels:
            pool: cold
        - record: disk:truenas_disk_throughput_bytes
          expr: >
            sum by (disk, dimension, instance) ({__name__=~"netdata_Read_Write_for_disk_.*_KiB_persec_average", disk=~"ZC16MM71|YVKX3BSK|YVKU4R7K|YHJBKNGA|YHJDPJTA|PN2234P9JSE1UW"}) * 1024
          labels:
            pool: cold
        - record: disk:truenas_disk_iops
          expr: >
            sum by (disk, dimension, instance) ({__name__=~"netdata_Complete_read_write_for_disk_.*_Operation_persec_average", disk=~"ZC16MM71|YVKX3BSK|YVKU4R7K|YHJBKNGA|YHJDPJTA|PN2234P9JSE1UW"})
          labels:
            pool: cold
    # Pool-level aggregates layered on the per-disk records above. These are
    # the series the future 400ms/800ms pool-saturation alerts attach to.
    # Cross-group references are safe: Prometheus evaluates groups
    # independently, so these lag the disk records by at most one interval.
    - name: truenas.recording.pool
      rules:
        - record: pool:truenas_disk_busy_ms:avg
          expr: avg by (pool) (disk:truenas_disk_busy_ms)
        - record: pool:truenas_disk_throughput_bytes:sum
          expr: sum by (pool, dimension) (disk:truenas_disk_throughput_bytes)
        - record: pool:truenas_disk_iops:sum
          expr: sum by (pool, dimension) (disk:truenas_disk_iops)
    # Aggregate throughput across EVERY drive on the SAS backplane
    # (826EL1 expander behind the SAS3008), regardless of pool membership:
    # ssd EVOs + BX500 scratch + cold members + both spares. Excluded: the
    # SATADOM (mobo ata9) and all NVMe - they do not ride this fabric.
    # Ceiling per direction (full duplex, verified 2026-07-10): HBA uplink
    # 8x12Gb wide port = 9.6 GB/s; binding cap = PCIe Gen3 x8 = 7.88 GB/s
    # raw / ~6.8 GB/s practical. Current 12-drive population tops out
    # ~3.9 GB/s, so this is capacity-planning telemetry, not an alert basis.
    - name: truenas.recording.backplane
      rules:
        - record: sas:truenas_backplane_throughput_bytes:sum
          expr: >
            sum by (dimension, instance) ({__name__=~"netdata_Read_Write_for_disk_.*_KiB_persec_average",
            disk=~"S753NS0X206644B|S753NS0X206645D|2515E9B3E0E1|2515E9B3E121|ZC16MM71|YVKX3BSK|YVKU4R7K|YHJBKNGA|YHJDPJTA|PN2234P9JSE1UW|ZC16Q4Z6|P9JTUH8W"}) * 1024
