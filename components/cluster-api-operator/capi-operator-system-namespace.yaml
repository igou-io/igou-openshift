---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-operator-system
  labels:
    # cluster-api-operator runs with allowPrivilegeEscalation, no
    # capabilities drop, and as root — required by the upstream chart and
    # OCP's "MinimallySufficient" assessment for this namespace.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
