---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-system
  labels:
    # capi-controller-manager runs privileged via the SCC binding in
    # capi-manager-scc-rolebinding.yaml. Make the PSA expectation explicit
    # so namespace-level enforce labels can't drift to "restricted" and
    # block pod creation on rollout.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
