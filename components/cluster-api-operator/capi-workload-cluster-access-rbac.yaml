---
# RBAC for the CAPI cluster cache to reach the "workload cluster" (which is
# the same management cluster in this single-cluster setup). Bound to the
# `default` SA in openshift-cluster-api — its token is minted into the
# `<cluster-name>-kubeconfig` Secret during bootstrap. Without these perms
# the Machine controller can't discover Nodes and stays in Pending forever.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capi-workload-cluster-access
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capi-workload-cluster-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capi-workload-cluster-access
subjects:
  - kind: ServiceAccount
    name: default
    namespace: openshift-cluster-api
