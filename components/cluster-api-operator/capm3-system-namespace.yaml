---
apiVersion: v1
kind: Namespace
metadata:
  name: capm3-system
  labels:
    # capm3-controller-manager and ipam-controller-manager run privileged
    # via the SCC bindings in capm3-manager-scc-rolebinding.yaml /
    # ipam-manager-scc-rolebinding.yaml. Same rationale as capi-system.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
