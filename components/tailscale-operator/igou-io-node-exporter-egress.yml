---
# Cluster egress to node_exporter on the igou.io VPS. The operator replaces
# this ExternalName Service with a proxy pod that joins the tailnet tagged
# tag:openshift - the tag the ACL grant (tag:openshift -> tag:vps tcp/9100)
# matches. Workloads (Prometheus) reach the VPS at
# igou-io-node-exporter.tailscale.svc.cluster.local:9100.
apiVersion: v1
kind: Service
metadata:
  name: igou-io-node-exporter
  annotations:
    # MagicDNS name of the VPS; tracks the device if its tailnet IP changes.
    tailscale.com/tailnet-fqdn: "racknerd-49580b0.weasel-alioth.ts.net"
    # Override the proxy's device tags (default would be tag:k8s).
    tailscale.com/tags: "tag:openshift"
spec:
  type: ExternalName
  externalName: placeholder  # rewritten by the operator
  ports:
    - name: metrics
      port: 9100
      protocol: TCP
---
# Scrape plumbing: the operator's own headless Service carries no ports, so
# this selector Service targets the proxy pod (stable tailscale.com/* labels
# survive pod restarts) and the ServiceMonitor hands it to user-workload
# monitoring. Traffic to the pod on 9100 is DNAT'd to the VPS exporter.
apiVersion: v1
kind: Service
metadata:
  name: igou-io-node-exporter-metrics
  labels:
    app.kubernetes.io/name: igou-io-node-exporter-metrics
spec:
  selector:
    tailscale.com/managed: "true"
    tailscale.com/parent-resource: igou-io-node-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: igou-io-node-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: igou-io-node-exporter-metrics
  endpoints:
    - port: metrics
      interval: 30s
      relabelings:
        # The target address is the in-cluster proxy; name the real source.
        - targetLabel: instance
          replacement: igou.io
