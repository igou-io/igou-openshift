apiVersion: nfd.openshift.io/v1
kind: NodeFeatureDiscovery
metadata:
  name: nfd-instance
  namespace: openshift-nfd
  annotations:
    argocd.argoproj.io/sync-wave: '2'
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  operand:
    image: registry.redhat.io/openshift4/ose-node-feature-discovery-rhel9:v4.20
    imagePullPolicy: Always
  workerConfig:
    configData: |
      core:
        # Workers burst well past their operator-fixed 200m CPU limit on every
        # scan (26-57% of CFS periods throttled at 60s), accumulating restarts.
        # The operand schema exposes no resources override, so lower the scan
        # duty cycle instead — hardware feature labels rarely change.
        sleepInterval: 300s
      sources:
        pci:
          deviceClassWhitelist:
            - "0200" # Network controllers
            - "03" # Display controllers
            - "12" # Processing accelerators
          deviceLabelFields:
            - "class"
            - "vendor"
