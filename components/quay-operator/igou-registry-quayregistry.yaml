---
apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: igou-registry
  namespace: quay-enterprise
spec:
  configBundleSecret: config-bundle-secret
  components:
    - kind: quay
      managed: true
      overrides:
        replicas: 1
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
    # Postgres provided by the CNPG quay-pg cluster (see quay-pg-cluster.yaml).
    # DB_URI is rendered into config-bundle-secret by ExternalSecret.
    - kind: postgres
      managed: false
    - kind: clair
      managed: true
      overrides:
        replicas: 1
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
    # Clair's database shares the CNPG quay-pg cluster (see clair-database.yaml
    # + Cluster.spec.managed.roles in quay-pg-cluster.yaml). connstrings are
    # rendered into the config bundle alongside DB_URI.
    - kind: clairpostgres
      managed: false
    - kind: redis
      managed: true
    - kind: horizontalpodautoscaler
      managed: false
    - kind: objectstorage
      managed: false
    - kind: route
      managed: true
    - kind: mirror
      managed: true
      overrides:
        replicas: 1
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
    - kind: monitoring
      managed: true
    - kind: tls
      managed: true
