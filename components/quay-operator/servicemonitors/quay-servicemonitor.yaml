---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: quay
  namespace: quay-enterprise
  labels:
    app.kubernetes.io/part-of: quay
spec:
  selector:
    matchLabels:
      quay-component: monitoring
  endpoints:
  - port: quay-metrics
    interval: 30s
    path: /metrics
