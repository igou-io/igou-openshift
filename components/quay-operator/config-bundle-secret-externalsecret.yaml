---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: config-bundle-secret
  namespace: quay-enterprise
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-sdk-ocp-pull
  target:
    name: config-bundle-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        config.yaml: |-
          DB_URI: postgresql://quay:{{ .quay_pg_password }}@quay-pg-rw.quay-enterprise.svc:5432/quay
          DISTRIBUTED_STORAGE_CONFIG:
            s3Storage:
              # RHOCSStorage is a RadosGWStorage subclass — the kwarg names
              # below (hostname/access_key/secret_key/bucket_name) match its
              # signature. Despite the "RHOCS" name it works with any S3-
              # compatible endpoint (RustFS here). Don't switch to S3Storage:
              # the Quay-operator middleware normalises kwargs to these legacy
              # names regardless of input, and S3Storage's class signature
              # uses s3_*-prefixed names that wouldn't accept them.
              - RHOCSStorage
              - hostname: truenas.igou.systems
                port: "20292"
                is_secure: true
                signature_version: s3v4
                access_key: {{ .storage_username }}
                secret_key: {{ .storage_password }}
                bucket_name: quay
                storage_path: /datastorage/registry
          DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS: []
          DISTRIBUTED_STORAGE_PREFERENCE:
            - s3Storage
          SUPER_USERS:
            - igou
          SERVER_HOSTNAME: quay.apps.ocp.igou.systems
          FEATURE_USER_CREATION: true
          FEATURE_IMMUTABLE_TAGS: true
          FEATURE_ORG_MIRROR: true
          FEATURE_SPARSE_INDEX: true
        # When clairpostgres is unmanaged, the operator validates the config
        # bundle for a clair-config.yaml key containing at least one connstring
        # under indexer/matcher/notifier (see pkg/kustomize/secrets.go
        # ContainsComponentConfig). The rest of Clair's config is filled in by
        # the operator's clair-config-secret kustomize generator at runtime.
        clair-config.yaml: |-
          indexer:
            connstring: postgresql://clair:{{ .clair_pg_password }}@quay-pg-rw.quay-enterprise.svc:5432/clair?sslmode=disable
          matcher:
            connstring: postgresql://clair:{{ .clair_pg_password }}@quay-pg-rw.quay-enterprise.svc:5432/clair?sslmode=disable
          notifier:
            connstring: postgresql://clair:{{ .clair_pg_password }}@quay-pg-rw.quay-enterprise.svc:5432/clair?sslmode=disable
  # The onepasswordSDK provider rejects data.remoteRef, so we use multiple
  # dataFrom.extract entries with regex rewrites to namespace each item's
  # username/password keys (otherwise they collide on the last extracted item).
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: quay-user-rustfs-cold
        metadataPolicy: None
        nullBytePolicy: Ignore
      rewrite:
        - regexp:
            source: "(.*)"
            target: "storage_$1"
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: quay-pg-credentials
        metadataPolicy: None
        nullBytePolicy: Ignore
      rewrite:
        - regexp:
            source: "(.*)"
            target: "quay_pg_$1"
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: quay-clair-pg-credentials
        metadataPolicy: None
        nullBytePolicy: Ignore
      rewrite:
        - regexp:
            source: "(.*)"
            target: "clair_pg_$1"
