---
# Nightly full backup of quay-pg via the Barman Cloud Plugin (staggered 03:15).
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: quay-pg-daily
  namespace: quay-enterprise
spec:
  schedule: "0 15 3 * * *"
  immediate: true
  backupOwnerReference: self
  cluster:
    name: quay-pg
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
