---
apiVersion: config.stackrox.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: cluster-apps-privileged-container
  namespace: stackrox
spec:
  policyName: 'cluster-apps: Privileged Container'
  description: Clone of the built-in "Privileged Container" policy, scoped to the cluster-apps project namespaces + hermes (#547).
  rationale: Privileged containers in app namespaces can escape to the node.
  remediation: 'Remove privileged: true from the securityContext; grant specific capabilities instead.'
  categories:
    - Privileges
  severity: MEDIUM_SEVERITY
  lifecycleStages:
    - DEPLOY
  # Admission-only actions: inert while the SecuredCluster admissionControl
  # enforcement knob is Disabled; flipping that knob to Enabled is the single
  # switch that makes these block (see README).
  enforcementActions:
    - FAIL_DEPLOYMENT_CREATE_ENFORCEMENT
    - FAIL_DEPLOYMENT_UPDATE_ENFORCEMENT
  scope:
    - namespace: ansible-automation-platform
    - namespace: comfyui
    - namespace: firecrawl
    - namespace: forgejo
    - namespace: gitea-mirror
    - namespace: gotify
    - namespace: hermes
    - namespace: jellyfin
    - namespace: llmkube-system
    - namespace: sands-of-time
    - namespace: searxng
  policySections:
    - sectionName: Criteria
      policyGroups:
        - fieldName: Privileged Container
          booleanOperator: OR
          values:
            - value: "true"
