---
apiVersion: config.stackrox.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: cluster-apps-secret-in-env
  namespace: stackrox
spec:
  policyName: 'cluster-apps: Environment Variable Contains Secret'
  description: Clone of the built-in "Environment Variable Contains Secret" policy, scoped to the cluster-apps project namespaces + hermes (#547).
  rationale: Plaintext secrets in env vars leak via inspect/logs; this repo externalizes secrets via ESO.
  remediation: Use an ExternalSecret + secretKeyRef instead of a raw value.
  categories:
    - Security Best Practices
  severity: HIGH_SEVERITY
  lifecycleStages:
    - DEPLOY
  # Admission-only actions: inert while the SecuredCluster admissionControl
  # enforcement knob is Disabled; flipping that knob to Enabled is the single
  # switch that makes these block (see README).
  enforcementActions:
    - FAIL_DEPLOYMENT_CREATE_ENFORCEMENT
    - FAIL_DEPLOYMENT_UPDATE_ENFORCEMENT
  # API-managed Slack notifier (#548) -> #igoucloud-alerts-warning; referenced
  # by name, resolved by config-controller.
  notifiers:
    - slack-igoucloud-alerts
  scope:
    - namespace: ansible-automation-platform
    - namespace: comfyui
    - namespace: firecrawl
    - namespace: forgejo
    - namespace: gitea-mirror
    - namespace: gotify
    - namespace: hermes
    - namespace: jellyfin
    - namespace: llmkube-system
    - namespace: sands-of-time
    - namespace: searxng
  policySections:
    - sectionName: Criteria
      policyGroups:
        - fieldName: Environment Variable
          booleanOperator: OR
          values:
            - value: RAW=.*SECRET.*|.*PASSWORD.*=
