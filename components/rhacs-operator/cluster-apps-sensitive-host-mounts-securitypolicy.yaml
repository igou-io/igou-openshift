---
apiVersion: config.stackrox.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: cluster-apps-sensitive-host-mounts
  namespace: stackrox
spec:
  policyName: 'cluster-apps: Mounting Sensitive Host Directories'
  description: Clone of the built-in "Mounting Sensitive Host Directories" policy, scoped to the cluster-apps project namespaces + hermes (#547).
  rationale: App workloads have no business mounting sensitive host paths.
  remediation: Remove the hostPath volume or move the workload out of the cluster-apps project.
  categories:
    - Security Best Practices
  severity: MEDIUM_SEVERITY
  lifecycleStages:
    - DEPLOY
  # Admission-only actions: inert while the SecuredCluster admissionControl
  # enforcement knob is Disabled; flipping that knob to Enabled is the single
  # switch that makes these block (see README).
  enforcementActions:
    - FAIL_DEPLOYMENT_CREATE_ENFORCEMENT
    - FAIL_DEPLOYMENT_UPDATE_ENFORCEMENT
  # API-managed Slack notifier (#548) -> #igoucloud-alerts-warning; referenced
  # by name, resolved by config-controller.
  notifiers:
    - slack-igoucloud-alerts
  scope:
    - namespace: ansible-automation-platform
    - namespace: comfyui
    - namespace: firecrawl
    - namespace: forgejo
    - namespace: gitea-mirror
    - namespace: gotify
    - namespace: hermes
    - namespace: jellyfin
    - namespace: llmkube-system
    - namespace: sands-of-time
    - namespace: searxng
  policySections:
    - sectionName: Criteria
      policyGroups:
        - fieldName: Volume Source
          booleanOperator: OR
          values:
            - value: (/etc/.*|/sys/.*|/dev/.*|/proc/.*|/var/.*)
