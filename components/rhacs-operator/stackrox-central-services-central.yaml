---
apiVersion: platform.stackrox.io/v1alpha1
kind: Central
metadata:
  name: stackrox-central-services
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  monitoring:
    openshift:
      enabled: true
  central:
    telemetry:
      enabled: false
    exposure:
      route:
        enabled: true
    # Placement (#381 phase-1 outcome): everything with state or weight is
    # pinned to the one non-tenant worker — off the tenant nodes (hpg5/p330,
    # power-cycled for lab work) and the already-busy master. The CRD exposes
    # no affinity, only nodeSelector, so these are hostname pins.
    # Requests are sized from the phase-1 7-day p50/p95 measurement (#381).
    nodeSelector:
      kubernetes.io/hostname: truenas-w1
    resources:
      requests:
        cpu: 50m
        memory: 1536Mi
      limits:
        memory: 4Gi
    db:
      nodeSelector:
        kubernetes.io/hostname: truenas-w1
      persistence:
        persistentVolumeClaim:
          size: 40Gi
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          memory: 4Gi
  scanner:
    analyzer:
      nodeSelector:
        kubernetes.io/hostname: truenas-w1
      scaling:
        autoScaling: Disabled
        replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 640Mi
        limits:
          memory: 3Gi
    db:
      nodeSelector:
        kubernetes.io/hostname: truenas-w1
      resources:
        requests:
          cpu: 200m
          # Steady-state working set is ~2Gi flat (p50 1946Mi / p95 2007Mi);
          # the original 2Gi limit left effectively zero headroom.
          memory: 2Gi
        limits:
          memory: 3Gi
  scannerV4:
    # REQUIRED for the minimal footprint: new installs since 4.8 default to
    # Enabled/AutoSense.
    scannerComponent: Disabled
