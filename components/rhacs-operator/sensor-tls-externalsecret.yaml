---
# Materializes one of the three cluster-init-bundle secrets minted by Central
# (roxctl central init-bundles generate) and stored in 1Password — see
# README.md for the bootstrap procedure. Sits in SecretSyncedError until the
# 1P item exists; SecuredCluster services stay degraded until then.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sensor-tls
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: '-2'
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-lab-openshift
  target:
    name: sensor-tls
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: stackrox-sensor-tls
        metadataPolicy: None
        nullBytePolicy: Ignore
