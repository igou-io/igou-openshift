---
apiVersion: config.stackrox.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: cluster-apps-cap-sys-admin
  namespace: stackrox
spec:
  policyName: 'cluster-apps: CAP_SYS_ADMIN capability added'
  description: Clone of the built-in "CAP_SYS_ADMIN capability added" policy, scoped to the cluster-apps project namespaces + hermes (#547).
  rationale: CAP_SYS_ADMIN is root-equivalent; no app workload needs it.
  remediation: Drop SYS_ADMIN from securityContext.capabilities.add.
  categories:
    - Privileges
  severity: MEDIUM_SEVERITY
  lifecycleStages:
    - DEPLOY
  # Admission-only actions: inert while the SecuredCluster admissionControl
  # enforcement knob is Disabled; flipping that knob to Enabled is the single
  # switch that makes these block (see README).
  enforcementActions:
    - FAIL_DEPLOYMENT_CREATE_ENFORCEMENT
    - FAIL_DEPLOYMENT_UPDATE_ENFORCEMENT
  # API-managed Slack notifier (#548) -> #igoucloud-alerts-warning; referenced
  # by name, resolved by config-controller.
  notifiers:
    - slack-igoucloud-alerts
  scope:
    - namespace: ansible-automation-platform
    - namespace: comfyui
    - namespace: firecrawl
    - namespace: forgejo
    - namespace: gitea-mirror
    - namespace: gotify
    - namespace: hermes
    - namespace: jellyfin
    - namespace: llmkube-system
    - namespace: sands-of-time
    - namespace: searxng
  policySections:
    - sectionName: Criteria
      policyGroups:
        - fieldName: Add Capabilities
          booleanOperator: OR
          values:
            - value: SYS_ADMIN
