---
apiVersion: config.stackrox.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: cluster-apps-runtime-socket-mount
  namespace: stackrox
spec:
  policyName: 'cluster-apps: Mount Container Runtime Socket'
  description: Clone of the built-in "Mount Container Runtime Socket" policy, scoped to the cluster-apps project namespaces + hermes (#547).
  rationale: Mounting the container runtime socket grants control of every container on the node.
  remediation: Remove the runtime-socket hostPath mount.
  categories:
    - Security Best Practices
  severity: MEDIUM_SEVERITY
  lifecycleStages:
    - DEPLOY
  # Admission-only actions: inert while the SecuredCluster admissionControl
  # enforcement knob is Disabled; flipping that knob to Enabled is the single
  # switch that makes these block (see README).
  enforcementActions:
    - FAIL_DEPLOYMENT_CREATE_ENFORCEMENT
    - FAIL_DEPLOYMENT_UPDATE_ENFORCEMENT
  scope:
    - namespace: ansible-automation-platform
    - namespace: comfyui
    - namespace: firecrawl
    - namespace: forgejo
    - namespace: gitea-mirror
    - namespace: gotify
    - namespace: hermes
    - namespace: jellyfin
    - namespace: llmkube-system
    - namespace: sands-of-time
    - namespace: searxng
  policySections:
    - sectionName: Criteria
      policyGroups:
        - fieldName: Volume Source
          booleanOperator: OR
          values:
            - value: /var/run/docker.sock
            - value: /var/run/crio/crio.sock
            - value: /run/crio/crio.sock
