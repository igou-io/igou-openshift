---
apiVersion: compliance.openshift.io/v1alpha1
kind: ScanSetting
metadata:
  name: cis-weekly
  namespace: openshift-compliance
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
# Observe-only compliance (#550): remediations are MachineConfigs that reboot
# nodes — never auto-apply on a single-master cluster. Sunday 09:00 UTC
# (05:00 ET) sits in the same quiet window as the other weekly maintenance.
autoApplyRemediations: false
autoUpdateRemediations: false
schedule: '0 9 * * 0'
roles:
  - master
  - worker
rawResultStorage:
  size: 1Gi
  rotation: 3
