---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pipelines-as-code-secret
  namespace: openshift-pipelines
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-sdk-ocp-pull
  target:
    name: pipelines-as-code-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: github-application-id
      remoteRef:
        key: op://ocp-pull/pac-github-app/app-id
    - secretKey: github-private-key
      remoteRef:
        key: op://ocp-pull/pac-github-app/private-key
    - secretKey: webhook.secret
      remoteRef:
        key: op://ocp-pull/pac-github-app/webhook-secret
