---
# Devices and host agents send unauthenticated — the fence is this
# policy: ingest ports only from lab RFC1918 space (10.10.0.0/16 covers
# every lab VLAN incl. the router's src-address and the trusted-lan
# pods/VIP ranges). Guest/DMZ VLANs can't route here anyway (router
# firewall), this is defense in depth. externalTrafficPolicy: Local on
# the Service keeps real client IPs visible to the ipBlock match.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: log-gateway
  namespace: log-gateway
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: log-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.10.0.0/16
      ports:
        - port: 5514
          protocol: UDP
        - port: 5514
          protocol: TCP
        - port: 5524
          protocol: UDP
        - port: 3500
          protocol: TCP
    # In-cluster sender: the hermes VM (KubeVirt, pod network) ships its
    # journal to :3500. In-cluster traffic to the VIP keeps its pod-CIDR
    # source IP, which the RFC1918 ipBlock above never matches.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: hermes
      ports:
        - port: 3500
          protocol: TCP
    # User workload monitoring scrapes Alloy's telemetry endpoint (the
    # ServiceMonitor in this component); metrics stay off the ingest VIP.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-user-workload-monitoring
      ports:
        - port: 12345
          protocol: TCP
