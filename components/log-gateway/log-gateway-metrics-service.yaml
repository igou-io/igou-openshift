---
# ClusterIP service for Alloy's own telemetry (:12345) — scraped by user
# workload monitoring via the ServiceMonitor. Kept separate from the
# LoadBalancer ingest Service so the metrics port never rides the VIP.
apiVersion: v1
kind: Service
metadata:
  name: log-gateway-metrics
  namespace: log-gateway
  labels:
    app.kubernetes.io/name: log-gateway
spec:
  selector:
    app.kubernetes.io/name: log-gateway
  ports:
    - name: http-metrics
      port: 12345
      targetPort: http-metrics
      protocol: TCP
