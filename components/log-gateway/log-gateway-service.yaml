---
apiVersion: v1
kind: Service
metadata:
  name: log-gateway
  namespace: log-gateway
  annotations:
    # Pinned VIP — this is the new syslog.igou.systems. The DNS static
    # entry on the rb5009 (igou-inventory) targets this address; update
    # both repos together (see igou-inventory/docs/network-topology.md
    # pinned-VIP registry). autoAssign is off on the pool, so it must be
    # named explicitly.
    metallb.universe.tf/address-pool: trusted-lan
    metallb.universe.tf/loadBalancerIPs: 10.10.150.16
spec:
  type: LoadBalancer
  # Local preserves client source IPs for the NetworkPolicy ipBlock fence
  # and advertises the VIP only from the node running the pod (no ECMP
  # spray / asymmetric-return stall; see the hermes-ssh Service).
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: log-gateway
  ports:
    - name: syslog-udp
      port: 514
      targetPort: syslog-udp
      protocol: UDP
    # TCP syslog moved off 514: sharing one numeric port across TCP+UDP
    # makes ovn-k program only the TCP br-ex steering flow — external UDP
    # then falls through to the host and is dropped. 601 is the IANA
    # syslog-conn port. Devices all use UDP; TCP here is optional spare.
    - name: syslog-tcp
      port: 601
      targetPort: syslog-tcp
      protocol: TCP
    # RFC5424/UDP for senders whose format is fixed upstream (TrueNAS).
    # Distinct numeric port for the same ovn-k reason as 601 above; 1514
    # is the conventional "alternate syslog" port.
    - name: syslog5424-udp
      port: 1514
      targetPort: syslog5424-udp
      protocol: UDP
    - name: loki-push
      port: 3500
      targetPort: loki-push
      protocol: TCP
