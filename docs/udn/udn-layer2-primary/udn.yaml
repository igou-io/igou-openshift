apiVersion: v1
kind: Namespace
metadata:
  name: example-l2-primary
  labels:
    k8s.ovn.org/primary-user-defined-network: ""
---
apiVersion: k8s.ovn.org/v1
kind: UserDefinedNetwork
metadata:
  name: tenant-l2
  namespace: example-l2-primary
spec:
  topology: Layer2
  layer2:
    role: Primary
    subnets:
    - "10.200.0.0/16"
    ipam:
      lifecycle: Persistent
