{{- range $tenant := .Values.tenants }}
{{- $ns := include "pac-tenant.namespace" (dict "root" $ "tenant" $tenant) }}
{{- $imagePullSecrets := list }}
{{- $saSecrets := list }}
{{- if $tenant.secrets }}
{{- range $secret := ($tenant.secrets.imagePullSecrets | default list) }}
{{- $imagePullSecrets = append $imagePullSecrets (dict "name" $secret.name) }}
{{- end }}
{{- range $secret := ($tenant.secrets.serviceAccountSecrets | default list) }}
{{- $saSecrets = append $saSecrets (dict "name" $secret.name) }}
{{- if $secret.asImagePullSecret }}
{{- $imagePullSecrets = append $imagePullSecrets (dict "name" $secret.name) }}
{{- end }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-sa
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    {{- include "pac-tenant.labels" (dict "tenant" $tenant) | nindent 4 }}
automountServiceAccountToken: false
{{- if $imagePullSecrets }}
imagePullSecrets:
{{- toYaml $imagePullSecrets | nindent 2 }}
{{- end }}
{{- if $saSecrets }}
secrets:
{{- toYaml $saSecrets | nindent 2 }}
{{- end }}
{{- end }}
