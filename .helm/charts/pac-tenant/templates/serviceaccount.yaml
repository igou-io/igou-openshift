{{- range $tenant := .Values.tenants }}
{{- $ns := include "pac-tenant.namespace" (dict "root" $ "tenant" $tenant) }}
{{- $imagePullSecrets := list }}
{{- $saSecrets := list }}
{{- if $tenant.secrets }}
{{- range $secret := ($tenant.secrets.imagePullSecrets | default list) }}
{{- $imagePullSecrets = append $imagePullSecrets (dict "name" $secret.name) }}
{{- end }}
{{- range $secret := ($tenant.secrets.serviceAccountSecrets | default list) }}
{{- $saSecrets = append $saSecrets (dict "name" $secret.name) }}
{{- if $secret.asImagePullSecret }}
{{- $imagePullSecrets = append $imagePullSecrets (dict "name" $secret.name) }}
{{- end }}
{{- end }}
{{- end }}
{{- if or $imagePullSecrets $saSecrets }}
---
# Patch the operator-managed `pipeline` ServiceAccount with this tenant's
# image-pull and credential secrets. The OpenShift Pipelines operator
# auto-creates `pipeline` in every namespace and pre-binds it to
# pipelines-scc + edit, so we reuse it as the PipelineRun identity rather
# than carry a parallel SA + custom SCC RoleBinding.
#
# Server-side apply (enabled globally on this Application) means we only
# own `imagePullSecrets` / `secrets` here; the operator continues to own
# everything else. Delete=false prevents pruning from removing the
# operator's SA if this stanza is later dropped.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "21"
    argocd.argoproj.io/sync-options: Delete=false
  labels:
    {{- include "pac-tenant.labels" (dict "tenant" $tenant) | nindent 4 }}
{{- if $imagePullSecrets }}
imagePullSecrets:
{{- toYaml $imagePullSecrets | nindent 2 }}
{{- end }}
{{- if $saSecrets }}
secrets:
{{- toYaml $saSecrets | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
