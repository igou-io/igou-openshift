{{- range $tenant := .Values.tenants }}
{{- $ns := include "pac-tenant.namespace" (dict "root" $ "tenant" $tenant) }}
{{- if not (and $tenant.gitProvider $tenant.gitProvider.remoteRef $tenant.gitProvider.remoteRef.key) }}
{{- fail (printf "tenant %s: gitProvider.remoteRef.key is required (backing remote secret for Forgejo webhook config)" $tenant.name) }}
{{- end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-webhook-config
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    {{- include "pac-tenant.labels" (dict "tenant" $tenant) | nindent 4 }}
spec:
  refreshInterval: 24h
  secretStoreRef:
    {{- include "pac-tenant.secretStoreRef" $ | nindent 4 }}
  target:
    name: forgejo-webhook-config
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    {{- include "pac-tenant.dataFromExtract" $tenant.gitProvider.remoteRef | nindent 4 }}
{{- end }}
