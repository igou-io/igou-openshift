{{- range $tenant := .Values.tenants }}
{{- $ns := include "pac-tenant.namespace" (dict "root" $ "tenant" $tenant) }}
{{- $item := default (printf "ci-forgejo-%s" $tenant.name) $tenant.onepasswordItem }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-webhook-config
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    {{- include "pac-tenant.labels" (dict "tenant" $tenant) | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $.Values.clusterSecretStore | quote }}
  target:
    name: forgejo-webhook-config
    creationPolicy: Owner
  data:
    - secretKey: provider.token
      remoteRef:
        key: {{ printf "op://%s/%s/provider.token" $.Values.onepasswordVault $item | quote }}
    - secretKey: webhook.secret
      remoteRef:
        key: {{ printf "op://%s/%s/webhook.secret" $.Values.onepasswordVault $item | quote }}
{{- end }}
