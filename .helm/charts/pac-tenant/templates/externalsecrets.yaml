{{- range $tenant := .Values.tenants }}
{{- $ns := include "pac-tenant.namespace" (dict "root" $ "tenant" $tenant) }}
{{- if $tenant.secrets }}

{{- range $secret := ($tenant.secrets.imagePullSecrets | default list) }}
{{- if not (and $secret.remoteRef $secret.remoteRef.key) }}
{{- fail (printf "tenant %s: imagePullSecrets[%s].remoteRef.key is required" $tenant.name $secret.name) }}
{{- end }}
{{- $field := default "dockerconfigjson" $secret.dockerconfigField }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secret.name | quote }}
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    {{- include "pac-tenant.labels" (dict "tenant" $tenant) | nindent 4 }}
spec:
  refreshInterval: 24h
  secretStoreRef:
    {{- include "pac-tenant.secretStoreRef" (dict "root" $ "store" $secret.secretStore) | nindent 4 }}
  target:
    name: {{ $secret.name | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: {{ printf "{{ .%s }}" $field | quote }}
  dataFrom:
    {{- include "pac-tenant.dataFromExtract" $secret.remoteRef | nindent 4 }}
{{- end }}

