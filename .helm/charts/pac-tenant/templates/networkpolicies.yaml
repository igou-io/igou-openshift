{{- range $tenant := .Values.tenants }}
{{- $ns := include "pac-tenant.namespace" (dict "root" $ "tenant" $tenant) }}
{{- $cfg := include "pac-tenant.merged" (dict "root" $ "tenant" $tenant) | fromYaml }}
---
# Default-deny all ingress and egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    {{- include "pac-tenant.labels" (dict "tenant" $tenant) | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS to openshift-dns. OVN-K NetworkPolicy evaluates egress ports
# against the destination pod's containerPort (post-NAT), not the Service
# port. The dns-default Service exposes 53 → targetPort 5353, so we have
# to allow 5353 here. 53 is kept for any path that bypasses the Service.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    {{- include "pac-tenant.labels" (dict "tenant" $tenant) | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Allow external HTTPS/HTTP egress, block intra-cluster + LAN.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-egress
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    {{- include "pac-tenant.labels" (dict "tenant" $tenant) | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
{{- if $cfg.egressBlockedCIDRs }}
            except:
{{- range $cidr := $cfg.egressBlockedCIDRs }}
              - {{ $cidr | quote }}
{{- end }}
{{- end }}
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
{{- range $rule := ($tenant.extraEgress | default list) }}
{{- /* Build the NetworkPolicy peer dict from the rule. Exactly one peer
       shape per entry: cidr (ipBlock) OR namespaceSelector and/or
       podSelector. cidr is mutually exclusive with the selectors. */ -}}
{{- $peer := dict }}
{{- if $rule.cidr }}
  {{- $peer = dict "ipBlock" (dict "cidr" $rule.cidr) }}
{{- else }}
  {{- if $rule.namespaceSelector }}{{- $peer = set $peer "namespaceSelector" $rule.namespaceSelector }}{{- end }}
  {{- if $rule.podSelector }}{{- $peer = set $peer "podSelector" $rule.podSelector }}{{- end }}
{{- end }}
{{- if not $peer }}
  {{- fail (printf "extraEgress[%s] in tenant %s: must set cidr OR (namespaceSelector and/or podSelector)" $rule.name $tenant.name) }}
{{- end }}
---
# Tenant-specific extra egress allowance. Adds to (does not replace) the
# default deny + allow-external-egress combo above. NetworkPolicy rules
# are additive across resources, so each entry just opens an extra hole
# for one peer + port set.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $rule.name | quote }}
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    {{- include "pac-tenant.labels" (dict "tenant" $tenant) | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - {{- toYaml $peer | nindent 10 }}
      {{- if $rule.ports }}
      ports:
        {{- toYaml $rule.ports | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
