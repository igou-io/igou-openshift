---
# These values exercise the chart against a generic ESO secret store.
# Set secretStore.name to whatever ClusterSecretStore exists on the test
# cluster; the chart works with any ESO provider (1Password, Vault, AWS SM,
# GCP SM, Azure KV).
secretStore:
  kind: ClusterSecretStore
  name: onepassword-sdk-ocp-pull

tenants:
  - name: simple-tenant
    url: https://forgejo.apps.ocp.igou.systems/igou-io/simple-tenant
    gitProvider:
      remoteRef:
        key: ci-forgejo-simple-tenant

  - name: secrets-tenant
    url: https://forgejo.apps.ocp.igou.systems/igou-io/secrets-tenant
    gitProvider:
      remoteRef:
        key: ci-forgejo-secrets-tenant
    secrets:
      imagePullSecrets:
        - name: ghcr-readonly
          remoteRef:
            key: ci-ghcr-readonly
      workspaceSecrets:
        - name: snyk-org-token
          remoteRef:
            key: ci-snyk-org

  - name: heavy-tenant
    url: https://forgejo.apps.ocp.igou.systems/igou-io/heavy-tenant
    gitProvider:
      remoteRef:
        key: ci-forgejo-heavy-tenant
    quota:
      requests.cpu: "16"
      requests.memory: 32Gi
      limits.cpu: "32"
      limits.memory: 64Gi
    concurrencyLimit: 1

  - name: custom-key-tenant
    url: https://forgejo.apps.ocp.igou.systems/igou-io/custom-key-tenant
    # Tenant-specific remote key; demonstrates the explicit override.
    gitProvider:
      remoteRef:
        key: legacy-named-forgejo-item
        # property: provider-token-and-webhook   # optional Vault KV property
        # version: "3"                           # optional pinned version

  - name: container-builder
    url: https://forgejo.apps.ocp.igou.systems/igou-io/container-builder
    gitProvider:
      remoteRef:
        key: ci-forgejo-container-builder
    imageStreams:
      - name: ee-minimal-rhel9
        from: registry.redhat.io/ansible-automation-platform-26/ee-minimal-rhel9:latest
    secrets:
      serviceAccountSecrets:
        - name: quay-push-config
          remoteRef:
            key: ci-quay-container-builder
          asImagePullSecret: true
          # Demonstrate the dockerconfigField override — Vault users may
          # have stored the dockerconfig JSON under a different field name.
          dockerconfigField: dockerconfigjson
      workspaceSecrets:
        - name: automationhub-credentials
          remoteRef:
            key: ci-automationhub-token
    params:
      - name: ansible_galaxy_server_list
        value: "published,validated,certified,community"
      - name: ansible_galaxy_server_published_url
        value: "https://automation.apps.ocp.igou.systems/api/galaxy/content/published/"
      - name: ansible_galaxy_server_published_token
        secret_ref:
          name: automationhub-credentials
          key: token
    extraEgress:
      # CIDR form — for Route-mediated traffic.
      - name: allow-quay-push
        cidr: 10.10.9.10/32
        ports:
          - port: 443
            protocol: TCP
      # namespaceSelector only — allow anything in that namespace.
      - name: allow-aap-controller
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: aap
        ports:
          - port: 8443
            protocol: TCP
      # namespaceSelector + podSelector — narrow to specific pods.
      - name: allow-internal-quay-direct
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: quay-enterprise
        podSelector:
          matchLabels:
            quay-component: quay-app
        ports:
          - port: 8443
            protocol: TCP
