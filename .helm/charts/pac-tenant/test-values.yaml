---
tenants:
  - name: simple-tenant
    url: https://forgejo.apps.ocp.igou.systems/igou-io/simple-tenant

  - name: secrets-tenant
    url: https://forgejo.apps.ocp.igou.systems/igou-io/secrets-tenant
    secrets:
      imagePullSecrets:
        - name: ghcr-readonly
          onepasswordItem: ci-ghcr-readonly
      workspaceSecrets:
        - name: snyk-org-token
          onepasswordItem: ci-snyk-org

  - name: heavy-tenant
    url: https://forgejo.apps.ocp.igou.systems/igou-io/heavy-tenant
    quota:
      requests.cpu: "16"
      requests.memory: 32Gi
      limits.cpu: "32"
      limits.memory: 64Gi
    concurrencyLimit: 1

  - name: custom-1p-tenant
    url: https://forgejo.apps.ocp.igou.systems/igou-io/custom-1p-tenant
    onepasswordItem: legacy-named-forgejo-item

  - name: container-builder
    url: https://forgejo.apps.ocp.igou.systems/igou-io/container-builder
    imageStreams:
      - name: ee-minimal-rhel9
        from: registry.redhat.io/ansible-automation-platform-26/ee-minimal-rhel9:latest
    secrets:
      serviceAccountSecrets:
        - name: quay-push-config
          onepasswordItem: ci-quay-container-builder
          asImagePullSecret: true
      workspaceSecrets:
        - name: automationhub-credentials
          onepasswordItem: ci-automationhub-token
    params:
      - name: ansible_galaxy_server_list
        value: "published,validated,certified,community"
      - name: ansible_galaxy_server_published_url
        value: "https://automation.apps.ocp.igou.systems/api/galaxy/content/published/"
      - name: ansible_galaxy_server_published_token
        secret_ref:
          name: automationhub-credentials
          key: token
    extraEgress:
      # CIDR form — for Route-mediated traffic.
      - name: allow-quay-push
        cidr: 10.10.9.10/32
        ports:
          - port: 443
            protocol: TCP
      # namespaceSelector only — allow anything in that namespace.
      - name: allow-aap-controller
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: aap
        ports:
          - port: 8443
            protocol: TCP
      # namespaceSelector + podSelector — narrow to specific pods.
      - name: allow-internal-quay-direct
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: quay-enterprise
        podSelector:
          matchLabels:
            quay-component: quay-app
        ports:
          - port: 8443
            protocol: TCP
