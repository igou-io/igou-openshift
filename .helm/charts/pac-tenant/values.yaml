---
# forgejo — the upstream Pipelines-as-Code git provider for every tenant in
# this chart. PaC needs the instance URL on every Repository CR's
# spec.git_provider.url to know where to POST commit statuses / read content.
forgejo:
  url: https://forgejo.apps.ocp.igou.systems

defaults:
  concurrencyLimit: 2
  cancelInProgress: true

  policy:
    pullRequest:
      - igou
    okToTest:
      - igou

  quota:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "20"
    persistentvolumeclaims: "5"
    requests.storage: 50Gi

  limitRange:
    defaultRequest:
      cpu: 100m
      memory: 256Mi
    default:
      cpu: 500m
      memory: 1Gi
    max:
      cpu: "4"
      memory: 8Gi

  egressBlockedCIDRs:
    - 10.128.0.0/14
    - 172.30.0.0/16
    - 169.254.169.254/32
    - 192.168.0.0/16
    - 10.0.0.0/8

# tenants is the list of onboarded repositories. Each entry can override
# any field from defaults; unspecified fields inherit defaults.
#
# Schema:
#   - name: <slug used for namespace name>             # required, matches ^[a-z0-9-]+$
#     url:  <full https Forgejo URL of the repo>       # required
#     onepasswordItem: <1pwd-item-name>                # optional, defaults to ci-forgejo-<name>;
#                                                        item must contain fields provider.token + webhook.secret
#     concurrencyLimit: <int>                          # optional, defaults to 2
#     cancelInProgress: <bool>                         # optional
#     policy:
#       pullRequest: [<forgejo-username>, ...]         # optional
#       okToTest:    [<forgejo-username>, ...]         # optional; auto-collapsed to pullRequest when secrets present
#     quota: { ... }                                   # optional, full ResourceQuota.spec.hard map
#     limitRange: { ... }                              # optional
#     egressBlockedCIDRs: [<cidr>, ...]                # optional
#     extraEgress:                                     # optional list of extra egress NetworkPolicies.
#       - name: <netpol-name>                          # must be a valid NetworkPolicy name (unique per ns)
#         # Exactly one peer shape — either cidr OR namespaceSelector and/or podSelector:
#         cidr: <cidr>                                 # e.g. 10.10.9.10/32 for the cluster apps router IP.
#                                                        Required for traffic that traverses a Route (e.g.
#                                                        Quay or Forgejo over apps.<domain>) — selectors don't
#                                                        match the apps router because it runs hostNetwork.
#         namespaceSelector:                           # standard NetworkPolicy NamespaceSelector
#           matchLabels:
#             kubernetes.io/metadata.name: <ns>
#         podSelector:                                 # standard NetworkPolicy PodSelector; ANDed with
#           matchLabels:                                 namespaceSelector when both are set
#             <label>: <value>
#         ports:                                       # optional; omit to allow all ports
#           - port: <int>
#             protocol: TCP|UDP
#
#       Note: Quay/Forgejo access for container builds must be declared per
#       tenant via cidr (the cluster apps router IP) — there is no chart
#       default for it. Tenants that don't push images get no extra egress.
#     imageStreams:                                    # optional, OpenShift ImageStream(s) for this tenant.
#       - name: <imagestream-name>                     # e.g. ee-minimal-rhel9
#         from: <upstream-image:tag>                   # e.g. registry.redhat.io/.../ee-minimal-rhel9:latest
#         # scheduled: true                            # optional, default true — re-import on schedule
#         # referencePolicy: Source                    # optional, default Source — keeps signed chain
#     secrets:
#       imagePullSecrets:                              # attached to pipeline-sa.imagePullSecrets (kubelet)
#         - name: <k8s-secret-name>
#           onepasswordItem: <1pwd-item-name>          # 1P item must contain a 'dockerconfigjson' field
#       serviceAccountSecrets:                         # attached to pipeline-sa.secrets
#         - name: <k8s-secret-name>                    #  → Tekton cred-helper picks up dockerconfigjson creds for push
#           onepasswordItem: <1pwd-item-name>          # 1P item must contain a 'dockerconfigjson' field
#           asImagePullSecret: true                    # optional, default false — also append to pipeline-sa.imagePullSecrets
#                                                        (set true when the same robot account also pulls base images)
#       workspaceSecrets:                              # available to PipelineRun via workspace mount
#         - name: <k8s-secret-name>
#           onepasswordItem: <1pwd-item-name>
tenants: []

# Cluster constants — usually no need to override.
clusterSecretStore: onepassword-sdk-ocp-pull
onepasswordVault: ocp-pull
namespacePrefix: ci-
