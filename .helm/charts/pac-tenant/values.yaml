---
# forgejo — the upstream Pipelines-as-Code git provider for every tenant in
# this chart. PaC needs the instance URL on every Repository CR's
# spec.git_provider.url to know where to POST commit statuses / read content.
forgejo:
  url: https://forgejo.apps.ocp.igou.systems

defaults:
  # concurrencyLimit is intentionally unset by default. PaC's
  # `enable-cancel-in-progress-on-*` is enabled cluster-wide, and the
  # two features are mutually exclusive — a Repository with both ends up
  # leaking PipelineRuns (and their workspace PVCs) because PaC's per-PR
  # cleanup (max-keep-runs) short-circuits when the conflict is detected.
  # Tenants that want sequential builds can still opt in by setting
  # concurrencyLimit on their tenant entry; that takes precedence over
  # the global cancel-in-progress for that Repository only.

  policy:
    pullRequest:
      - igou
    okToTest:
      - igou

  quota:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "20"
    persistentvolumeclaims: "5"
    requests.storage: 50Gi

  limitRange:
    defaultRequest:
      cpu: 100m
      memory: 256Mi
    default:
      cpu: 500m
      memory: 1Gi
    max:
      cpu: "4"
      memory: 8Gi

  egressBlockedCIDRs:
    - 10.128.0.0/14
    - 172.30.0.0/16
    - 169.254.169.254/32
    - 192.168.0.0/16
    - 10.0.0.0/8

# tenants is the list of onboarded repositories. Each entry can override
# any field from defaults; unspecified fields inherit defaults.
#
# Schema:
#   - name: <slug used for namespace name>             # required, matches ^[a-z0-9-]+$
#     url:  <full https Forgejo URL of the repo>       # required
#     gitProvider:                                     # required — backing remote secret for the Forgejo
#       remoteRef:                                       webhook config. Remote secret must contain fields
#         key: <remote-secret-key>                       `provider.token` (Forgejo PAT) and `webhook.secret`
#         # property: <field>                          # optional, provider-specific (e.g. Vault KV property)
#         # version: <version>                         # optional, provider-specific
#     concurrencyLimit: <int>                          # optional; unset by default. Mutually
#                                                        exclusive with the cluster's global
#                                                        enable-cancel-in-progress-on-* setting —
#                                                        only set this when you actually want
#                                                        queued sequential builds for this repo.
#     policy:
#       pullRequest: [<forgejo-username>, ...]         # optional
#       okToTest:    [<forgejo-username>, ...]         # optional; auto-collapsed to pullRequest when secrets present
#     quota: { ... }                                   # optional, full ResourceQuota.spec.hard map
#     limitRange: { ... }                              # optional
#     egressBlockedCIDRs: [<cidr>, ...]                # optional
#     extraEgress:                                     # optional list of extra egress NetworkPolicies.
#       - name: <netpol-name>                          # must be a valid NetworkPolicy name (unique per ns)
#         # Exactly one peer shape — either cidr OR namespaceSelector and/or podSelector:
#         cidr: <cidr>                                 # e.g. 10.10.9.10/32 for the cluster apps router IP.
#                                                        Required for traffic that traverses a Route (e.g.
#                                                        Quay or Forgejo over apps.<domain>) — selectors don't
#                                                        match the apps router because it runs hostNetwork.
#         namespaceSelector:                           # standard NetworkPolicy NamespaceSelector
#           matchLabels:
#             kubernetes.io/metadata.name: <ns>
#         podSelector:                                 # standard NetworkPolicy PodSelector; ANDed with
#           matchLabels:                                 namespaceSelector when both are set
#             <label>: <value>
#         ports:                                       # optional; omit to allow all ports
#           - port: <int>
#             protocol: TCP|UDP
#
#       Note: Quay/Forgejo access for container builds must be declared per
#       tenant via cidr (the cluster apps router IP) — there is no chart
#       default for it. Tenants that don't push images get no extra egress.
#     imageStreams:                                    # optional, OpenShift ImageStream(s) for this tenant.
#       - name: <imagestream-name>                     # e.g. ee-minimal-rhel9
#         from: <upstream-image:tag>                   # e.g. registry.redhat.io/.../ee-minimal-rhel9:latest
#         # scheduled: true                            # optional, default true — re-import on schedule
#         # referencePolicy: Source                    # optional, default Source — keeps signed chain
#     params:                                          # optional, passed through to Repository.spec.params.
#       - name: <param-name>                           # PipelineRuns reference via {{ name }} template syntax.
#         value: <string>                              # plain value; mutually exclusive with secret_ref
#         # OR
#         secret_ref:                                  # secret-backed value; mutually exclusive with value.
#           name: <k8s-secret-in-tenant-ns>            # Secret must already exist in the tenant namespace
#           key: <key-in-secret>                         (typically created via workspaceSecrets)
#         # filter: "..."                              # optional CEL expression to scope the param to specific events
#     secrets:
#       imagePullSecrets:                              # SSA-patched onto the operator-managed `pipeline` SA's
#                                                        imagePullSecrets (consumed by the kubelet).
#         - name: <k8s-secret-name>
#           remoteRef:                                 # generic ESO remoteRef — works with any provider
#             key: <remote-secret-key>                   (1Password, Vault, AWS SM, GCP SM, ...).
#             # property: <field>                      # optional
#             # version: <version>                     # optional
#           # dockerconfigField: dockerconfigjson      # optional, source-side field name to project as
#                                                        .dockerconfigjson; defaults to "dockerconfigjson".
#       serviceAccountSecrets:                         # SSA-patched onto the operator-managed `pipeline` SA's secrets
#         - name: <k8s-secret-name>                    #  → Tekton cred-helper picks up dockerconfigjson creds for push
#           remoteRef:
#             key: <remote-secret-key>
#           asImagePullSecret: true                    # optional, default false — also append to pipeline.imagePullSecrets
#                                                        (set true when the same robot account also pulls base images)
#           # dockerconfigField: dockerconfigjson      # optional, see imagePullSecrets above
#       workspaceSecrets:                              # available to PipelineRun via workspace mount;
#         - name: <k8s-secret-name>                      Opaque Secret, all remote fields projected as-is.
#           remoteRef:
#             key: <remote-secret-key>
tenants: []

# secretStore is the ESO store backing every ExternalSecret this chart
# creates. Anything that implements the ESO SecretStore/ClusterSecretStore
# CRD works — 1Password, HashiCorp Vault, AWS Secrets Manager, GCP Secret
# Manager, Azure Key Vault, etc.
secretStore:
  kind: ClusterSecretStore                            # or SecretStore (namespaced)
  name: ""                                            # required; site-specific

namespacePrefix: ci-
