{{- range $role := .Values.clusterRoles }}
{{- if or (not (hasKey $role "enabled")) $role.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ required "clusterRoles[].name is required" $role.name }}
{{- with $role.labels }}
  labels:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with $role.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
rules:
{{ toYaml (required "clusterRoles[].rules is required" $role.rules) | nindent 2 }}
{{- end }}
{{- end }}
