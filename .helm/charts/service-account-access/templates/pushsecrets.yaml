{{- $root := . -}}
{{- range $sa := .Values.serviceAccounts }}
{{- range $push := $sa.pushSecrets }}
{{- if or (not (hasKey $push "enabled")) $push.enabled }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ required "serviceAccounts[].pushSecrets[].name is required" $push.name }}
  namespace: {{ default (include "service-account-access.serviceAccountNamespace" (dict "root" $root "serviceAccount" $sa)) $push.namespace }}
{{- with $push.labels }}
  labels:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with $push.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
{{- with $push.updatePolicy }}
  updatePolicy: {{ . }}
{{- end }}
{{- with $push.deletionPolicy }}
  deletionPolicy: {{ . }}
{{- end }}
{{- with $push.refreshInterval }}
  refreshInterval: {{ . | quote }}
{{- end }}
{{- with $push.secretStoreRefs }}
  secretStoreRefs:
{{- range $ref := . }}
    -{{- if $ref.name }} name: {{ $ref.name }}{{- end }}
{{- if $ref.kind }}
      kind: {{ $ref.kind | quote }}
{{- end }}
{{- with omit $ref "name" "kind" }}
{{ toYaml . | nindent 6 }}
{{- end }}
{{- end }}
{{- end }}
{{- if $push.selector }}
  selector:
{{ toYaml $push.selector | nindent 4 }}
{{- else }}
  selector:
    secret:
      name: {{ include "service-account-access.tokenSecretName" (dict "root" $root "serviceAccount" $sa) }}
{{- end }}
{{- with $push.template }}
  template:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with $push.data }}
  data:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with $push.dataTo }}
  dataTo:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
