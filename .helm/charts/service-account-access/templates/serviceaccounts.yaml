{{- $root := . -}}
{{- range $sa := .Values.serviceAccounts }}
{{- $create := $root.Values.defaults.createServiceAccount -}}
{{- if hasKey $sa "createServiceAccount" -}}
{{- $create = $sa.createServiceAccount -}}
{{- end -}}
{{- if $create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ required "serviceAccounts[].name is required" $sa.name }}
  namespace: {{ include "service-account-access.serviceAccountNamespace" (dict "root" $root "serviceAccount" $sa) }}
{{- with $sa.labels }}
  labels:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with $sa.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
automountServiceAccountToken: {{ default $root.Values.defaults.automountServiceAccountToken $sa.automountServiceAccountToken }}
{{- end }}
{{- end }}
