{{- $root := . -}}
{{- range $sa := .Values.serviceAccounts }}
{{- range $binding := $sa.roleBindings }}
{{- if or (not (hasKey $binding "enabled")) $binding.enabled }}
{{- $namespace := required "serviceAccounts[].roleBindings[].namespace is required" $binding.namespace -}}
{{- range $clusterRole := $binding.clusterRoles }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ default (printf "%s-%s" $sa.name $clusterRole) $binding.name }}
  namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $clusterRole }}
subjects:
  - kind: ServiceAccount
    name: {{ required "serviceAccounts[].name is required" $sa.name }}
    namespace: {{ include "service-account-access.serviceAccountNamespace" (dict "root" $root "serviceAccount" $sa) }}
{{- end }}
{{- range $role := $binding.roles }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ default (printf "%s-%s" $sa.name $role) $binding.name }}
  namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $role }}
subjects:
  - kind: ServiceAccount
    name: {{ required "serviceAccounts[].name is required" $sa.name }}
    namespace: {{ include "service-account-access.serviceAccountNamespace" (dict "root" $root "serviceAccount" $sa) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
