{{- $root := . -}}
{{- range $sa := .Values.serviceAccounts }}
{{- $longLivedToken := default dict $sa.longLivedToken -}}
{{- $enabled := $root.Values.defaults.longLivedToken.enabled -}}
{{- if hasKey $longLivedToken "enabled" -}}
{{- $enabled = $longLivedToken.enabled -}}
{{- end -}}
{{- if $enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "service-account-access.tokenSecretName" (dict "root" $root "serviceAccount" $sa) }}
  namespace: {{ include "service-account-access.serviceAccountNamespace" (dict "root" $root "serviceAccount" $sa) }}
  annotations:
    kubernetes.io/service-account.name: {{ required "serviceAccounts[].name is required" $sa.name }}
{{- with $longLivedToken.annotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with $longLivedToken.labels }}
  labels:
{{ toYaml . | nindent 4 }}
{{- end }}
type: kubernetes.io/service-account-token
{{- end }}
{{- end }}
