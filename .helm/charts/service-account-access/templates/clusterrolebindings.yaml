{{- $root := . -}}
{{- range $sa := .Values.serviceAccounts }}
{{- range $binding := $sa.clusterRoleBindings }}
{{- if or (not (hasKey $binding "enabled")) $binding.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ required "serviceAccounts[].clusterRoleBindings[].name is required" $binding.name }}
{{- with $binding.labels }}
  labels:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with $binding.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ required "serviceAccounts[].clusterRoleBindings[].clusterRole is required" $binding.clusterRole }}
subjects:
{{- if $binding.subjects }}
{{ toYaml $binding.subjects | nindent 2 }}
{{- else }}
  - kind: ServiceAccount
    name: {{ required "serviceAccounts[].name is required" $sa.name }}
    namespace: {{ include "service-account-access.serviceAccountNamespace" (dict "root" $root "serviceAccount" $sa) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
